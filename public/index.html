<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0e1018"/>
<title>Auto Delic Gume</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e1018;--surf:#171b27;--card:#1c2133;--border:#252d42;--accent:#f0b429;--red:#e8532a;--blue:#4b8ef0;--green:#27ae60;--purple:#9b59b6;--text:#e6e9f4;--muted:#6e7a99;--radius:10px}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{min-height:100vh;display:flex;flex-direction:column}

/* NAV */
.nav{background:var(--surf);border-bottom:2px solid var(--accent);padding:0 16px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:8px}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:17px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:7px;flex-shrink:0}
.logo-w{color:var(--text)}
.nav-right{display:flex;align-items:center;gap:6px}
.btn-gear{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.btn-gear.on{border-color:var(--accent);color:var(--accent);background:rgba(240,180,41,.1)}
.btn-add{background:var(--accent);color:#000;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:7px 13px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap}
.user-badge{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);background:var(--card);border:1px solid var(--border);border-radius:5px;padding:4px 8px;display:flex;align-items:center;gap:5px}
.user-badge.admin{color:var(--accent);border-color:rgba(240,180,41,.3)}
.btn-logout{background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;padding:4px 8px;cursor:pointer}

/* MAIN */
.main{flex:1;padding:14px;max-width:1280px;margin:0 auto;width:100%}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1a1f2e;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;z-index:999;white-space:nowrap;border-left:3px solid var(--green);box-shadow:0 4px 20px rgba(0,0,0,.4)}
.toast.err{border-left-color:var(--red)}

/* LOGIN */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.login-card{background:var(--surf);border:1.5px solid var(--border);border-radius:16px;padding:32px;width:100%;max-width:360px}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:24px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);text-align:center;margin-bottom:6px}
.login-sub{text-align:center;color:var(--muted);font-size:13px;margin-bottom:28px}
.login-err{background:rgba(232,83,42,.1);border:1px solid rgba(232,83,42,.4);color:var(--red);border-radius:6px;padding:10px 14px;font-size:13px;margin-bottom:14px;text-align:center}

/* SETTINGS */
.set-panel{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:18px}
.set-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:8px}
.set-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:5px}
.set-tabs{display:flex;gap:5px;margin-bottom:12px}
.set-tab{background:none;border:1px solid var(--border);color:var(--muted);border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;cursor:pointer}
.set-tab.on{border-color:var(--accent);color:var(--accent);background:rgba(240,180,41,.08)}
.btn-new{background:var(--accent);color:#000;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:5px 11px;cursor:pointer;display:flex;align-items:center;gap:3px}
.mag-list{display:flex;flex-direction:column;gap:6px}
.mag-card{background:var(--card);border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.tree-row{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer;user-select:none}
.tree-row:hover{background:rgba(255,255,255,.03)}
.tree-row.prolaz{padding:5px 10px;background:var(--surf)}
.tree-row.regal{padding:4px 8px;background:var(--card)}
.tree-lbl-mag{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:6px;color:var(--text)}
.tree-lbl-prolaz{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--blue)}
.tree-lbl-regal{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.tree-meta{font-size:10px;color:var(--muted);font-weight:400;letter-spacing:0;text-transform:none}
.tree-right{display:flex;align-items:center;gap:4px}
.mag-body{padding:0 12px 12px}
.prolazi-wrap{display:flex;flex-direction:column;gap:4px}
.prolaz-row{background:var(--surf);border:1px solid var(--border);border-radius:5px;overflow:hidden}
.prolaz-body{padding:4px 10px 9px}
.regali-wrap{display:flex;flex-direction:column;gap:3px}
.regal-row{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.regal-body{padding:4px 8px 7px}
.police-wrap{display:flex;flex-wrap:wrap;gap:3px}
.polica-chip{background:rgba(75,142,240,.1);border:1px solid rgba(75,142,240,.25);color:var(--blue);border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;padding:1px 5px;display:flex;align-items:center;gap:2px}
.add-row{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px}
.add-btn{background:none;border:1px dashed var(--border);color:var(--muted);border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:600;text-transform:uppercase;padding:2px 7px;cursor:pointer;display:flex;align-items:center;gap:2px}
.add-btn:hover{border-color:var(--accent);color:var(--accent)}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:1px 2px;border-radius:2px;display:flex;align-items:center;flex-shrink:0;opacity:.6}
.del-btn:hover{color:var(--red);opacity:1}
.cust-row{display:flex;gap:4px;margin-top:4px;align-items:center}
.cust-inp{background:var(--card);border:1px dashed var(--border);border-radius:3px;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;padding:3px 7px;outline:none;width:90px;text-transform:uppercase}
.add-cust{background:none;border:1px solid var(--accent);color:var(--accent);border-radius:3px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;text-transform:uppercase;padding:3px 7px;cursor:pointer;white-space:nowrap}

/* KORISNICI */
.user-list{display:flex;flex-direction:column;gap:6px}
.user-item{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 14px;display:flex;align-items:center;justify-content:space-between;gap:8px}
.user-name{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:14px;letter-spacing:1px}
.user-role{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.user-role.admin{background:rgba(240,180,41,.15);color:var(--accent)}
.user-role.radnik{background:rgba(75,142,240,.12);color:var(--blue)}
.user-actions{display:flex;gap:5px}

/* SEARCH */
.hero{text-align:center;padding:18px 0 14px}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;letter-spacing:3px;text-transform:uppercase;line-height:1;margin-bottom:3px}
.hero h1 em{color:var(--accent);font-style:normal}
.hero p{color:var(--muted);font-size:11px}
.sf-wrap{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.sf-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sf-full{grid-column:1/-1}
.fg label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.fg input,.fg select{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:5px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 9px;outline:none}
.fg select option{background:var(--card)}
.btn-srch{background:var(--red);color:#fff;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;height:34px;width:100%;display:flex;align-items:center;justify-content:center;gap:4px;cursor:pointer}
.status-tabs{display:flex;gap:6px;margin-bottom:12px}
.stab{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;cursor:pointer;flex:1;text-align:center}
.stab.as{border-color:var(--green);color:var(--green);background:rgba(39,174,96,.08)}
.stab.ap{border-color:var(--purple);color:var(--purple);background:rgba(155,89,182,.08)}
.res-count{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.res-count b{color:var(--accent);font-size:13px}
.tire-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.tire-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative}
.tire-card.sold{opacity:.65;border-color:#3d2d5a}
.tire-thumb{width:100%;height:120px;background:var(--surf);display:flex;align-items:center;justify-content:center;color:var(--border)}
.tire-thumb img{width:100%;height:100%;object-fit:cover}
.bs{position:absolute;top:7px;left:7px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:3px;display:flex;align-items:center;gap:2px}
.bs.z{background:rgba(75,142,240,.22);color:#4b8ef0;border:1px solid #4b8ef0}
.bs.l{background:rgba(240,180,41,.16);color:#f0b429;border:1px solid #f0b429}
.bsif{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.7);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px}
.bsold{position:absolute;bottom:0;left:0;right:0;background:rgba(155,89,182,.85);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:3px}
.tire-info{padding:8px 10px}
.tire-size{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:1px;margin-bottom:1px}
.tire-cod{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:1px}
.tire-loc{font-size:10px;color:var(--muted)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;display:flex;align-items:center;justify-content:center;padding:14px}
.modal{background:var(--surf);border:1.5px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.btn-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1;padding:0}
.fg2{margin-bottom:12px}
.fg2 label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.fg2 input,.fg2 select,.fg2 textarea{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:5px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 10px;outline:none}
.fg2 select option{background:var(--card)}
.fg2 textarea{resize:vertical;min-height:56px}
.fg2 input.ok{border-color:var(--green)}
.fg2 input.err{border-color:var(--red)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.sifra-prev{background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.25);border-radius:6px;padding:6px 12px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:900;color:var(--accent);letter-spacing:2px;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.sifra-prev span{font-size:9px;color:var(--muted);font-weight:600;text-transform:uppercase}
.ph{margin-top:4px;padding:5px 9px;border-radius:4px;font-size:11px;display:flex;align-items:center;gap:4px}
.ph.ok{background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.3);color:var(--green)}
.ph.err{background:rgba(232,83,42,.08);border:1px solid rgba(232,83,42,.3);color:var(--red)}
.perr{margin-top:4px;padding:6px 9px;border-radius:4px;font-size:11px;background:rgba(232,83,42,.1);border:1.5px solid rgba(232,83,42,.5);color:var(--red);font-weight:600}

/* IMG UPLOAD */
.img-zone{border:2px dashed var(--border);border-radius:7px;padding:14px;text-align:center;cursor:pointer;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:64px;transition:border-color .18s}
.img-zone:hover{border-color:var(--accent);color:var(--accent)}
.img-zone.uploading{border-color:var(--blue);color:var(--blue)}
.upload-progress{margin-top:8px}
.upload-bar-wrap{background:var(--card);border-radius:4px;height:6px;overflow:hidden;margin-bottom:4px}
.upload-bar{background:var(--blue);height:100%;border-radius:4px;transition:width .2s}
.upload-status{font-size:10px;color:var(--muted);text-align:center}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:7px}
.img-item{position:relative;border-radius:4px;overflow:hidden;aspect-ratio:1;background:var(--card)}
.img-item img{width:100%;height:100%;object-fit:cover;display:block}
.img-rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);border:none;color:#fff;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.lightbox img{max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain}
.lightbox-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center}
.lightbox-nav{position:absolute;top:50%;transform:translateY(-50%);background:rgba(255,255,255,.1);border:none;color:#fff;width:44px;height:44px;border-radius:50%;cursor:pointer;font-size:22px;display:flex;align-items:center;justify-content:center}
.lightbox-nav.prev{left:12px}
.lightbox-nav.next{right:12px}
.det-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:5px;margin-bottom:12px}
.det-imgs .thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px;cursor:pointer;display:block;border:2px solid transparent;transition:border-color .15s}
.det-imgs .thumb:hover{border-color:var(--accent)}

/* MODAL FOOT */
.modal-foot{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:13px;border-top:1px solid var(--border);align-items:center}
.foot-left{margin-right:auto}
.btn-cancel{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;cursor:pointer}
.btn-save{background:var(--accent);color:#000;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;cursor:pointer}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-sell{background:var(--green);color:#fff;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;cursor:pointer;display:flex;align-items:center;gap:5px}
.btn-edit{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:3px}
.btn-del-sm{color:var(--red);border:1px solid rgba(232,83,42,.3);border-radius:4px;padding:4px 8px;background:none;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:3px;opacity:.6}
.btn-del-sm:hover{opacity:1}
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}
.spec-box{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:7px 11px}
.spec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1px}
.spec-val{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800}
.loc-box{background:rgba(75,142,240,.07);border:1px solid rgba(75,142,240,.2);border-radius:5px;padding:7px 11px;font-size:11px;color:#4b8ef0;margin-bottom:9px}
.sold-box{background:rgba(155,89,182,.1);border:1px solid rgba(155,89,182,.3);border-radius:5px;padding:7px 11px;font-size:11px;color:var(--purple);margin-bottom:9px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border);margin-top:10px}
.sell-box{background:rgba(39,174,96,.06);border:1.5px solid rgba(39,174,96,.2);border-radius:9px;padding:14px;margin-bottom:4px}
.sell-box p{color:var(--muted);font-size:12px;margin-bottom:10px;line-height:1.5}
.sell-box strong{color:var(--text)}
.price-row{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:5px;overflow:hidden;background:var(--card)}
.price-inp{flex:1;background:transparent;border:none;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;padding:9px 12px;outline:none}
.price-curr{padding:9px 12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);border-left:1px solid var(--border)}
@media(max-width:600px){.two-col{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useMemo,useRef,useEffect,useCallback} = React;

// ===== API =====
function getToken() { return localStorage.getItem('adg_token'); }

async function api(path, opts={}) {
  const token = getToken();
  const res = await fetch('/api'+path, {
    headers: {'Content-Type':'application/json', ...(token?{'Authorization':'Bearer '+token}:{})},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json();
  if (res.status===401) {
    localStorage.removeItem('adg_token');
    window.location.reload();
    throw new Error('Sesija istekla');
  }
  if (!res.ok) throw new Error(data.error||'Greska');
  return data;
}

// ===== IMAGE UTILS =====
function resizeImage(file, maxW=1200, maxH=1200, quality=0.82) {
  return new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = e => {
      const img = new Image();
      img.onload = () => {
        let w = img.width, h = img.height;
        if (w > maxW || h > maxH) {
          const ratio = Math.min(maxW/w, maxH/h);
          w = Math.round(w*ratio); h = Math.round(h*ratio);
        }
        const canvas = document.createElement('canvas');
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

// ===== LOGIN SCREEN =====
function LoginScreen({onLogin}) {
  const [username, setUsername] = useState('');
  const [password, setPassword] = useState('');
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState('');

  const doLogin = async () => {
    if (!username||!password) { setError('Unesite korisnicko ime i lozinku'); return; }
    setLoading(true); setError('');
    try {
      const data = await api('/auth/login', {method:'POST', body:{username,password}});
      localStorage.setItem('adg_token', data.token);
      onLogin({username:data.username, role:data.role});
    } catch(e) { setError(e.message); }
    setLoading(false);
  };

  return (
    <div className="login-wrap">
      <div className="login-card">
        <div className="login-logo"><I.TireSm/> AUTO DELIC</div>
        <div className="login-sub">Sistem za pracenje guma</div>
        {error && <div className="login-err">{error}</div>}
        <div className="fg2"><label>Korisnicko ime</label>
          <input autoFocus value={username} onChange={e=>setUsername(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&doLogin()} placeholder="admin"/>
        </div>
        <div className="fg2"><label>Lozinka</label>
          <input type="password" value={password} onChange={e=>setPassword(e.target.value)}
            onKeyDown={e=>e.key==='Enter'&&doLogin()} placeholder="••••••"/>
        </div>
        <button className="btn-save" style={{width:'100%',marginTop:4,padding:'10px',fontSize:14}} onClick={doLogin} disabled={loading}>
          {loading?'Prijava...':'Prijavi se'}
        </button>
      </div>
    </div>
  );
}

// ===== LIGHTBOX =====
function Lightbox({images, startIndex, onClose}) {
  const [idx, setIdx] = useState(startIndex||0);
  useEffect(() => {
    const h = e => { if(e.key==='Escape') onClose(); if(e.key==='ArrowRight') setIdx(i=>Math.min(i+1,images.length-1)); if(e.key==='ArrowLeft') setIdx(i=>Math.max(i-1,0)); };
    window.addEventListener('keydown',h);
    return ()=>window.removeEventListener('keydown',h);
  },[images,onClose]);
  return (
    <div className="lightbox" onClick={onClose}>
      <button className="lightbox-close" onClick={onClose}>×</button>
      {idx>0&&<button className="lightbox-nav prev" onClick={e=>{e.stopPropagation();setIdx(i=>i-1)}}>‹</button>}
      <img src={images[idx]} alt="" onClick={e=>e.stopPropagation()}/>
      {idx<images.length-1&&<button className="lightbox-nav next" onClick={e=>{e.stopPropagation();setIdx(i=>i+1)}}>›</button>}
    </div>
  );
}

    <div className="app">
      <nav className="nav">
        <div className="logo"><I.TireSm/> AUTO <span className="logo-w">DELIC</span></div>
        <div className="nav-right">
          <div className={"user-badge"+(isAdmin?" admin":"")}><I.User/> {user.username}</div>
          {isAdmin&&<button className={"btn-gear"+(settingsOpen?" on":"")} onClick={()=>setSettingsOpen(s=>!s)}><I.Gear/></button>}
          {isAdmin&&<button className="btn-gear" title="Analitika" onClick={loadAnalitika} style={{fontSize:14}}>📊</button>}
          <button className="btn-add" onClick={()=>{setForm({...EMPTY_FORM});setEditingId(null);setSubmitAttempted(false);setUploadState({uploading:false,done:0,total:0});setModal('addGuma');}}><I.Plus/> Dodaj</button>
          <button className="btn-logout" onClick={doLogout}>Odjava</button>
        </div>
      </nav>

      <main className="main">
        {/* SETTINGS — admin only */}
        {settingsOpen&&isAdmin&&(
          <div className="set-panel">
            <div className="set-head">
              <div className="set-title"><I.Gear/> Podesavanja</div>
            </div>
            <div className="set-tabs">
              <button className={"set-tab"+(setTab==='magacin'?" on":"")} onClick={()=>setSetTab('magacin')}><I.House/> Magacin</button>
              <button className={"set-tab"+(setTab==='korisnici'?" on":"")} onClick={()=>{setSetTab('korisnici');loadKorisnici();}}><I.User/> Korisnici</button>
            </div>

            {setTab==='magacin'&&(
              <>
                <div style={{display:'flex',justifyContent:'flex-end',marginBottom:10}}>
                  <button className="btn-new" onClick={()=>setModal('addMag')}><I.Plus/> Novi magacin</button>
                </div>
                {magacini.length===0?<div style={{textAlign:'center',padding:'18px 0',color:'var(--muted)',fontSize:12}}>Nema magacina.</div>
                :<div className="mag-list">
                  {magacini.map(m=>(
                    <div key={m.id} className="mag-card">
                      <div className="tree-row" onClick={()=>setOpenMag(p=>({...p,[m.id]:!p[m.id]}))}>
                        <div className="tree-lbl-mag"><span style={{color:'var(--accent)'}}><I.House/></span>{m.naziv}<span className="tree-meta">{m.prolazi.length} prolaza</span></div>
                        <div className="tree-right"><span className="del-btn" onClick={e=>{e.stopPropagation();doDelMag(m.id);}}><I.Trash/></span><span style={{fontSize:9,color:'var(--muted)'}}>{openMag[m.id]?'▲':'▼'}</span></div>
                      </div>
                      {openMag[m.id]&&(<div className="mag-body">
                        <div className="prolazi-wrap">
                          {m.prolazi.map(pr=>(
                            <div key={pr.id} className="prolaz-row">
                              <div className="tree-row prolaz" onClick={()=>setOpenProlaz(p=>({...p,[pr.id]:!p[pr.id]}))}>
                                <span className="tree-lbl-prolaz">{pr.naziv}</span>
                                <div className="tree-right"><span className="del-btn" onClick={e=>{e.stopPropagation();doDelProlaz(m.id,pr.id);}}><I.Trash/></span><span style={{fontSize:9,color:'var(--muted)'}}>{openProlaz[pr.id]?'▲':'▼'}</span></div>
                              </div>
                              {openProlaz[pr.id]&&(<div className="prolaz-body">
                                <div className="regali-wrap">
                                  {pr.regali.map(r=>(
                                    <div key={r.id} className="regal-row">
                                      <div className="tree-row regal" onClick={()=>setOpenRegal(p=>({...p,[r.id]:!p[r.id]}))}>
                                        <span className="tree-lbl-regal">{r.naziv} <span style={{fontWeight:400}}>({r.police.length})</span></span>
                                        <div className="tree-right"><span className="del-btn" onClick={e=>{e.stopPropagation();doDelRegal(m.id,pr.id,r.id);}}><I.Trash/></span><span style={{fontSize:9,color:'var(--muted)'}}>{openRegal[r.id]?'▲':'▼'}</span></div>
                                      </div>
                                      {openRegal[r.id]&&(<div className="regal-body">
                                        <div className="police-wrap">{r.police.map(pl=>(<div key={pl.id} className="polica-chip">{pl.naziv}<span className="del-btn" style={{padding:0}} onClick={e=>{e.stopPropagation();doDelPolica(m.id,pr.id,r.id,pl.id);}}><I.X/></span></div>))}</div>
                                        <div className="add-row"><span className="add-btn" onClick={e=>{e.stopPropagation();doAddPolica(m.id,pr.id,r.id);}}><I.Plus/> Auto</span></div>
                                        <div className="cust-row" onClick={e=>e.stopPropagation()}>
                                          <input className="cust-inp" placeholder="P2334" value={customPolica[r.id]||''} onChange={e=>setCustomPolica(p=>({...p,[r.id]:e.target.value}))} onKeyDown={e=>e.key==='Enter'&&doAddCustomPolica(r.id,m.id,pr.id)}/>
                                          <span className="add-cust" onClick={()=>doAddCustomPolica(r.id,m.id,pr.id)}><I.Plus/> Custom</span>
                                        </div>
                                      </div>)}
                                    </div>
                                  ))}
                                </div>
                                <div className="add-row" onClick={e=>e.stopPropagation()}><span className="add-btn" onClick={()=>doAddRegal(m.id,pr.id)}><I.Plus/> Regal</span></div>
                              </div>)}
                            </div>
                          ))}
                        </div>
                        <div className="add-row" onClick={e=>e.stopPropagation()}><span className="add-btn" onClick={()=>doAddProlaz(m.id)}><I.Plus/> Prolaz</span></div>
                      </div>)}
                    </div>
                  ))}
                </div>}
              </>
            )}

            {setTab==='korisnici'&&(
              <>
                <div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:7,padding:'12px 14px',marginBottom:12}}>
                  <div style={{fontFamily:'Barlow Condensed',fontSize:11,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)',marginBottom:9}}>Novi korisnik</div>
                  <div className="two-col" style={{gap:7,marginBottom:7}}>
                    <div className="fg2" style={{marginBottom:0}}><label>Korisnicko ime</label><input value={newUser.username} onChange={e=>setNewUser(u=>({...u,username:e.target.value}))} placeholder="marko"/></div>
                    <div className="fg2" style={{marginBottom:0}}><label>Lozinka</label><input type="password" value={newUser.password} onChange={e=>setNewUser(u=>({...u,password:e.target.value}))} placeholder="••••••"/></div>
                  </div>
                  <div style={{display:'flex',gap:7,alignItems:'center'}}>
                    <div className="fg2" style={{marginBottom:0,flex:1}}><label>Uloga</label>
                      <select value={newUser.role} onChange={e=>setNewUser(u=>({...u,role:e.target.value}))}>
                        <option value="radnik">Radnik</option>
                        <option value="admin">Admin</option>
                      </select>
                    </div>
                    <button className="btn-new" style={{marginTop:14}} onClick={doAddUser}><I.Plus/> Dodaj</button>
                  </div>
                </div>
                <div className="user-list">
                  {korisnici.map(k=>(
                    <div key={k.id} className="user-item">
                      <div>
                        <div className="user-name">{k.username}</div>
                        <div style={{fontSize:10,color:'var(--muted)',marginTop:1}}>{new Date(k.created_at).toLocaleDateString('hr-HR')}</div>
                      </div>
                      <div style={{display:'flex',alignItems:'center',gap:7}}>
                        <span className={"user-role "+k.role}>{k.role}</span>
                        {k.role!=='admin'&&<button className="del-btn" onClick={()=>doDelUser(k.id)}><I.Trash/></button>}
                      </div>
                    </div>
                  ))}
                </div>
              </>
            )}
          </div>
        )}

        {/* HERO & SEARCH */}
        <div className="hero"><h1>Pretraga <em>Guma</em></h1><p>Pronadi gumu za nekoliko sekundi</p></div>
        <div className="sf-wrap">
          <div className="sf-grid">
            <div className="fg sf-full"><label>Interna sifra</label><input placeholder="npr. GU10" value={filters.sifra} onChange={e=>setFilters(f=>({...f,sifra:e.target.value}))}/></div>
            <div className="fg"><label>Sezona</label><select value={filters.sezona} onChange={e=>setFilters(f=>({...f,sezona:e.target.value}))}><option value="">Sve</option><option>Zimska</option><option>Ljetna</option></select></div>
            <div className="fg"><label>Sirina</label><input placeholder="205" value={filters.sirina} onChange={e=>setFilters(f=>({...f,sirina:e.target.value}))}/></div>
            <div className="fg"><label>Visina</label><input placeholder="55" value={filters.visina} onChange={e=>setFilters(f=>({...f,visina:e.target.value}))}/></div>
            <div className="fg"><label>Promjer</label><input placeholder="16" value={filters.promjer} onChange={e=>setFilters(f=>({...f,promjer:e.target.value}))}/></div>
            <div className="fg" style={{display:'flex',gap:5}}>
              <button className="btn-srch" style={{flex:2}}><I.Search/> Trazi</button>
              <button className="btn-srch" style={{flex:1,background:'var(--border)',color:'var(--muted)'}} onClick={()=>setFilters({sezona:'',sirina:'',visina:'',promjer:'',sifra:''})}>Reset</button>
            </div>
          </div>
        </div>

        <div className="status-tabs">
          <button className={"stab"+(statusTab==='stanje'?' as':'')} onClick={()=>setStatusTab('stanje')}>Na stanju ({stanjeCount})</button>
          <button className={"stab"+(statusTab==='prodato'?' ap':'')} onClick={()=>setStatusTab('prodato')}>Prodato ({prodatoCount})</button>
        </div>
        <div className="res-count">Prikazano: <b>{filtered.length}</b> guma</div>

        {loading?<div className="empty"><p>Ucitavanje...</p></div>
        :filtered.length===0?<div className="empty"><I.Tire/><p>{gume.length===0?'Nema guma. Dodaj prvu!':'Nema rezultata.'}</p></div>
        :<div className="tire-grid">
          {filtered.map(g=>(
            <div key={g.id} className={"tire-card"+(g.prodato?' sold':'')} onClick={()=>setDetailG(g)}>
              <div className="tire-thumb">{g.slike&&g.slike.length>0?<img src={g.slike[0]} alt="" loading="lazy"/>:<I.Tire/>}</div>
              <span className={"bs "+(g.sezona==='Zimska'?'z':'l')}>{g.sezona==='Zimska'?<I.Snow/>:<I.Sun/>} {g.sezona}</span>
              <span className="bsif">{g.sifra}</span>
              {g.prodato&&<div className="bsold">Prodato{g.datum_prodaje?' · '+g.datum_prodaje:''}</div>}
              <div className="tire-info">
                <div className="tire-size">{g.sirina}/{g.visina} R{g.promjer}</div>
                <div className="tire-cod">{g.sifra}</div>
                <div className="tire-loc">{g.polica_kod||'—'}</div>
              </div>
            </div>
          ))}
        </div>}
      </main>

      {/* MODAL: NOVI MAGACIN */}
      {modal==='addMag'&&(<div className="overlay" onClick={()=>setModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Novi magacin <button className="btn-close" onClick={()=>setModal(null)}>×</button></div>
        <div className="fg2"><label>Naziv</label><input autoFocus value={newMagName} onChange={e=>setNewMagName(e.target.value)} placeholder="npr. Magacin Glavni" onKeyDown={e=>e.key==='Enter'&&doAddMag()}/></div>
        <div className="modal-foot"><button className="btn-cancel" onClick={()=>setModal(null)}>Odustani</button><button className="btn-save" onClick={doAddMag}>Kreiraj</button></div>
      </div></div>)}

      {/* MODAL: DODAJ/EDITUJ GUMU */}
      {(modal==='addGuma'||modal==='editGuma')&&(<div className="overlay" onClick={()=>setModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{modal==='editGuma'?'Uredi gumu':'Dodaj gumu'} <button className="btn-close" onClick={()=>setModal(null)}>×</button></div>
        {modal==='addGuma'&&<div className="sifra-prev"><span>Sifra:</span> GU{nextGuNum}</div>}
        <div className="fg2"><label>Sezona *</label>
          <select value={form.sezona} onChange={e=>setForm(f=>({...f,sezona:e.target.value}))}>
            <option value="">— Odaberi —</option><option>Zimska</option><option>Ljetna</option>
          </select>
        </div>
        <div className="two-col">
          <div className="fg2"><label>Sirina (mm) *</label><input type="number" placeholder="205" value={form.sirina} onChange={e=>setForm(f=>({...f,sirina:e.target.value}))}/></div>
          <div className="fg2"><label>Visina (%) *</label><input type="number" placeholder="55" value={form.visina} onChange={e=>setForm(f=>({...f,visina:e.target.value}))}/></div>
        </div>
        <div className="fg2"><label>Promjer (inch) *</label><input type="number" placeholder="16" value={form.promjer} onChange={e=>setForm(f=>({...f,promjer:e.target.value}))}/></div>
        <div className="fg2">
          <label>Sifra police * (obavezno)</label>
          <input className={policaClass} placeholder="npr. P10" value={form.policaKod} onChange={e=>setForm(f=>({...f,policaKod:e.target.value}))} autoComplete="off"/>
          {form.policaKod.trim()&&policaMatch&&<div className="ph ok"><I.Check/> {policaMatch.magacin_naziv} &rsaquo; {policaMatch.prolaz_naziv} &rsaquo; {policaMatch.regal_naziv} &rsaquo; {policaMatch.naziv}</div>}
          {form.policaKod.trim()&&!policaMatch&&<div className="ph err">Polica "{form.policaKod}" ne postoji</div>}
          {submitAttempted&&!policaMatch&&<div className="perr">Polica je obavezna i mora postojati u sistemu</div>}
          {!form.policaKod.trim()&&police.length>0&&<div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Dostupne: {police.map(p=>p.naziv).join(', ')}</div>}
          {police.length===0&&<div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Nema polica u sistemu — admin treba da ih kreira.</div>}
        </div>
        <div className="fg2"><label>Napomena</label><textarea placeholder="Stanje, opis..." value={form.napomena} onChange={e=>setForm(f=>({...f,napomena:e.target.value}))}/></div>
        <div className="fg2">
          <label>Slike</label>
          <div className={"img-zone"+(uploadState.uploading?' uploading':'')} onClick={()=>!uploadState.uploading&&(()=>{if(fileRef.current){fileRef.current.removeAttribute('capture');fileRef.current.click();}})()  }>
            <I.Img/>
            <span>{uploadState.uploading?'Procesiranje slika...':'Klikni za dodavanje slika (vise odjednom)'}</span>
            {!uploadState.uploading&&<span style={{fontSize:10,color:'var(--muted)'}}>JPG, PNG — automatski se optimizuju</span>}
          </div>
          {uploadState.uploading&&(
            <div className="upload-progress">
              <div className="upload-bar-wrap"><div className="upload-bar" style={{width:uploadProgress+'%'}}/></div>
              <div className="upload-status">Obradjena {uploadState.done} od {uploadState.total} slika ({uploadProgress}%)</div>
            </div>
          )}
          <input ref={fileRef} type="file" accept="image/*" multiple capture="environment" style={{display:'none'}} onChange={handleImgs}/>
          <div style={{display:'flex',gap:6,marginTop:5}}>
            <button style={{flex:1,background:'none',border:'1px dashed var(--border)',color:'var(--muted)',borderRadius:5,padding:'5px',fontSize:11,fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,cursor:'pointer',letterSpacing:'1px',textTransform:'uppercase'}}
              onClick={()=>{if(fileRef.current){fileRef.current.removeAttribute('capture');fileRef.current.click();}}}>
              🖼 Galerija
            </button>
            <button style={{flex:1,background:'none',border:'1px dashed var(--accent)',color:'var(--accent)',borderRadius:5,padding:'5px',fontSize:11,fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,cursor:'pointer',letterSpacing:'1px',textTransform:'uppercase'}}
              onClick={()=>{if(fileRef.current){fileRef.current.setAttribute('capture','environment');fileRef.current.click();}}}>
              📷 Kamera
            </button>
          </div>
          {form.slike.length>0&&<div className="img-grid">{form.slike.map((src,i)=>(
            <div key={i} className="img-item">
              <img src={src} alt="" onClick={()=>setLightbox({images:form.slike,index:i})}/>
              <button className="img-rm" onClick={()=>setForm(f=>({...f,slike:f.slike.filter((_,j)=>j!==i)}))}>×</button>
            </div>
          ))}</div>}
        </div>
        <div className="modal-foot">
          <button className="btn-cancel" onClick={()=>setModal(null)}>Odustani</button>
          <button className="btn-save" onClick={doSaveGuma} disabled={!canSave}>
            {uploadState.uploading?'Cekaj upload...':modal==='editGuma'?'Sacuvaj izmjene':'Sacuvaj gumu'}
          </button>
        </div>
      </div></div>)}

      {/* MODAL: DETALJI */}
      {detailG&&!sellModal&&(<div className="overlay" onClick={()=>setDetailG(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">{detailG.sirina}/{detailG.visina} R{detailG.promjer} <button className="btn-close" onClick={()=>setDetailG(null)}>×</button></div>
        <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12}}>
          <span className={"bs "+(detailG.sezona==='Zimska'?'z':'l')} style={{position:'static',display:'inline-flex'}}>{detailG.sezona==='Zimska'?<I.Snow/>:<I.Sun/>} {detailG.sezona}</span>
          <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:17,color:'var(--accent)',letterSpacing:2}}>{detailG.sifra}</span>
        </div>
        {detailG.slike&&detailG.slike.length>0&&(
          <div className="det-imgs">
            {detailG.slike.map((s,i)=>(
              <img key={i} className="thumb" src={s} alt="" onClick={()=>setLightbox({images:detailG.slike,index:i})}/>
            ))}
          </div>
        )}
        <div className="specs-grid">
          <div className="spec-box"><div className="spec-lbl">Sirina</div><div className="spec-val">{detailG.sirina} mm</div></div>
          <div className="spec-box"><div className="spec-lbl">Visina</div><div className="spec-val">{detailG.visina}%</div></div>
          <div className="spec-box"><div className="spec-lbl">Promjer</div><div className="spec-val">R{detailG.promjer}"</div></div>
          <div className="spec-box"><div className="spec-lbl">Sifra</div><div className="spec-val" style={{color:'var(--accent)'}}>{detailG.sifra}</div></div>
        </div>
        {detailG.polica_kod&&<div className="loc-box">Polica: {detailG.polica_kod}</div>}
        {detailG.prodato&&<div className="sold-box">Prodato{detailG.datum_prodaje?' · '+detailG.datum_prodaje:''}{detailG.cijena_prodaje&&<span style={{marginLeft:'auto',fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:14}}>{detailG.cijena_prodaje}</span>}</div>}
        {detailG.napomena&&<><div className="sec-lbl">Napomena</div><p style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>{detailG.napomena}</p></>}
        <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8,fontSize:10,color:'var(--muted)'}}>
          {detailG.dodao_korisnik&&<span>Dodao: <b style={{color:'var(--text)'}}>{detailG.dodao_korisnik}</b></span>}
          {detailG.prodao_korisnik&&<span>· Prodao: <b style={{color:'var(--text)'}}>{detailG.prodao_korisnik}</b></span>}
        </div>
        <div className="modal-foot">
          {isAdmin&&<div className="foot-left"><button className="btn-del-sm" onClick={()=>doDelete(detailG.id)}><I.Trash/> Obrisi</button></div>}
          {!detailG.prodato&&<button className="btn-edit" style={{color:'var(--blue)',borderColor:'rgba(75,142,240,.3)'}} onClick={()=>{setMoveModal(detailG);setMoveKod('');setDetailG(null);}}>📦 Premjesti</button>}
          {!detailG.prodato&&<button className="btn-edit" onClick={()=>openEdit(detailG)}><I.Edit/> Uredi</button>}
          {!detailG.prodato&&<button className="btn-sell" onClick={()=>setSellModal(true)}><I.Sell/> Prodaj</button>}
          {detailG.prodato&&<button className="btn-cancel" onClick={()=>setDetailG(null)}>Zatvori</button>}
        </div>
      </div></div>)}

      {/* MODAL: PRODAJ */}
      {detailG&&sellModal&&(<div className="overlay" onClick={()=>setSellModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Prodaj gumu <button className="btn-close" onClick={()=>setSellModal(false)}>×</button></div>
        <div className="sell-box">
          <p>Prodajes: <strong>{detailG.sifra} — {detailG.sirina}/{detailG.visina} R{detailG.promjer} ({detailG.sezona})</strong></p>
          <div className="fg2" style={{marginTop:10}}>
            <label>Prodajna cijena (opcionalno)</label>
            <div className="price-row">
              <input className="price-inp" type="number" placeholder="0" value={sellPrice} onChange={e=>setSellPrice(e.target.value)} autoFocus onKeyDown={e=>e.key==='Enter'&&doSell()}/>
              <span className="price-curr">KM</span>
            </div>
          </div>
        </div>
        <div className="modal-foot">
          <button className="btn-cancel" onClick={()=>setSellModal(false)}>Odustani</button>
          <button className="btn-sell" onClick={doSell}><I.Sell/> {sellPrice?'Prodaj za '+sellPrice+' KM':'Potvrdi prodaju'}</button>
        </div>
      </div></div>)}

      {/* MODAL: PREMJESTI POLICU */}
      {moveModal&&(<div className="overlay" onClick={()=>setMoveModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Premjesti gumu <button className="btn-close" onClick={()=>setMoveModal(null)}>×</button></div>
        <p style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>
          Guma <b style={{color:'var(--text)'}}>{moveModal.sifra}</b> trenutno je na polici <b style={{color:'var(--accent)'}}>{moveModal.polica_kod||'—'}</b>
        </p>
        {(()=>{
          const pm = police.find(p=>p.naziv.toLowerCase()===moveKod.trim().toLowerCase());
          return (<div className="fg2">
            <label>Nova sifra police</label>
            <input className={moveKod.trim()?(pm?'ok':'err'):''} autoFocus placeholder="npr. P15"
              value={moveKod} onChange={e=>setMoveKod(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&doMovePolica()}/>
            {moveKod.trim()&&pm&&<div className="ph ok"><I.Check/> {pm.magacin_naziv} &rsaquo; {pm.prolaz_naziv} &rsaquo; {pm.regal_naziv} &rsaquo; {pm.naziv}</div>}
            {moveKod.trim()&&!pm&&<div className="ph err">Polica ne postoji</div>}
            {!moveKod.trim()&&police.length>0&&<div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Dostupne: {police.map(p=>p.naziv).join(', ')}</div>}
          </div>);
        })()}
        <div className="modal-foot">
          <button className="btn-cancel" onClick={()=>setMoveModal(null)}>Odustani</button>
          <button className="btn-save" onClick={doMovePolica}>Premjesti</button>
        </div>
      </div></div>)}

      {/* MODAL: ANALITIKA */}
      {showAnalitika&&analitika&&(<div className="overlay" onClick={()=>setShowAnalitika(false)}><div className="modal" style={{maxWidth:580}} onClick={e=>e.stopPropagation()}>
        <div className="modal-title">Analitika <button className="btn-close" onClick={()=>setShowAnalitika(false)}>×</button></div>
        
        {/* KPI kartice */}
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>
          {[
            {label:'Ukupno guma',val:analitika.ukupnoGuma,color:'var(--text)'},
            {label:'Na stanju',val:analitika.naStan,color:'var(--green)'},
            {label:'Prodato',val:analitika.prodatoCount,color:'var(--purple)'},
          ].map(k=>(
            <div key={k.label} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,padding:'10px 12px',textAlign:'center'}}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:9,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)',marginBottom:4}}>{k.label}</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:28,fontWeight:900,color:k.color}}>{k.val}</div>
            </div>
          ))}
        </div>

        {/* Prodaja po sezonama */}
        <div style={{marginBottom:12}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Gume po sezoni</div>
          {analitika.prodajaPoSezonama.map(s=>(
            <div key={s.sezona} style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
              <span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:12,fontWeight:700,width:60,color:'var(--text)'}}>{s.sezona}</span>
              <div style={{flex:1,background:'var(--card)',borderRadius:3,height:8,overflow:'hidden'}}>
                <div style={{height:'100%',width:(analitika.ukupnoGuma>0?(s.ukupno/analitika.ukupnoGuma*100):0)+'%',background:s.sezona==='Zimska'?'var(--blue)':'var(--accent)',borderRadius:3}}/>
              </div>
              <span style={{fontSize:11,color:'var(--muted)',width:50,textAlign:'right'}}>{s.ukupno} ({s.prodato} prod.)</span>
            </div>
          ))}
        </div>

        {/* Aktivnost po mjesecima */}
        {analitika.prodajaPoMjesecima.length>0&&<div style={{marginBottom:12}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Aktivnost (zadnjih 12 mj.)</div>
          <div style={{display:'flex',gap:3,alignItems:'flex-end',height:50}}>
            {[...analitika.prodajaPoMjesecima].reverse().map(m=>{
              const max = Math.max(...analitika.prodajaPoMjesecima.map(x=>x.dodano),1);
              return (<div key={m.mj} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2}}>
                <div style={{width:'100%',background:'var(--accent)',borderRadius:'2px 2px 0 0',height:Math.max(2,Math.round((m.dodano/max)*40))+'px'}} title={'Dodano: '+m.dodano}/>
                <div style={{width:'100%',background:'var(--green)',borderRadius:'2px 2px 0 0',height:Math.max(m.prodano>0?2:0,Math.round((m.prodano/max)*40))+'px'}} title={'Prodano: '+m.prodano}/>
                <span style={{fontSize:7,color:'var(--muted)',transform:'rotate(-45deg)',marginTop:2,whiteSpace:'nowrap'}}>{m.mj.slice(5)}</span>
              </div>);
            })}
          </div>
          <div style={{display:'flex',gap:12,marginTop:4,fontSize:10,color:'var(--muted)'}}>
            <span><span style={{color:'var(--accent)'}}>■</span> Dodano</span>
            <span><span style={{color:'var(--green)'}}>■</span> Prodano</span>
          </div>
        </div>}

        {/* Top radnici */}
        {analitika.topRadnici.length>0&&<div style={{marginBottom:12}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Radnici</div>
          <div style={{display:'flex',flexDirection:'column',gap:4}}>
            {analitika.topRadnici.map(r=>(
              <div key={r.korisnik} style={{display:'flex',alignItems:'center',gap:8,background:'var(--card)',borderRadius:5,padding:'6px 10px'}}>
                <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:13,flex:1}}>{r.korisnik}</span>
                <span style={{fontSize:10,color:'var(--muted)'}}>Dodao: <b style={{color:'var(--text)'}}>{r.dodao}</b></span>
                <span style={{fontSize:10,color:'var(--muted)'}}>Prodao: <b style={{color:'var(--green)'}}>{r.prodao}</b></span>
              </div>
            ))}
          </div>
        </div>}

        {/* Najpunija polica */}
        {analitika.gumePoPolici.length>0&&<div>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Police s najvise guma (na stanju)</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
            {analitika.gumePoPolici.map(p=>(
              <div key={p.polica_kod} style={{background:'rgba(75,142,240,.1)',border:'1px solid rgba(75,142,240,.25)',color:'var(--blue)',borderRadius:4,fontFamily:'Barlow Condensed,sans-serif',fontSize:11,fontWeight:700,padding:'2px 8px'}}>
                {p.polica_kod} <span style={{color:'var(--muted)'}}>{p.guma_count}x</span>
              </div>
            ))}
          </div>
        </div>}

      </div></div>)}

      {/* LIGHTBOX */}
      {lightbox&&<Lightbox images={lightbox.images} startIndex={lightbox.index} onClose={()=>setLightbox(null)}/>}

      {toast&&<div className={"toast"+(toast.type==='err'?' err':'')}>{toast.msg}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
