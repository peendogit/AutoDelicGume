        {g.tip&&<span className={'tip-badge tip-'+g.tip} style={{position:'absolute',bottom:g.prodato?22:7,right:7}}>{g.tip==='komad'?'1 kom':g.tip==='par'?'2 kom':'4 kom'}</span>}
        {g.prodato&&<div className="bsold">Prodato{g.datum_prodaje?' · '+g.datum_prodaje:''}</div>}
        <div className="tire-info">
          <div className="tire-size">{g.sirina}/{g.visina} {promjerDisp(g.promjer)}</div>
          <div className="tire-cod">{g.sifra}</div>
          <div className="tire-loc">{g.loc_magacin?`${g.loc_magacin} › ${g.loc_prolaz} › ${g.loc_regal} › ${g.polica_kod}`:g.polica_kod||'—'}</div>
        </div>
      </div>)}
    </div>}

    {/* DETAIL */}
    {detailG&&!sellModal&&!lightbox&&<div className="overlay" onClick={()=>setDetailG(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">{detailG.sirina}/{detailG.visina} {promjerDisp(detailG.promjer)} <button className="btn-close" onClick={()=>setDetailG(null)}>×</button></div>
      <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12,flexWrap:'wrap'}}>
        <span className={'bs '+(detailG.sezona==='Zimska'?'z':'l')} style={{position:'static',display:'inline-flex'}}>{detailG.sezona==='Zimska'?'❄':'☀'} {detailG.sezona}</span>
        <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:17,color:'var(--accent)',letterSpacing:2}}>{detailG.sifra}</span>
        {detailG.tip&&<span className={'tip-badge tip-'+detailG.tip}>{tipLbl(detailG.tip)}</span>}
      </div>
      {detailG.slike&&detailG.slike.length>0&&<div className="det-imgs">{detailG.slike.map((s,i)=><img key={i} className="thumb" src={s} onClick={()=>setLightbox({images:detailG.slike,index:i})}/>)}</div>}
      {detailG.cijena&&<div style={{background:'rgba(240,180,41,.08)',border:'1px solid rgba(240,180,41,.25)',borderRadius:6,padding:'8px 12px',marginBottom:9,display:'flex',alignItems:'center',justifyContent:'space-between'}}><span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)'}}>Cijena</span><span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:20,fontWeight:900,color:'var(--accent)',letterSpacing:'1px'}}>{detailG.cijena} KM</span></div>}
      <div className="specs-grid">
        <div className="spec-box"><div className="spec-lbl">Širina</div><div className="spec-val">{detailG.sirina} mm</div></div>
        <div className="spec-box"><div className="spec-lbl">Profil</div><div className="spec-val">{detailG.visina}%</div></div>
        <div className="spec-box"><div className="spec-lbl">Prečnik</div><div className="spec-val">{promjerDisp(detailG.promjer)}"</div></div>
        <div className="spec-box"><div className="spec-lbl">Šifra</div><div className="spec-val" style={{color:'var(--accent)'}}>{detailG.sifra}</div></div>
      </div>
      {(detailG.dubina||detailG.dot)&&<div style={{display:'flex',gap:7,marginBottom:8,flexWrap:'wrap'}}>
        {detailG.dubina&&<div className="spec-box" style={{flex:1}}><div className="spec-lbl">Dubina šare</div><div className="spec-val" style={{fontSize:16}}>{detailG.dubina} mm</div></div>}
        {detailG.dot&&<div className="spec-box" style={{flex:1}}><div className="spec-lbl">Godina (DOT)</div><div className="spec-val" style={{fontSize:16}}>{detailG.dot}</div></div>}
      </div>}
      {detailG.polica_kod&&<div className="loc-box">📍 {detailG.loc_magacin&&`${detailG.loc_magacin} › ${detailG.loc_prolaz} › ${detailG.loc_regal} › `}{detailG.polica_kod}</div>}
      {detailG.prodato&&<div className="sold-box">Prodato{detailG.datum_prodaje?' · '+detailG.datum_prodaje:''}{detailG.cijena_prodaje&&<span style={{marginLeft:'auto',fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:14}}>{detailG.cijena_prodaje}</span>}</div>}
      {detailG.napomena&&<><div className="sec-lbl">Napomena</div><p style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>{detailG.napomena}</p></>}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8,fontSize:10,color:'var(--muted)'}}>
        {detailG.dodao_korisnik&&<span>Dodao: <b style={{color:'var(--text)'}}>{detailG.dodao_korisnik}</b></span>}
        {detailG.prodao_korisnik&&<span>· Prodao: <b style={{color:'var(--text)'}}>{detailG.prodao_korisnik}</b></span>}
      </div>
      <div className="modal-foot">
        {isAdmin&&<div className="foot-left"><button className="btn-sm red" onClick={()=>doDel(detailG.id)}><Icons.Trash/> Obriši</button></div>}
        {!detailG.prodato&&<button className="btn-sm" style={{color:'var(--blue)',borderColor:'rgba(88,166,255,.3)'}} onClick={()=>{setMoveModal(detailG);setMoveKod('');setDetailG(null);}}><Icons.Move/> Premjesti</button>}
        <button className="btn-sm" onClick={()=>loadHistorija(detailG.id)}><Icons.History/> Historija</button>
        {!detailG.prodato&&<button className="btn-sm" onClick={()=>openEdit(detailG)}><Icons.Edit/> Uredi</button>}
        {!detailG.prodato&&<button className="btn-save" onClick={()=>setSellModal(true)} style={{background:'var(--green)',color:'#fff'}}>Prodaj</button>}
        {detailG.prodato&&<button className="btn-cancel" onClick={()=>setDetailG(null)}>Zatvori</button>}
      </div>
    </div></div>}

    {/* SELL */}
    {detailG&&sellModal&&<div className="overlay" onClick={()=>setSellModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Prodaj gumu <button className="btn-close" onClick={()=>setSellModal(false)}>×</button></div>
      <div className="sell-box"><p>Prodaješ: <strong>{detailG.sifra} — {detailG.sirina}/{detailG.visina} {promjerDisp(detailG.promjer)} ({detailG.sezona})</strong></p>
        <div className="fg2" style={{marginTop:10}}><label>Prodajna cijena (opcionalno)</label>
          <div className="price-row"><input className="price-inp" type="number" placeholder="0" value={sellPrice} onChange={e=>setSellPrice(e.target.value)} autoFocus onKeyDown={e=>e.key==='Enter'&&doSell()}/><span className="price-curr">KM</span></div>
        </div>
      </div>
      <div className="modal-foot"><button className="btn-cancel" onClick={()=>setSellModal(false)}>Odustani</button><button className="btn-save" style={{background:'var(--green)',color:'#fff'}} onClick={doSell}>{sellPrice?'Prodaj za '+sellPrice+' KM':'Potvrdi prodaju'}</button></div>
    </div></div>}

    {/* MOVE */}
    {moveModal&&<div className="overlay" onClick={()=>setMoveModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Premjesti gumu <button className="btn-close" onClick={()=>setMoveModal(null)}>×</button></div>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Guma <b style={{color:'var(--text)'}}>{moveModal.sifra}</b> trenutno je na polici <b style={{color:'var(--accent)'}}>{moveModal.polica_kod||'—'}</b></p>
      {(()=>{const pm=police.find(p=>p.naziv.toLowerCase()===moveKod.trim().toLowerCase());return(<div className="fg2">
        <label>Nova šifra police</label>
        <input className={moveKod.trim()?(pm?'ok':'err'):''} autoFocus placeholder="npr. P15" value={moveKod} onChange={e=>setMoveKod(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doMove()}/>
        {moveKod.trim()&&pm&&<div className="ph ok"><Icons.Check size={10}/> {pm.magacin_naziv} › {pm.prolaz_naziv} › {pm.regal_naziv} › {pm.naziv}</div>}
        {moveKod.trim()&&!pm&&<div className="ph err">Polica ne postoji</div>}
        {!moveKod.trim()&&police.length>0&&<div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Dostupne: {police.map(p=>p.naziv).join(', ')}</div>}
      </div>);})()}
      <div className="modal-foot"><button className="btn-cancel" onClick={()=>setMoveModal(null)}>Odustani</button><button className="btn-save" onClick={doMove}>Premjesti</button></div>
    </div></div>}

    {/* HISTORIJA */}
    {showHistorija&&<div className="overlay" onClick={()=>setShowHistorija(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Historija premještanja <button className="btn-close" onClick={()=>setShowHistorija(false)}>×</button></div>
      <div style={{maxHeight:'60vh',overflowY:'auto'}}>
        {historijaGuma.length===0?<div style={{textAlign:'center',padding:'30px 0',color:'var(--muted)',fontSize:13}}>Guma nije premještana</div>:
        historijaGuma.map((h,i)=>{const dt=new Date(h.created_at);return(<div key={i} className="log-item">
          <span className="log-badge PREMJESTENA_GUMA">📦</span>
          <div style={{flex:1}}><div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:13,fontWeight:800}}>{h.polica_sa||'—'} → {h.polica_na}</div><div className="log-detail">Premjestio: <b style={{color:'var(--text)'}}>{h.korisnik}</b></div></div>
          <span className="log-time">{dt.toLocaleDateString('sr-Latn-RS')} {dt.toLocaleTimeString('sr-Latn-RS',{hour:'2-digit',minute:'2-digit'})}</span>
        </div>);})}
      </div>
    </div></div>}

    {/* FORM */}
    {modal==='form'&&<div className="overlay" onClick={()=>setModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">{editingId?'Uredi gumu':'Dodaj gumu'} <button className="btn-close" onClick={()=>setModal(null)}>×</button></div>
      {!editingId&&<div className="sifra-prev"><span>Šifra:</span> GU{nextGuNum}</div>}
      <div className="fg2"><label>Sezona *</label><select value={form.sezona} onChange={e=>setForm(f=>({...f,sezona:e.target.value}))}><option value="">— Odaberi —</option><option>Zimska</option><option>Ljetna</option></select></div>
      <div className="two-col">
        <div className="fg2"><label>Širina (mm) *</label><ComboBox value={form.sirina} onChange={v=>setForm(f=>({...f,sirina:v}))} options={sirina_opts} placeholder="Širina..."/></div>
        <div className="fg2"><label>Profil (%) *</label><ComboBox value={form.visina} onChange={v=>setForm(f=>({...f,visina:v}))} options={visina_opts} placeholder="Profil..."/></div>
      </div>
      <div className="fg2"><label>Prečnik *</label><ComboBox value={form.promjer} onChange={v=>setForm(f=>({...f,promjer:v.toUpperCase()}))} options={promjer_opts} placeholder="Prečnik..." normalize={v=>v.toUpperCase()}/></div>
      <div className="fg2"><label>Tip</label><select value={form.tip} onChange={e=>setForm(f=>({...f,tip:e.target.value}))}><option value="">— Odaberi —</option><option value="komad">Komad (1 kom)</option><option value="par">Par (2 kom)</option><option value="set">Set (4 kom)</option></select></div>
      <div className="fg2">
        <label>Šifra police *</label>
        <input className={form.policaKod.trim()?(policaMatch?'ok':'err'):''} placeholder="npr. P10" value={form.policaKod} onChange={e=>setForm(f=>({...f,policaKod:e.target.value}))} autoComplete="off"/>
        {form.policaKod.trim()&&policaMatch&&<div className="ph ok"><Icons.Check size={10}/> {policaMatch.magacin_naziv} › {policaMatch.prolaz_naziv} › {policaMatch.regal_naziv} › {policaMatch.naziv}</div>}
        {form.policaKod.trim()&&!policaMatch&&<div className="ph err">Polica ne postoji</div>}
        {!form.policaKod.trim()&&police.length>0&&<div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Dostupne: {police.map(p=>p.naziv).join(', ')}</div>}
        {submitAttempted&&!policaMatch&&<div style={{marginTop:4,padding:'6px 9px',borderRadius:4,fontSize:11,background:'rgba(248,81,73,.1)',border:'1.5px solid rgba(248,81,73,.5)',color:'var(--red)',fontWeight:600}}>Polica je obavezna i mora postojati u sistemu</div>}
      </div>
      <div className="fg2"><label>Napomena</label><textarea placeholder="Stanje, opis..." value={form.napomena} onChange={e=>setForm(f=>({...f,napomena:e.target.value}))}/></div>
      <div className="two-col">
        <div className="fg2"><label>Dubina šare (mm)</label><input type="number" step="0.5" min="0" max="12" placeholder="npr. 7.5" value={form.dubina} onChange={e=>setForm(f=>({...f,dubina:e.target.value}))}/></div>
        <div className="fg2"><label>Godina (DOT)</label><input type="number" min="2000" max="2099" placeholder="npr. 2022" value={form.dot} onChange={e=>setForm(f=>({...f,dot:e.target.value}))}/></div>
      </div>
      {isAdmin&&<div className="fg2"><label>Cijena (KM)</label>
        <div className="price-row"><input className="price-inp" type="number" min="0" step="0.5" placeholder="0.00" value={form.cijena} onChange={e=>setForm(f=>({...f,cijena:e.target.value}))}/><span className="price-curr">KM</span></div>
      </div>}
      <ImgUploadUI {...imgHook} onThumbClick={i=>setLightbox({images:imgHook.slike,index:i})}/>
      <div className="modal-foot">
        <button className="btn-cancel" onClick={()=>setModal(null)}>Odustani</button>
        <button className="btn-save" onClick={doSave} disabled={!canSave}>{imgHook.uploadState.uploading?'Čekaj slanje...':editingId?'Sačuvaj izmjene':'Sačuvaj gumu'}</button>
      </div>
    </div></div>}
  <div className="site-footer">© 2025 <span>Delite Solutions</span></div>
  </div>);
}

// ===== PODESAVANJA MODULE =====
function PodesavanjaModul({user,showToast,magacini,setMagacini,police,loadPolice}){
  const [setTab,setSetTab]=useState('magacin');
  const [korisnici,setKorisnici]=useState([]);
  const [openMag,setOpenMag]=useState({});const [openProlaz,setOpenProlaz]=useState({});const [openRegal,setOpenRegal]=useState({});
  const [customPolica,setCustomPolica]=useState({});
  const [newMagName,setNewMagName]=useState('');
  const [newUser,setNewUser]=useState({username:'',password:'',role:'radnik'});
  const [editUser,setEditUser]=useState(null);
  const [customSirina,setCustomSirina]=useState(()=>{try{return JSON.parse(localStorage.getItem('adg_sirina')||'[]');}catch{return [];}});
  const [customVisina,setCustomVisina]=useState(()=>{try{return JSON.parse(localStorage.getItem('adg_visina')||'[]');}catch{return [];}});
  const [customPromjer,setCustomPromjer]=useState(()=>{try{return JSON.parse(localStorage.getItem('adg_promjer')||'[]');}catch{return [];}});
  const [newDimVal,setNewDimVal]=useState({sirina:'',visina:'',promjer:''});

  const loadKorisnici=async()=>{try{const k=await api('/korisnici');setKorisnici(k);}catch(e){showToast(e.message,'err');}};
  useEffect(()=>{if(setTab==='korisnici')loadKorisnici();},[setTab]);

  const doDelMag=async(id)=>{if(!window.confirm('Brisanje magacina će obrisati i sve prolaze, regale i police unutar njega.\nDa li ste sigurni?'))return;await api('/magacini/'+id,{method:'DELETE'});setMagacini(p=>p.filter(m=>m.id!=id));await loadPolice();showToast('Magacin obrisan');};
  const doAddMag=async()=>{if(!newMagName.trim())return;try{const m=await api('/magacini',{method:'POST',body:{naziv:newMagName.trim()}});m.prolazi=[];setMagacini(p=>[...p,m]);setOpenMag(p=>({...p,[m.id]:true}));setNewMagName('');showToast('Magacin "'+newMagName.trim()+'" kreiran');}catch(e){showToast(e.message,'err');}};
  const doAddProlaz=async(mid)=>{const pr=await api('/prolazi',{method:'POST',body:{magacin_id:mid}});pr.regali=[];setMagacini(p=>p.map(m=>m.id!=mid?m:{...m,prolazi:[...m.prolazi,pr]}));setOpenProlaz(p=>({...p,[pr.id]:true}));};
  const doDelProlaz=async(mid,pid)=>{if(!window.confirm('Obrisati prolaz i sve u njemu?'))return;await api('/prolazi/'+pid,{method:'DELETE'});setMagacini(p=>p.map(m=>m.id!=mid?m:{...m,prolazi:m.prolazi.filter(pr=>pr.id!=pid)}));await loadPolice();};
  const doAddRegal=async(mid,pid)=>{const r=await api('/regali',{method:'POST',body:{prolaz_id:pid}});r.police=[];setMagacini(p=>p.map(m=>m.id!=mid?m:{...m,prolazi:m.prolazi.map(pr=>pr.id!=pid?pr:{...pr,regali:[...pr.regali,r]})}));setOpenRegal(p=>({...p,[r.id]:true}));};
  const doDelRegal=async(mid,pid,rid)=>{if(!window.confirm('Obrisati regal i sve police u njemu?'))return;await api('/regali/'+rid,{method:'DELETE'});setMagacini(p=>p.map(m=>m.id!=mid?m:{...m,prolazi:m.prolazi.map(pr=>pr.id!=pid?pr:{...pr,regali:pr.regali.filter(r=>r.id!=rid)})}));await loadPolice();};
  const doAddPolica=async(mid,pid,rid)=>{try{const pl=await api('/police/auto',{method:'POST',body:{regal_id:rid}});setMagacini(p=>p.map(m=>m.id!=mid?m:{...m,prolazi:m.prolazi.map(pr=>pr.id!=pid?pr:{...pr,regali:pr.regali.map(r=>r.id!=rid?r:{...r,police:[...r.police,pl]})})}));setOpenRegal(p=>({...p,[rid]:true}));await loadPolice();}catch(e){showToast(e.message,'err');}};
  const doAddCustomPolica=async(rid,mid,pid)=>{const raw=(customPolica[rid]||'').trim();if(!raw)return;try{const pl=await api('/police/custom',{method:'POST',body:{regal_id:rid,naziv:raw}});setMagacini(p=>p.map(m=>m.id!=mid?m:{...m,prolazi:m.prolazi.map(pr=>pr.id!=pid?pr:{...pr,regali:pr.regali.map(r=>r.id!=rid?r:{...r,police:[...r.police,pl]})})}));setCustomPolica(p=>({...p,[rid]:''}));setOpenRegal(p=>({...p,[rid]:true}));await loadPolice();}catch(e){showToast(e.message,'err');}};
  const doDelPolica=async(mid,pid,rid,plid)=>{if(!window.confirm('Obrisati policu?'))return;await api('/police/'+plid,{method:'DELETE'});setMagacini(p=>p.map(m=>m.id!=mid?m:{...m,prolazi:m.prolazi.map(pr=>pr.id!=pid?pr:{...pr,regali:pr.regali.map(r=>r.id!=rid?r:{...r,police:r.police.filter(pl=>pl.id!=plid)})})}));await loadPolice();};
  const doAddUser=async()=>{if(!newUser.username||!newUser.password){showToast('Unesite korisničko ime i lozinku','err');return;}try{const k=await api('/korisnici',{method:'POST',body:newUser});setKorisnici(p=>[...p,k]);setNewUser({username:'',password:'',role:'radnik'});showToast('Korisnik "'+k.username+'" kreiran');}catch(e){showToast(e.message,'err');}};
  const doDelUser=async(id)=>{if(!window.confirm('Da li ste sigurni da želite obrisati ovog korisnika?'))return;await api('/korisnici/'+id,{method:'DELETE'});setKorisnici(p=>p.filter(k=>k.id!=id));showToast('Korisnik obrisan');};
  const doEditUser=async()=>{if(!editUser||!editUser.username.trim()){showToast('Korisničko ime je obavezno','err');return;}try{const body={username:editUser.username.trim(),role:editUser.role};if(editUser.password.trim())body.password=editUser.password.trim();const updated=await api('/korisnici/'+editUser.id,{method:'PUT',body});setKorisnici(p=>p.map(k=>k.id===updated.id?updated:k));setEditUser(null);showToast('Korisnik "'+updated.username+'" ažuriran');}catch(e){showToast(e.message,'err');}};
  const doBackup=async()=>{try{showToast('Preuzimanje rezervne kopije...');const res=await fetch('/api/backup',{headers:{'Authorization':'Bearer '+getToken()}});if(!res.ok){const d=await res.json();showToast(d.error||'Greška','err');return;}const blob=await res.blob();const url=URL.createObjectURL(blob);const a=document.createElement('a');const date=new Date().toISOString().slice(0,10);a.href=url;a.download='autodelic-backup-'+date+'.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);showToast('Rezervna kopija preuzeta!');}catch(e){showToast('Greška: '+e.message,'err');}};
  const addCustomDim=(type,val)=>{val=val.trim();if(!val)return;if(type==='sirina'){const n=[...customSirina,val];setCustomSirina(n);localStorage.setItem('adg_sirina',JSON.stringify(n));}if(type==='visina'){const n=[...customVisina,val];setCustomVisina(n);localStorage.setItem('adg_visina',JSON.stringify(n));}if(type==='promjer'){const n=[...customPromjer,val.toUpperCase()];setCustomPromjer(n);localStorage.setItem('adg_promjer',JSON.stringify(n));}setNewDimVal(p=>({...p,[type]:''}));showToast('Dimenzija dodana');};
  const removeCustomDim=(type,val)=>{if(type==='sirina'){const n=customSirina.filter(x=>x!==val);setCustomSirina(n);localStorage.setItem('adg_sirina',JSON.stringify(n));}if(type==='visina'){const n=customVisina.filter(x=>x!==val);setCustomVisina(n);localStorage.setItem('adg_visina',JSON.stringify(n));}if(type==='promjer'){const n=customPromjer.filter(x=>x!==val);setCustomPromjer(n);localStorage.setItem('adg_promjer',JSON.stringify(n));}};

  return(<div className="page">
    <div className="set-tabs">
      <button className={'set-tab'+(setTab==='magacin'?' on':'')} onClick={()=>setSetTab('magacin')}>🏠 Magacin</button>
      <button className={'set-tab'+(setTab==='korisnici'?' on':'')} onClick={()=>setSetTab('korisnici')}>👥 Korisnici</button>
      <button className={'set-tab'+(setTab==='dimenzije'?' on':'')} onClick={()=>setSetTab('dimenzije')}>📐 Dimenzije</button>
    </div>

    {setTab==='magacin'&&<>
      <div style={{display:'flex',justifyContent:'flex-end',marginBottom:10}}>
        <div style={{display:'flex',gap:6}}>
          <input className="cust-inp" style={{width:160,fontSize:12,padding:'4px 9px'}} placeholder="Naziv magacina" value={newMagName} onChange={e=>setNewMagName(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doAddMag()}/>
          <button className="btn-new" onClick={doAddMag}><Icons.Plus size={11}/> Dodaj</button>
        </div>
      </div>
      {magacini.map(m=><div key={m.id} className="mag-card">
        <div className="tree-row" onClick={()=>setOpenMag(p=>({...p,[m.id]:!p[m.id]}))}>

// ===== PREMJEŠTANJE WIDGET (na Dashboardu) =====
function PremjestanjeWidget({showToast}){
  const [sifre,setSifre]=useState('');
  const [policaKod,setPolicaKod]=useState('');
  const [police,setPolice]=useState([]);
  const [rezultat,setRezultat]=useState(null);
  const [loading,setLoading]=useState(false);

  useEffect(()=>{api('/police').then(setPolice).catch(()=>{});},[]);

  const policaMatch=useMemo(()=>{
    if(!policaKod.trim())return null;
    return police.find(p=>p.naziv.toLowerCase()===policaKod.trim().toLowerCase())||null;
  },[policaKod,police]);

  const doMove=async()=>{
    const lista=sifre.split(/[\n,\s]+/).map(s=>s.trim().toUpperCase()).filter(Boolean);
    if(!lista.length){showToast('Unesite šifre guma','err');return;}
    if(!policaMatch){showToast('Polica ne postoji','err');return;}
    setLoading(true);
    try{
      const r=await api('/gume/batch-premjesti',{method:'POST',body:{sifre:lista,policaKod:policaMatch.naziv}});
      setRezultat(r);
      showToast(r.uspjesno+' od '+lista.length+' guma premješteno na '+policaMatch.naziv);
      if(r.uspjesno===lista.length){setSifre('');setPolicaKod('');}
    }catch(e){showToast(e.message,'err');}
    setLoading(false);
  };

  return(<div>
    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:10}}>
      <div className="fg2" style={{marginBottom:0}}>
        <label>Šifre guma (jedna ili više)</label>
        <textarea style={{width:'100%',background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:5,color:'var(--text)',fontFamily:'Barlow Condensed,sans-serif',fontSize:13,fontWeight:700,padding:'8px 10px',outline:'none',resize:'vertical',minHeight:72,letterSpacing:'1px',textTransform:'uppercase'}}
          placeholder={"GU10\nGU11\nGU12"} value={sifre} onChange={e=>setSifre(e.target.value)}/>
        <div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>Razdvoji enterom, zarezom ili razmakom</div>
      </div>
      <div className="fg2" style={{marginBottom:0}}>
        <label>Nova polica</label>
        <input style={{width:'100%',background:'var(--card)',border:'1.5px solid '+(policaKod.trim()?(policaMatch?'var(--green)':'var(--red)'):'var(--border)'),borderRadius:5,color:'var(--text)',fontFamily:'Barlow Condensed,sans-serif',fontSize:16,fontWeight:800,padding:'8px 10px',outline:'none',letterSpacing:'1px',textTransform:'uppercase'}}
          placeholder="P10" value={policaKod} onChange={e=>setPolicaKod(e.target.value.toUpperCase())}/>
        {policaKod.trim()&&policaMatch&&<div style={{fontSize:10,color:'var(--green)',marginTop:3}}>✓ {policaMatch.magacin_naziv} › {policaMatch.prolaz_naziv} › {policaMatch.regal_naziv}</div>}
        {policaKod.trim()&&!policaMatch&&<div style={{fontSize:10,color:'var(--red)',marginTop:3}}>Polica ne postoji</div>}
        {!policaKod.trim()&&police.length>0&&<div style={{fontSize:9,color:'var(--muted)',marginTop:3}}>Dostupne: {police.slice(0,8).map(p=>p.naziv).join(', ')}{police.length>8&&'...'}</div>}
      </div>
    </div>
    <button className="btn-add-main" style={{width:'100%',justifyContent:'center'}} onClick={doMove} disabled={loading||!policaMatch||!sifre.trim()}>
      {loading?'Premještanje...':'📦 Premjesti gume'}
    </button>
    {rezultat&&<div style={{marginTop:10,background:'var(--card)',borderRadius:6,padding:'10px 12px'}}>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:12,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)',marginBottom:6}}>Rezultat premještanja</div>
      {rezultat.rezultati.map((r,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,fontSize:12,padding:'3px 0'}}>
        <span style={{color:r.ok?'var(--green)':'var(--red)',fontSize:14}}>{r.ok?'✓':'✗'}</span>
        <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>{r.sifra}</span>
        <span style={{color:'var(--muted)'}}>{r.ok?'→ '+r.polica_nova:r.greska}</span>
      </div>)}
    </div>}
  </div>);
}

function FinansijeModul({showToast}){

    setLoading(true);
    try{const d=await api('/finansije?period='+p);setData(d);}

  useEffect(()=>{load(period);},[period]);

  const prihodGume=useMemo(()=>{
    if(!data)return 0;
    return (data.gumeProdate||[]).reduce((s,g)=>{
      const v=parseFloat((g.cijena_prodaje||'0 KM').split(' ')[0].replace(',','.'))||0;
      return s+v;

  },[data]);

  const ukupniTroskovi=useMemo(()=>{

  const PERIOD_OPTS=[['danas','Danas'],['sedmica','7 dana'],['mjesec','Ovaj mj.'],['godina','Ova god.'],['sve','Sve']];

      <div className="kpi-grid" style={{gridTemplateColumns:'repeat(auto-fill,minmax(140px,1fr))'}}>
        <div className="kpi green"><div className="kpi-lbl">Prihod — Gume</div><div className="kpi-val" style={{color:'var(--green)',fontSize:22}}>{prihodGume.toLocaleString('sr-Latn-RS')} KM</div><div className="kpi-sub">{data.gumeProdate?.length||0} prodanih</div></div>
        <div className="kpi blue"><div className="kpi-lbl">Prihod — Auta</div><div className="kpi-val" style={{color:'var(--blue)',fontSize:22}}>{prihodAuta.toLocaleString('sr-Latn-RS')} KM</div><div className="kpi-sub">{data.autaProdana?.length||0} prodanih</div></div>
        <div className="kpi red"><div className="kpi-lbl">Troškovi otpada</div><div className="kpi-val" style={{color:'var(--red)',fontSize:22}}>{ukupniTroskovi.toLocaleString('sr-Latn-RS')} KM</div></div>
        <div className="kpi accent"><div className="kpi-lbl">Neto (prihod-trošak)</div><div className="kpi-val" style={{color:(prihodGume+prihodAuta-ukupniTroskovi)>=0?'var(--green)':'var(--red)',fontSize:22}}>{(prihodGume+prihodAuta-ukupniTroskovi).toLocaleString('sr-Latn-RS')} KM</div></div>
      </div>

      {/* Vrijednost lagera */}
      <div className="card-panel">
        <div className="section-title">Vrijednost lagera (trenutno na stanju)</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10}}>

      {(data.autaProdana||[]).length>0&&<div className="card-panel">
        <div className="section-title">Prodana auta ({data.autaProdana.length})</div>
        <div style={{maxHeight:200,overflowY:'auto'}}>
          {data.autaProdana.map((a,i)=><div key={i} style={{display:'flex',alignItems:'center',gap:8,padding:'5px 0',borderBottom:'1px solid var(--border)',fontSize:12}}>

            {a.nabavna_cijena&&<span style={{color:'var(--red)',fontSize:11}}>{a.nabavna_cijena} KM</span>}

      </div>}
    </>}
    <div className="site-footer">© 2025 <span>Delite Solutions</span></div>

// ===== TROŠKOVI OTPADA MODULE =====
function TroskoviOtpadaModul({showToast}){
  const [lista,setLista]=useState([]);const [modal,setModal]=useState(false);
  const [form,setForm]=useState({kategorija:'',opis:'',iznos:'',datum:new Date().toISOString().slice(0,10)});
  const [filterMj,setFilterMj]=useState(new Date().toISOString().slice(0,7));

  const KATEGORIJE=['Gorivo','Radnici','Režije (struja, voda)','Alat i oprema','Održavanje vozila','Zakup','Osiguranje','Ostalo'];

  const load=async()=>{try{const d=await api('/troskovi-otpada');setLista(d);}catch(e){showToast(e.message,'err');}};
  useEffect(()=>{load();},[]);

  const filtered=useMemo(()=>lista.filter(t=>!filterMj||t.datum.startsWith(filterMj)),[lista,filterMj]);
  const ukupno=useMemo(()=>filtered.reduce((s,t)=>s+(parseFloat(t.iznos)||0),0),[filtered]);
  const poKat=useMemo(()=>{
    const m={};filtered.forEach(t=>{m[t.kategorija]=(m[t.kategorija]||0)+(parseFloat(t.iznos)||0);});
    return Object.entries(m).sort((a,b)=>b[1]-a[1]);
  },[filtered]);

  const doAdd=async()=>{
    if(!form.kategorija||!form.iznos){showToast('Kategorija i iznos su obavezni','err');return;}
    try{const t=await api('/troskovi-otpada',{method:'POST',body:form});setLista(p=>[t,...p]);setModal(false);setForm({kategorija:'',opis:'',iznos:'',datum:new Date().toISOString().slice(0,10)});showToast('Trošak dodan');}
    catch(e){showToast(e.message,'err');}
  };

  const doDel=async(id)=>{if(!window.confirm('Obrisati trošak?'))return;await api('/troskovi-otpada/'+id,{method:'DELETE'});setLista(p=>p.filter(t=>t.id!=id));showToast('Trošak obrisan');};

  const mjeseci=useMemo(()=>[...new Set(lista.map(t=>t.datum.slice(0,7)))].sort().reverse(),[lista]);

  return(<div className="page">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
      <div><div className="page-title">Troškovi otpada</div><div className="page-sub">Gorivo, radnici, režije i ostalo</div></div>
      <button className="btn-add-main" onClick={()=>setModal(true)}><Icons.Plus size={13}/> Dodaj trošak</button>
    </div>

    {/* Filter po mjesecu */}
    <div style={{display:'flex',gap:6,marginBottom:12,flexWrap:'wrap',alignItems:'center'}}>
      <span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:9,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)'}}>Mjesec:</span>
      <button className={'stab'+(filterMj===''?' as':'')} style={{flex:'none',padding:'4px 10px'}} onClick={()=>setFilterMj('')}>Svi</button>
      {mjeseci.slice(0,6).map(m=><button key={m} className={'stab'+(filterMj===m?' as':'')} style={{flex:'none',padding:'4px 10px'}} onClick={()=>setFilterMj(m)}>{m}</button>)}
    </div>

    {/* Summary */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(130px,1fr))',gap:8,marginBottom:14}}>
      <div className="kpi red" style={{padding:'10px 12px'}}><div className="kpi-lbl">Ukupno</div><div className="kpi-val" style={{color:'var(--red)',fontSize:22}}>{ukupno.toLocaleString('sr-Latn-RS')} KM</div></div>
      {poKat.slice(0,3).map(([k,v])=><div key={k} className="kpi" style={{padding:'10px 12px'}}><div className="kpi-lbl">{k}</div><div className="kpi-val" style={{fontSize:18}}>{v.toLocaleString('sr-Latn-RS')} KM</div></div>)}
    </div>

    {/* Lista */}
    {filtered.length===0?<div className="empty"><Icons.Money size={36}/><p>Nema troškova za ovaj period.</p></div>:
    <div style={{display:'flex',flexDirection:'column',gap:5}}>
      {filtered.map(t=><div key={t.id} style={{display:'flex',alignItems:'center',gap:10,background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,padding:'9px 12px'}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:1}}>
            <span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:12,fontWeight:800}}>{t.kategorija}</span>
            {t.opis&&<span style={{fontSize:11,color:'var(--muted)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{t.opis}</span>}
          </div>
          <div style={{fontSize:10,color:'var(--muted)'}}>{t.datum} · {t.korisnik}</div>
        </div>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:16,fontWeight:900,color:'var(--red)',flexShrink:0}}>{parseFloat(t.iznos).toLocaleString('sr-Latn-RS')} KM</div>
        <button className="del-btn" onClick={()=>doDel(t.id)}><Icons.Trash/></button>
      </div>)}
    </div>}

    {modal&&<div className="overlay" onClick={()=>setModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Novi trošak <button className="btn-close" onClick={()=>setModal(false)}>×</button></div>
      <div className="fg2"><label>Kategorija *</label>
        <select value={form.kategorija} onChange={e=>setForm(f=>({...f,kategorija:e.target.value}))}>
          <option value="">— Odaberi —</option>
          {KATEGORIJE.map(k=><option key={k} value={k}>{k}</option>)}
        </select>
      </div>
      <div className="fg2"><label>Opis</label><input placeholder="Detalji..." value={form.opis} onChange={e=>setForm(f=>({...f,opis:e.target.value}))}/></div>
      <div className="two-col">
        <div className="fg2"><label>Iznos (KM) *</label>
          <div className="price-row"><input className="price-inp" type="number" min="0" step="0.5" placeholder="0" value={form.iznos} onChange={e=>setForm(f=>({...f,iznos:e.target.value}))}/><span className="price-curr">KM</span></div>
        </div>
        <div className="fg2"><label>Datum</label><input type="date" value={form.datum} onChange={e=>setForm(f=>({...f,datum:e.target.value}))}/></div>
      </div>
      <div className="modal-foot"><button className="btn-cancel" onClick={()=>setModal(false)}>Odustani</button><button className="btn-save" onClick={doAdd}>Dodaj trošak</button></div>
    </div></div>}
    <div className="site-footer">© 2025 <span>Delite Solutions</span></div>
  </div>);
}

// ===== MAIN APP =====
function App(){
  const [user,setUser]=useState(null);const [authChecked,setAuthChecked]=useState(false);
  const [page,setPage]=useState('dashboard');
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [theme,setTheme]=useState(()=>localStorage.getItem('adg_theme')||'dark');
  const [lightbox,setLightbox]=useState(null);
  // Gume state (lifted for cross-module use)
  const [police,setPolice]=useState([]);
  const [magacini,setMagacini]=useState([]);
  const [gume,setGume]=useState([]);
  const [gumeLoaded,setGumeLoaded]=useState(false);

  const isAdmin=user?.role==='admin';

  useEffect(()=>{document.body.className=theme==='light'?'light':'';localStorage.setItem('adg_theme',theme);},[theme]);
  useEffect(()=>{
    const t=getToken();if(!t){setAuthChecked(true);return;}
    api('/auth/me').then(u=>{setUser(u);setAuthChecked(true);}).catch(()=>{localStorage.removeItem('adg_token');setAuthChecked(true);});
  },[]);

  const showToast=useCallback((msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);},[]);

  const loadPoliceAndMag=async()=>{
    try{const [p,m]=await Promise.all([api('/police'),api('/magacini')]);setPolice(p);setMagacini(m);}catch(e){}
  };

  const loadGume=async()=>{
    try{const g=await api('/gume');setGume(g);setGumeLoaded(true);}catch(e){showToast(e.message,'err');}
  };

  useEffect(()=>{if(user){loadPoliceAndMag();}}, [user]);
  useEffect(()=>{if(user&&(page==='gume'||page==='dashboard')&&!gumeLoaded)loadGume();},[user,page]);

  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [offlineQueue] = useState([]);

  useEffect(()=>{
    const on=()=>{ setIsOnline(true); showToast('Konekcija vraćena ✓'); };
    const off=()=>setIsOnline(false);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);

  const doLogout=async()=>{try{await api('/auth/logout',{method:'POST'});}catch(e){}localStorage.removeItem('adg_token');setUser(null);setGume([]);setGumeLoaded(false);};
  const nav=(p)=>{setPage(p);setSidebarOpen(false);};

  if(!authChecked)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--muted)',fontFamily:'Barlow Condensed',fontSize:14,letterSpacing:2}}>UČITAVANJE...</div>;
  if(!user)return<LoginScreen onLogin={setUser}/>;

  const navItems=[
    {id:'dashboard',label:'Pregled',icon:<Icons.Home size={18}/>,always:true},
    {id:'gume',label:'Gume',icon:<Icons.Tire size={18}/>,always:true},
    {id:'auta',label:'Auta',icon:<Icons.Car size={18}/>,always:true},
    {id:'zadaci',label:'Zadaci',icon:<Icons.Task size={18}/>,adminOnly:true},
    {id:'troskovi',label:'Troškovi',icon:<Icons.Money size={18}/>,adminOnly:true},
    {id:'analitika',label:'Analitika',icon:<Icons.Chart size={18}/>,adminOnly:true},
    {id:'log',label:'Dnevnik',icon:<Icons.Log size={18}/>,adminOnly:true},
    {id:'finansije',label:'Finansije',icon:<Icons.Money size={18}/>,adminOnly:true},
    {id:'troskovi_otpada',label:'Troškovi',icon:<Icons.Trash size={18}/>,adminOnly:true},
    {id:'podesavanja',label:'Podešavanja',icon:<Icons.Gear size={18}/>,adminOnly:true},
  ].filter(i=>i.always||(i.adminOnly&&isAdmin));

  const pageTitles={dashboard:'Pregled',gume:'Gume',auta:'Auta',zadaci:'Zadaci',troskovi:'Troškovi popravke',finansije:'Finansijski izvještaj',troskovi_otpada:'Troškovi otpada',analitika:'Analitika',log:'Dnevnik aktivnosti',podesavanja:'Podešavanja'};

  return(<div className="layout">
    {/* SIDEBAR OVERLAY on mobile */}
    {sidebarOpen&&<div style={{position:'fixed',inset:0,background:'rgba(0,0,0,.5)',zIndex:99}} onClick={()=>setSidebarOpen(false)}/>}

    {/* SIDEBAR */}
    <aside className={'sidebar'+(sidebarOpen?' open':'')}>
      <div className="sb-logo">
        <span className="sb-logo-icon"><Icons.Car size={22}/></span>
        <div className="sb-logo-text">Auto Delić<span>Upravljanje otpadom</span></div>
      </div>
      <nav className="sb-nav">
        {navItems.map(item=><button key={item.id} className={'sb-item'+(page===item.id?' active':'')} onClick={()=>nav(item.id)}>
          <span className="icon">{item.icon}</span>{item.label}
        </button>)}
      </nav>
      <div className="sb-bottom">
        <div className="sb-user">
          <div style={{flex:1,minWidth:0}}>
            <div className="sb-user-name">{user.username}</div>
          </div>
          <span className={'sb-user-badge '+user.role}>{user.role}</span>
        </div>
        <div style={{display:'flex',gap:5}}>
          <button className="tb-btn" style={{flex:1}} title={theme==='dark'?'Svijetla tema':'Tamna tema'} onClick={()=>setTheme(t=>t==='dark'?'light':'dark')}>{theme==='dark'?'☀️':'🌙'}</button>
          <button className="tb-btn" style={{flex:1,color:'var(--red)',borderColor:'rgba(248,81,73,.3)'}} title="Odjava" onClick={doLogout}><Icons.Logout size={16}/></button>
        </div>
      </div>
    </aside>

    {/* MAIN CONTENT */}
    <div className="content">
      <div className="topbar">
        <button className="topbar-burger" onClick={()=>setSidebarOpen(s=>!s)}>
          <span/><span/><span/>
        </button>
        <div className="topbar-title">{pageTitles[page]||page}</div>
        <div className="topbar-actions">
        </div>
      </div>

      {/* PAGES */}
      {page==='dashboard'&&<ErrorBoundary><Dashboard user={user} onNav={nav} showToast={showToast}/></ErrorBoundary>}
      {page==='gume'&&<ErrorBoundary><GumeModul user={user} showToast={showToast} gume={gume} setGume={setGume} police={police} magacini={magacini} loadPolice={loadPoliceAndMag} lightbox={lightbox} setLightbox={setLightbox}/></ErrorBoundary>}
      {page==='auta'&&<ErrorBoundary><AutaModul user={user} showToast={showToast}/></ErrorBoundary>}
      {page==='zadaci'&&isAdmin&&<ZadaciModul user={user} showToast={showToast}/>}
      {page==='troskovi'&&isAdmin&&<TroskoviModul user={user} showToast={showToast}/>}
      {page==='analitika'&&isAdmin&&<AnalitikaModul showToast={showToast}/>}
      {page==='log'&&isAdmin&&<LogModul showToast={showToast}/>}
      {page==='finansije'&&isAdmin&&<ErrorBoundary><FinansijeModul showToast={showToast}/></ErrorBoundary>}
      {page==='troskovi_otpada'&&isAdmin&&<TroskoviOtpadaModul showToast={showToast}/>}
      {page==='podesavanja'&&isAdmin&&<PodesavanjaModul user={user} showToast={showToast} magacini={magacini} setMagacini={setMagacini} police={police} loadPolice={loadPoliceAndMag}/>}
    </div>

    {lightbox&&<Lightbox images={lightbox.images} startIndex={lightbox.index} onClose={()=>setLightbox(null)}/>}
    {!isOnline&&<div className="offline-bar">⚡ Nema interneta — podaci se ne mogu osvježiti</div>}
    {toast&&<div className={'toast'+(toast.type==='err'?' err':'')}>{toast.msg}</div>}
  </div>);
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
