<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Auto Delić"/>
<link rel="manifest" href="/manifest.json"/>
<link rel="apple-touch-icon" href="/icon-192.png"/>
<title>Auto Delić</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.4/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surf:#161b22;--card:#21262d;--border:#30363d;--accent:#f0b429;--red:#f85149;--blue:#58a6ff;--green:#3fb950;--purple:#bc8cff;--text:#e6edf3;--muted:#8b949e;--radius:10px}
.light{--bg:#f6f8fa;--surf:#ffffff;--card:#f0f3f6;--border:#d0d7de;--accent:#b35f00;--red:#cf222e;--blue:#0969da;--green:#1a7f37;--purple:#8250df;--text:#1f2328;--muted:#57606a;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}

/* ===== LAYOUT ===== */
.layout{display:flex;min-height:100vh}
.sidebar{width:220px;background:var(--surf);border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .25s}
.sidebar.closed{transform:translateX(-220px)}
.content{flex:1;margin-left:220px;min-height:100vh;display:flex;flex-direction:column;transition:margin .25s}
.content.full{margin-left:0}
@media(max-width:768px){.sidebar{transform:translateX(-220px)}.sidebar.open{transform:translateX(0)}.content{margin-left:0}}
@media(min-width:769px){.sidebar{transform:translateX(0)}.content{margin-left:220px}}

/* SIDEBAR */
.sb-logo{padding:18px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{color:var(--accent)}
.sb-logo-text{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;text-transform:uppercase;line-height:1}
.sb-logo-text span{color:var(--muted);font-weight:400;font-size:10px;display:block;letter-spacing:1px}
.sb-nav{flex:1;padding:10px 8px;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:7px;cursor:pointer;font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);transition:all .15s;user-select:none;border:none;background:none;width:100%;text-align:left}
.sb-item:hover{background:rgba(255,255,255,.05);color:var(--text)}
.sb-item.active{background:rgba(240,180,41,.12);color:var(--accent)}
.sb-item .icon{width:18px;flex-shrink:0;opacity:.7}
.sb-item.active .icon{opacity:1}
.sb-sep{height:1px;background:var(--border);margin:6px 0}
.sb-section{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:8px 12px 4px;opacity:.6}
.sb-bottom{padding:10px 8px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:9px;padding:8px 10px;background:var(--card);border-radius:7px;margin-bottom:6px}
.sb-user-name{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:800;letter-spacing:.5px}
.sb-user-role{font-size:10px;color:var(--muted)}
.sb-user-badge{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;margin-left:auto}
.sb-user-badge.admin{background:rgba(240,180,41,.15);color:var(--accent)}
.sb-user-badge.radnik{background:rgba(88,166,255,.12);color:var(--blue)}

/* TOPBAR */
.topbar{height:52px;background:var(--surf);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:10px;position:sticky;top:0;z-index:50}
.topbar-burger{background:none;border:none;color:var(--muted);cursor:pointer;padding:4px;display:flex;flex-direction:column;gap:5px}
.topbar-burger span{display:block;width:20px;height:2px;background:currentColor;border-radius:2px}
.topbar-title{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:1px;text-transform:uppercase;flex:1}
.topbar-actions{display:flex;gap:6px;align-items:center}
.tb-btn{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:7px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;flex-shrink:0}
.tb-btn:hover{border-color:var(--accent);color:var(--accent)}
.btn-add-main{background:var(--accent);color:#000;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}

/* PAGE */
.page{padding:16px;max-width:1280px;margin:0 auto;width:100%}
.page-header{margin-bottom:18px}
.page-title{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:900;letter-spacing:2px;text-transform:uppercase}
.page-sub{color:var(--muted);font-size:13px;margin-top:2px}

/* DASHBOARD KPI */
.kpi-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin-bottom:20px}
.kpi{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.kpi-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.kpi-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:900;line-height:1}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px}
.kpi.accent{border-color:rgba(240,180,41,.3);background:rgba(240,180,41,.05)}
.kpi.green{border-color:rgba(63,185,80,.3);background:rgba(63,185,80,.05)}
.kpi.blue{border-color:rgba(88,166,255,.3);background:rgba(88,166,255,.05)}
.kpi.purple{border-color:rgba(188,140,255,.3);background:rgba(188,140,255,.05)}
.kpi.red{border-color:rgba(248,81,73,.3);background:rgba(248,81,73,.05)}

/* CARDS */
.section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.card-panel{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:16px}

/* ACTIVITY LOG */
.act-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);align-items:flex-start}
.act-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.act-dot.green{background:var(--green)}
.act-dot.blue{background:var(--blue)}
.act-dot.accent{background:var(--accent)}
.act-dot.purple{background:var(--purple)}
.act-dot.red{background:var(--red)}
.act-body{flex:1;min-width:0}
.act-main{font-size:12px;line-height:1.4}
.act-time{font-size:10px;color:var(--muted);white-space:nowrap;flex-shrink:0;margin-top:2px}

/* GUME MODULE (reuse existing styles) */
.sf-wrap{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:12px 14px;margin-bottom:12px}
.sf-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.sf-full{grid-column:1/-1}
.fg label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.fg input,.fg select{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:5px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:7px 9px;outline:none}
.fg select option{background:var(--card)}
.status-tabs{display:flex;gap:6px;margin-bottom:12px}
.stab{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:5px 12px;cursor:pointer;flex:1;text-align:center}
.stab.as{border-color:var(--green);color:var(--green);background:rgba(63,185,80,.08)}
.stab.ap{border-color:var(--purple);color:var(--purple);background:rgba(188,140,255,.08)}
.res-count{font-family:'Barlow Condensed',sans-serif;font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.res-count b{color:var(--accent);font-size:13px}
.tire-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
.tire-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative}
.tire-card.sold{opacity:.65;border-color:#3d2d5a}
.tire-thumb{width:100%;height:120px;background:var(--surf);display:flex;align-items:center;justify-content:center;color:var(--border)}
.tire-thumb img{width:100%;height:100%;object-fit:cover}
.bs{position:absolute;top:7px;left:7px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 5px;border-radius:3px;display:flex;align-items:center;gap:2px}
.bs.z{background:rgba(88,166,255,.22);color:#58a6ff;border:1px solid #58a6ff}
.bs.l{background:rgba(240,180,41,.16);color:#f0b429;border:1px solid #f0b429}
.bsif{position:absolute;top:7px;right:7px;background:rgba(0,0,0,.7);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;padding:2px 5px;border-radius:3px}
.bsold{position:absolute;bottom:0;left:0;right:0;background:rgba(155,89,182,.85);color:#fff;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:3px}
.tire-info{padding:8px 10px}
.tire-size{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:16px;letter-spacing:1px;margin-bottom:1px}
.tire-cod{font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:1px}
.tire-loc{font-size:10px;color:var(--muted)}
.empty{text-align:center;padding:40px 20px;color:var(--muted)}

/* AUTA */
.auto-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.auto-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative}
.auto-card:hover{border-color:var(--accent)}
.auto-img{width:100%;height:140px;background:var(--surf);display:flex;align-items:center;justify-content:center;color:var(--border);overflow:hidden}
.auto-img img{width:100%;height:100%;object-fit:cover}
.auto-status{position:absolute;top:7px;right:7px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 7px;border-radius:3px}
.auto-status.na_stanju{background:rgba(63,185,80,.2);color:var(--green);border:1px solid var(--green)}
.auto-status.prodat{background:rgba(188,140,255,.2);color:var(--purple);border:1px solid var(--purple)}

.auto-info{padding:10px 12px}
.auto-name{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:.5px;margin-bottom:2px}
.auto-sub{font-size:11px;color:var(--muted);margin-bottom:6px}
.auto-price{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:800;color:var(--accent)}

/* ZADACI */
.zadaci-list{display:flex;flex-direction:column;gap:8px}
.zadatak{background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:12px 14px;display:flex;align-items:flex-start;gap:12px}
.zadatak.zatvoren{opacity:.5}
.zadatak-check{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s}
.zadatak-check:hover{border-color:var(--green)}
.zadatak-check.done{background:var(--green);border-color:var(--green)}
.zadatak-body{flex:1}
.zadatak-title{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;margin-bottom:2px}
.zadatak-opis{font-size:12px;color:var(--muted);line-height:1.5}
.prioritet{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px}
.prioritet.visok{background:rgba(248,81,73,.15);color:var(--red)}
.prioritet.srednji{background:rgba(240,180,41,.15);color:var(--accent)}
.prioritet.nizak{background:rgba(88,166,255,.12);color:var(--blue)}

/* TROŠKOVI */
.trosak-card{background:var(--card);border:1.5px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:10px}
.trosak-head{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;cursor:pointer}
.trosak-head:hover{background:rgba(255,255,255,.02)}
.trosak-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:800;letter-spacing:.5px}
.trosak-sum{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700}
.trosak-sum.over{color:var(--red)}
.trosak-sum.ok{color:var(--green)}
.trosak-body{padding:0 14px 12px;border-top:1px solid var(--border)}
.dio-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);font-size:12px}
.dio-row:last-child{border-bottom:none}
.dio-naziv{flex:1;font-weight:500}
.dio-plan{color:var(--muted);width:70px;text-align:right}
.dio-stv{font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:13px;width:80px;text-align:right}
.dio-stv.over{color:var(--red)}
.dio-stv.under{color:var(--green)}
.dio-stv.pending{color:var(--muted)}
.dio-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--border);flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center}
.dio-check.done{background:var(--green);border-color:var(--green)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:300;overflow-y:auto;-webkit-overflow-scrolling:touch;}
.overlay-inner{min-height:100%;display:flex;align-items:flex-start;justify-content:center;padding:14px;}
.modal{background:var(--surf);border:1.5px solid var(--border);border-radius:14px;padding:20px;width:100%;max-width:480px;margin:auto;}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.btn-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:22px;line-height:1}
.fg2{margin-bottom:12px}
.fg2 input:focus,.fg2 select:focus,.fg2 textarea:focus{scroll-margin-bottom:200px}
.modal input:focus,.modal select:focus,.modal textarea:focus{scroll-margin-bottom:300px}
.fg2 label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.fg2 input,.fg2 select,.fg2 textarea{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:5px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:8px 10px;outline:none}
.fg2 select option{background:var(--card)}
.fg2 textarea{resize:vertical;min-height:60px}
.fg2 input.ok{border-color:var(--green)}
.fg2 input.err{border-color:var(--red)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.modal-foot{display:flex;gap:7px;justify-content:flex-end;margin-top:16px;padding-top:13px;border-top:1px solid var(--border);align-items:center}
.foot-left{margin-right:auto}
.btn-cancel{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;cursor:pointer}
.btn-save{background:var(--accent);color:#000;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:7px 16px;cursor:pointer}
.btn-save:disabled{opacity:.4;cursor:not-allowed}
.btn-danger{background:var(--red);color:#fff;border:none;border-radius:5px;font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;cursor:pointer}
.btn-sm{background:none;border:1px solid var(--border);color:var(--muted);border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;cursor:pointer;display:inline-flex;align-items:center;gap:3px}
.btn-sm:hover{border-color:var(--accent);color:var(--accent)}
.btn-sm.red:hover{border-color:var(--red);color:var(--red)}

/* DETAIL */
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:9px}
.spec-box{background:var(--card);border:1px solid var(--border);border-radius:5px;padding:7px 11px}
.spec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:8px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:1px}
.spec-val{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:800}
.loc-box{background:rgba(88,166,255,.07);border:1px solid rgba(88,166,255,.2);border-radius:5px;padding:7px 11px;font-size:11px;color:#58a6ff;margin-bottom:9px}
.sold-box{background:rgba(188,140,255,.1);border:1px solid rgba(188,140,255,.3);border-radius:5px;padding:7px 11px;font-size:11px;color:var(--purple);margin-bottom:9px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px;padding-bottom:4px;border-bottom:1px solid var(--border);margin-top:10px}
.sell-box{background:rgba(63,185,80,.06);border:1.5px solid rgba(63,185,80,.2);border-radius:9px;padding:14px;margin-bottom:4px}
.price-row{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:5px;overflow:hidden;background:var(--card)}
.price-inp{flex:1;background:transparent;border:none;color:var(--text);font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:800;padding:9px 12px;outline:none}
.price-curr{padding:9px 12px;font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;color:var(--muted);border-left:1px solid var(--border)}

/* IMGS */
.det-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:5px;margin-bottom:12px}
.det-imgs .thumb{width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px;cursor:pointer;display:block;border:2px solid transparent}
.det-imgs .thumb:hover{border-color:var(--accent)}
.img-zone{border:2px dashed var(--border);border-radius:7px;padding:14px;text-align:center;cursor:pointer;color:var(--muted);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;min-height:64px}
.img-zone:hover{border-color:var(--accent)}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:7px}
.img-item{position:relative;border-radius:4px;overflow:hidden;aspect-ratio:1;background:var(--card)}
.img-item img{width:100%;height:100%;object-fit:cover;display:block}
.img-rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);border:none;color:#fff;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:10px;display:flex;align-items:center;justify-content:center}
.upload-bar-wrap{background:var(--card);border-radius:4px;height:6px;overflow:hidden;margin:6px 0 4px}
.upload-bar{background:var(--blue);height:100%;border-radius:4px;transition:width .2s}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.93);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px}
.lightbox img{max-width:100%;max-height:90vh;border-radius:8px;object-fit:contain}

const {useState,useMemo,useRef,useEffect,useCallback} = React;

// ===== API =====
function getToken(){return localStorage.getItem('adg_token');}
async function api(path,opts={}){
  const token=getToken();
  const res=await fetch('/api'+path,{
    headers:{'Content-Type':'application/json',...(token?{'Authorization':'Bearer '+token}:{})},
    ...opts,body:opts.body?JSON.stringify(opts.body):undefined
  });
  const data=await res.json();
  if(res.status===401){localStorage.removeItem('adg_token');window.location.reload();throw new Error('Sesija istekla');}
  if(!res.ok) throw new Error(data.error||'Greška');
  return data;
}

// ===== UTILS =====
function resizeImage(file,maxW=1200,maxH=1200,quality=0.82){
  return new Promise(resolve=>{
    const reader=new FileReader();
    reader.onload=e=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>maxW||h>maxH){const ratio=Math.min(maxW/w,maxH/h);w=Math.round(w*ratio);h=Math.round(h*ratio);}
        const canvas=document.createElement('canvas');canvas.width=w;canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        resolve(canvas.toDataURL('image/jpeg',quality));
      };img.src=e.target.result;
    };reader.readAsDataURL(file);
  });
}
function promjerDisp(p){if(!p)return '';return /^[0-9]/.test(p)?'R'+p:p;}
function tipLbl(t){return {komad:'Komad (1)',par:'Par (2)',set:'Set (4)'}[t]||t||'';}
function statusLbl(s){return {na_stanju:'Na stanju',prodat:'Prodat'}[s]||s||'';}
function timeAgo(dt){
  const sec=Math.floor((Date.now()-new Date(dt).getTime())/1000);
  if(sec<60)return 'upravo';if(sec<3600)return Math.floor(sec/60)+' min';
  if(sec<86400)return Math.floor(sec/3600)+' h';return Math.floor(sec/86400)+' d';
}

class ErrorBoundary extends React.Component {
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(e){return {error:e};}
  render(){
    if(this.state.error){
      return <div style={{padding:24,background:'#1a0a0a',color:'#f85149',fontFamily:'monospace',fontSize:12,borderRadius:8,margin:16,border:'1px solid #f85149'}}>
        <div style={{fontFamily:"Barlow Condensed,sans-serif",fontSize:16,fontWeight:900,marginBottom:12}}>❌ GREŠKA — pošalji ovo programeru:</div>
        <pre style={{whiteSpace:'pre-wrap',wordBreak:'break-all'}}>{this.state.error?.message}</pre>
        <pre style={{whiteSpace:'pre-wrap',wordBreak:'break-all',fontSize:10,color:'#f8514988',marginTop:8}}>{this.state.error?.stack?.slice(0,500)}</pre>
        <button onClick={()=>this.setState({error:null})} style={{marginTop:12,background:'#f85149',color:'#fff',border:'none',borderRadius:4,padding:'6px 12px',cursor:'pointer',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>Pokušaj ponovo</button>

// ===== IMAGE UPLOAD HOOK =====
function useImageUpload(initialSlike=[]){
  const [slike,setSlike]=useState(initialSlike);
  const [uploadState,setUploadState]=useState({uploading:false,done:0,total:0});
  const uploadingRef=useRef(false);
  const fileRef=useRef();
  const progress=uploadState.total>0?Math.round((uploadState.done/uploadState.total)*100):0;
  const handleFiles=async(e)=>{
    const files=Array.from(e.target.files);if(!files.length)return;e.target.value='';
    if(uploadingRef.current)return;uploadingRef.current=true;
    setUploadState({uploading:true,done:0,total:files.length});
    const results=[];
    for(let i=0;i<files.length;i++){
      // Resize on client side first
      const dataURL=await resizeImage(files[i]);
      // Upload to server disk
      try{
        const r=await fetch('/api/upload-slika',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({dataURL})});
        const d=await r.json();
        results.push(d.url||dataURL); // Fallback to base64 if upload fails
      }catch(err){
        results.push(dataURL); // Fallback to base64
      }
      setUploadState({uploading:true,done:i+1,total:files.length});
    }
    setSlike(p=>[...p,...results]);setUploadState({uploading:false,done:0,total:0});uploadingRef.current=false;
  };
  const removeImg=(i)=>setSlike(p=>p.filter((_,j)=>j!==i));
  return{slike,setSlike,uploadState,uploadingRef,progress,handleFiles,removeImg,fileRef};
}

// ===== LIGHTBOX =====
function Lightbox({images,startIndex,onClose}){
  const [idx,setIdx]=useState(startIndex||0);
  const [scale,setScale]=useState(1);
  const [offset,setOffset]=useState({x:0,y:0});
  const [dragging,setDragging]=useState(false);
  const pinchRef=useRef(null);const pinchScaleRef=useRef(1);
  const dragRef=useRef(null);const lastTap=useRef(0);
  const touchStartX=useRef(null);const touchStartY=useRef(null);
  useEffect(()=>{setScale(1);setOffset({x:0,y:0});},[idx]);
  useEffect(()=>{
    const h=e=>{
      if(e.key==='Escape'){if(scale>1){setScale(1);setOffset({x:0,y:0});}else onClose();}
      if(e.key==='ArrowRight'&&scale===1)setIdx(i=>Math.min(i+1,images.length-1));
      if(e.key==='ArrowLeft'&&scale===1)setIdx(i=>Math.max(i-1,0));
    };
    window.addEventListener('keydown',h);return()=>window.removeEventListener('keydown',h);
  },[images,onClose,scale]);
  const onTouchStart=e=>{
    if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;pinchRef.current=Math.sqrt(dx*dx+dy*dy);pinchScaleRef.current=scale;return;}
    touchStartX.current=e.touches[0].clientX;touchStartY.current=e.touches[0].clientY;
    if(scale>1)dragRef.current={x:e.touches[0].clientX-offset.x,y:e.touches[0].clientY-offset.y};
    const now=Date.now();if(now-lastTap.current<300){e.stopPropagation();if(scale>1){setScale(1);setOffset({x:0,y:0});}else setScale(2.5);lastTap.current=0;}else lastTap.current=now;
  };
  const onTouchMove=e=>{
    e.stopPropagation();
    if(e.touches.length===2&&pinchRef.current){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;const d=Math.sqrt(dx*dx+dy*dy);const ns=Math.min(Math.max(pinchScaleRef.current*(d/pinchRef.current),1),5);setScale(ns);if(ns===1)setOffset({x:0,y:0});return;}
    if(e.touches.length===1&&scale>1&&dragRef.current)setOffset({x:e.touches[0].clientX-dragRef.current.x,y:e.touches[0].clientY-dragRef.current.y});
  };
  const onTouchEnd=e=>{
    if(pinchRef.current){pinchRef.current=null;return;}if(scale>1){dragRef.current=null;return;}
    if(touchStartX.current===null)return;
    const dx=e.changedTouches[0].clientX-touchStartX.current,dy=Math.abs(e.changedTouches[0].clientY-touchStartY.current);
    if(dy<40){if(dx>60)setIdx(i=>Math.max(i-1,0));else if(dx<-60)setIdx(i=>Math.min(i+1,images.length-1));}
    touchStartX.current=null;touchStartY.current=null;
  };
  const onWheel=e=>{e.stopPropagation();setScale(s=>{const n=Math.min(Math.max(s+(e.deltaY>0?-.3:.3),1),5);if(n===1)setOffset({x:0,y:0});return n;});};
  return(
    <div className="lightbox" onClick={scale>1?undefined:onClose} onTouchStart={onTouchStart} onTouchMove={onTouchMove} onTouchEnd={onTouchEnd} onWheel={onWheel} onMouseMove={e=>{if(dragging&&scale>1&&dragRef.current)setOffset({x:e.clientX-dragRef.current.x,y:e.clientY-dragRef.current.y});}} onMouseUp={()=>setDragging(false)} style={{cursor:scale>1?(dragging?'grabbing':'grab'):'default'}}>
      <button className="lightbox-close" onClick={onClose}>×</button>
      {images.length>1&&<div style={{position:'absolute',top:16,left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,.6)',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontSize:13,fontWeight:700,padding:'3px 12px',borderRadius:20,letterSpacing:'1px',zIndex:1}}>{idx+1} / {images.length}</div>}
      {scale>1&&<div style={{position:'absolute',top:16,right:16,background:'rgba(0,0,0,.6)',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontSize:12,fontWeight:700,padding:'3px 10px',borderRadius:20,zIndex:1}}>{Math.round(scale*100)}%</div>}
      {scale>1&&<button onClick={e=>{e.stopPropagation();setScale(1);setOffset({x:0,y:0});}} style={{position:'absolute',bottom:60,right:16,background:'rgba(255,255,255,.15)',border:'none',color:'#fff',borderRadius:8,padding:'6px 12px',cursor:'pointer',fontFamily:'Barlow Condensed,sans-serif',fontSize:12,fontWeight:700,zIndex:1}}>Poništi zoom</button>}
      {scale===1&&idx>0&&<button className="lightbox-nav prev" onClick={e=>{e.stopPropagation();setIdx(i=>Math.max(i-1,0));}}>‹</button>}
      <img src={images[idx]} alt="" onClick={e=>{if(scale>1)e.stopPropagation();}} onMouseDown={e=>{if(scale>1){e.stopPropagation();setDragging(true);dragRef.current={x:e.clientX-offset.x,y:e.clientY-offset.y};}}} style={{maxWidth:'100%',maxHeight:'80vh',borderRadius:8,objectFit:'contain',userSelect:'none',transform:`scale(${scale}) translate(${offset.x/scale}px,${offset.y/scale}px)`,transition:dragging?'none':'transform .15s ease',cursor:scale>1?(dragging?'grabbing':'grab'):'zoom-in'}}/>
      {scale===1&&idx<images.length-1&&<button className="lightbox-nav next" onClick={e=>{e.stopPropagation();setIdx(i=>Math.min(i+1,images.length-1));}}>›</button>}
      {images.length>1&&scale===1&&<div style={{position:'absolute',bottom:20,left:'50%',transform:'translateX(-50%)',display:'flex',gap:6}}>{images.map((_,i)=><span key={i} onClick={e=>{e.stopPropagation();setIdx(i);}} style={{width:i===idx?20:8,height:8,borderRadius:4,background:i===idx?'#fff':'rgba(255,255,255,.4)',cursor:'pointer',transition:'all .2s'}}/>)}</div>}
    </div>
  );
}

    const dijeloviSum=(t.dijelovi||[]).filter(d=>d.nabavljeno).reduce((s,d)=>s+(parseFloat(d.stvarna_cijena)||0),0);

  };

  useEffect(()=>{if(quickAdd){openAdd();onQuickAddDone&&onQuickAddDone();}},[quickAdd]);
  useEffect(()=>{loadRegistracije();},[]);

  const load=async()=>{
    setLoading(true);
    try{
      const d=await api('/auta');setAuta(d);
      // Load troškovi for all auta
      const tros={};
      await Promise.all(d.map(async a=>{
        try{const t=await api('/auta/'+a.id+'/troskovi');tros[a.id]=t||{dijelovi:[]};}
        catch(e){tros[a.id]={dijelovi:[]};}
      }));
      setTroskoviAuta(tros);
    }catch(e){showToast(e.message,'err');}
    setLoading(false);
  };
  useEffect(()=>{load();},[]);

  const [regPodsjetnici,setRegPodsjetnici]=useState([]);
  const [showReg,setShowReg]=useState(false);

  const loadRegistracije=async()=>{
    try{const d=await api('/podsjetnici/registracija');setRegPodsjetnici(d);}
    catch(e){}
  };

  const regUkupno=regPodsjetnici.length;
  const regKriticno=regPodsjetnici.filter(a=>a.dani_do_registracije<=30).length;

  const STATUS_TABS=[
    {v:'',l:'Svi'},
    {v:'na_stanju',l:'Na stanju'},
    {v:'na_popravci',l:'Na popravci'},
    {v:'prodat',l:'Prodato'},
  ];
  const filtered=auta.filter(a=>!statusFilter||a.status===statusFilter);
  const naStanju=auta.filter(a=>a.status==='na_stanju');
  const naPop=auta.filter(a=>a.status==='na_popravci');
  const ukupnaVrijednost=naStanju.reduce((s,a)=>s+(parseFloat(a.prodajna_cijena)||0),0);
  const mrtavK=naStanju.filter(a=>jeMrtavKapital(a)).length;

  const openAdd=()=>{setForm({marka:'',model:'',godiste:'',boja:'',km:'',motor:'',vin:'',napomena:'',olx_link:'',nabavna_cijena:'',prodajna_cijena:'',status:'na_stanju'});imgHook.setSlike([]);setEditId(null);setModal('form');};
  const openEdit=(a)=>{setForm({marka:a.marka,model:a.model,godiste:a.godiste||'',boja:a.boja||'',km:a.km||'',motor:a.motor||'',vin:a.vin||'',napomena:a.napomena||'',olx_link:a.olx_link||'',nabavna_cijena:a.nabavna_cijena||'',prodajna_cijena:a.prodajna_cijena||'',status:a.status||'na_stanju',datum_registracije:a.datum_registracije||''});imgHook.setSlike(a.slike?[...a.slike]:[]);setEditId(a.id);setDetail(null);setModal('form');};

  const doSave=async()=>{
    if(!form.marka||!form.model){showToast('Marka i model su obavezni','err');return;}
    if(saving)return;setSaving(true);
    try{
      const body={...form,slike:imgHook.slike};let a;
      if(editId){a=await api('/auta/'+editId,{method:'PUT',body});setAuta(p=>p.map(x=>x.id===a.id?a:x));showToast('Auto ažuriran');}
      else{a=await api('/auta',{method:'POST',body});setAuta(p=>[a,...p]);setTroskoviAuta(p=>({...p,[a.id]:{dijelovi:[]}}));showToast('Auto '+a.sifra+' dodan');}
      setModal(null);
    }catch(e){showToast(e.message,'err');}setSaving(false);
  };
  const doDel=async(id)=>{if(!window.confirm('Obrisati auto?'))return;await api('/auta/'+id,{method:'DELETE'});setAuta(p=>p.filter(a=>a.id!=id));setDetail(null);showToast('Obrisan');};
  const doSellAuto=async()=>{
    try{const updated=await api('/auta/'+detail.id,{method:'PUT',body:{...detail,slike:detail.slike,status:'prodat',prodajna_cijena:sellAutoPrice||detail.prodajna_cijena}});
      setAuta(p=>p.map(a=>a.id===updated.id?updated:a));setSellAutoModal(false);setDetail(null);setSellAutoPrice('');showToast('Auto prodat');}
    catch(e){showToast(e.message,'err');}
  };
  const loadCijenaHistorija=async(id)=>{try{const h=await api('/auta/'+id+'/cijena-historija');setCijenaHistorija(h);}catch(e){showToast(e.message,'err');}};

  // TROŠKOVI
  const doAddDio=async(autoId)=>{
    if(!dioForm.naziv.trim()){showToast('Naziv je obavezan','err');return;}
    if(savingDio)return;setSavingDio(true);
    try{
      let dio;
      if(editDio){
        dio=await api('/auta/'+autoId+'/troskovi/dio/'+editDio.id,{method:'PUT',body:dioForm});
        setTroskoviAuta(p=>({...p,[autoId]:{...p[autoId],dijelovi:(p[autoId]?.dijelovi||[]).map(d=>d.id===dio.id?dio:d)}}));
      }else{
        dio=await api('/auta/'+autoId+'/troskovi/dio',{method:'POST',body:dioForm});
        setTroskoviAuta(p=>({...p,[autoId]:{...p[autoId],dijelovi:[...(p[autoId]?.dijelovi||[]),dio]}}));
      }
      setDioModal(null);setEditDio(null);setDioForm({naziv:'',planirana_cijena:'',stvarna_cijena:'',nabavljeno:false});
      showToast(editDio?'Trošak ažuriran':'Trošak dodan');
    }catch(e){showToast(e.message,'err');}setSavingDio(false);
  };
  const doDelDio=async(autoId,dioId)=>{
    await api('/auta/'+autoId+'/troskovi/dio/'+dioId,{method:'DELETE'});
    setTroskoviAuta(p=>({...p,[autoId]:{...p[autoId],dijelovi:(p[autoId]?.dijelovi||[]).filter(d=>d.id!=dioId)}}));
  };
  const toggleDio=async(autoId,d)=>{
    const novi={...d,nabavljeno:!d.nabavljeno,stvarna_cijena:!d.nabavljeno?(parseFloat(d.stvarna_cijena)||parseFloat(d.planirana_cijena)||0):null};
    const updated=await api('/auta/'+autoId+'/troskovi/dio/'+d.id,{method:'PUT',body:{naziv:d.naziv,planirana_cijena:d.planirana_cijena,stvarna_cijena:novi.stvarna_cijena,nabavljeno:novi.nabavljeno}});
    setTroskoviAuta(p=>({...p,[autoId]:{...p[autoId],dijelovi:(p[autoId]?.dijelovi||[]).map(x=>x.id===d.id?updated:x)}}));
  };

  const statusColor={na_stanju:'var(--green)',na_popravci:'var(--accent)',prodat:'var(--purple)'};
  const statusLblLocal={na_stanju:'Na stanju',na_popravci:'Na popravci',prodat:'Prodat'};

  return(<div className="page">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
      <div><div className="page-title">Vozni park</div><div className="page-sub">Sva vozila — stanje, popravke i troškovi</div></div>
      <div style={{display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
        {regKriticno>0&&<button className="btn-sm" style={{color:'var(--red)',borderColor:'var(--red)',position:'relative'}} onClick={()=>setShowReg(r=>!r)}>
          🔔 Registracije <span style={{background:'var(--red)',color:'#fff',borderRadius:10,fontSize:9,padding:'1px 5px',marginLeft:3,fontFamily:'Barlow Condensed,sans-serif',fontWeight:900}}>{regKriticno}</span>
        </button>}
        {regKriticno===0&&regUkupno>0&&<button className="btn-sm" onClick={()=>setShowReg(r=>!r)}>🔔 Registracije ({regUkupno})</button>}
        <button className="btn-add-main" onClick={openAdd}><Icons.Plus size={13}/> Dodaj auto</button>
      </div>
    </div>

    {/* KPI */}
    <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(120px,1fr))',gap:8,marginBottom:12}}>
      <div className="kpi green" style={{padding:'8px 12px'}}><div className="kpi-lbl">Vrijednost lagera</div><div className="kpi-val" style={{color:'var(--green)',fontSize:18}}>{ukupnaVrijednost.toLocaleString('sr-Latn-RS')} KM</div><div className="kpi-sub">{naStanju.length} vozila</div></div>
      {naPop.length>0&&<div className="kpi accent" style={{padding:'8px 12px'}}><div className="kpi-lbl">Na popravci</div><div className="kpi-val" style={{color:'var(--accent)',fontSize:18}}>{naPop.length}</div></div>}
      {mrtavK>0&&<div className="kpi red" style={{padding:'8px 12px'}}><div className="kpi-lbl">Mrtav kapital</div><div className="kpi-val" style={{color:'var(--red)',fontSize:18}}>{mrtavK}</div></div>}
    </div>

    {/* Registracije panel */}
    {showReg&&<div style={{background:'var(--surf)',border:'1.5px solid var(--border)',borderRadius:10,padding:'12px 14px',marginBottom:12}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:12,fontWeight:800,letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)'}}>🔔 Registracije auta</div>
        <button className="btn-close" onClick={()=>setShowReg(false)}>×</button>
      </div>
      {regPodsjetnici.length===0?<div style={{fontSize:12,color:'var(--muted)'}}>Nema auta sa unesenim datumom registracije.</div>:
      <div style={{display:'flex',flexDirection:'column',gap:5,maxHeight:220,overflowY:'auto'}}>
        {regPodsjetnici.map(a=>{
          const boja=a.istekla?'var(--red)':a.dani_do_registracije<=30?'var(--accent)':a.dani_do_registracije<=90?'var(--blue)':'var(--green)';
          const poruka=a.istekla?'Istekla '+Math.abs(a.dani_do_registracije)+'d':a.dani_do_registracije===0?'Ističe danas!':'Za '+a.dani_do_registracije+'d';
          return(<div key={a.id} style={{display:'flex',alignItems:'center',gap:10,background:'var(--card)',border:'1px solid '+boja+'44',borderRadius:6,padding:'7px 10px',cursor:'pointer'}}
            onClick={()=>{const found=auta.find(x=>x.id===a.id);if(found)setDetail(found);}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:boja,flexShrink:0}}/>
            <div style={{flex:1,fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:13}}>{a.marka} {a.model} {a.godiste&&'('+a.godiste+')'}</div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:11,color:boja}}>{poruka}</div>
          </div>);
        })}
      </div>}
    </div>}

    {/* Status tabs */}
    <div className="status-tabs" style={{marginBottom:12}}>
      {STATUS_TABS.map(({v,l})=>{
        const cnt=v===''?auta.length:auta.filter(a=>a.status===v).length;
        return <button key={v} className={"stab"+(statusFilter===v?' as':'')} onClick={()=>setStatusFilter(v)}>{l} ({cnt})</button>;
      })}
    </div>

    {loading?<div className="empty">Učitavanje...</div>:filtered.length===0?<div className="empty"><Icons.Car size={40}/><p>Nema vozila.</p></div>:
    <div className="auto-grid">
      {filtered.map(a=>{
        const tros=troskoviAuta[a.id];
        const dijeloviCount=(tros?.dijelovi||[]).length;
        const nabavljeniCount=(tros?.dijelovi||[]).filter(d=>d.nabavljeno).length;
        const ulozeno=ukupnoUlozeno(a.id,a.nabavna_cijena);
        return(<div key={a.id} className="auto-card" onClick={()=>setDetail(a)} style={{borderColor:a.status==='na_popravci'?'rgba(240,180,41,.4)':a.status==='prodat'?'rgba(188,140,255,.3)':'var(--border)'}}>
          <div className="auto-img">{a.slike&&a.slike.length>0?<img src={a.slike[0]} alt="" loading="lazy"/>:<Icons.Car size={40}/>}</div>
          <span style={{position:'absolute',bottom:68,right:0,background:statusColor[a.status],color:'#000',borderRadius:'4px 0 0 4px',fontFamily:'Barlow Condensed,sans-serif',fontSize:9,fontWeight:900,padding:'3px 7px',textTransform:'uppercase',letterSpacing:'1px',opacity:.95}}>{statusLblLocal[a.status]}</span>
          {jeMrtavKapital(a)&&<span className="dead-capital">🔴 {daniNaSkladistu(a.created_at)}d</span>}
          <div className="auto-info">
            <div className="auto-name">{a.marka} {a.model}</div>
            <div className="auto-sub">{[a.godiste,a.motor,a.km&&a.km+' km'].filter(Boolean).join(' · ')}</div>
            {isAdmin&&<div style={{marginTop:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div style={{fontSize:11,fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,color:'var(--red)'}}>Uloženo: {ulozeno.toLocaleString('sr-Latn-RS')} KM</div>
              {a.prodajna_cijena&&<div style={{fontSize:11,fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,color:'var(--green)'}}>{a.prodajna_cijena} KM</div>}
            </div>}
            {dijeloviCount>0&&<div style={{fontSize:10,color:'var(--muted)',marginTop:2}}>🔧 {nabavljeniCount}/{dijeloviCount} dijelova</div>}
          </div>
        </div>);
      })}
    </div>}

    {/* DETAIL */}
    {detail&&!lightbox&&!sellAutoModal&&cijenaHistorija===null&&dioModal===null&&<div className="overlay" onClick={()=>setDetail(null)}><div className="modal" style={{maxWidth:540}} onClick={e=>e.stopPropagation()}>
      <div className="modal-title">{detail.marka} {detail.model} <button className="btn-close" onClick={()=>setDetail(null)}>x</button></div>
      <div style={{display:'flex',gap:8,alignItems:'center',marginBottom:12,flexWrap:'wrap'}}>
        <span style={{background:statusColor[detail.status]+'22',color:statusColor[detail.status],border:'1px solid '+statusColor[detail.status],borderRadius:4,fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:800,padding:'2px 8px',textTransform:'uppercase'}}>{statusLblLocal[detail.status]}</span>
        <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:15,color:'var(--accent)',letterSpacing:2}}>{detail.sifra}</span>
      </div>
      {detail.slike&&detail.slike.length>0&&<div>
          <div className="det-imgs">{detail.slike.map((s,i)=><div key={i} style={{position:'relative',display:'inline-block'}}>
            <img className="thumb" src={s} onClick={()=>setLightbox({images:detail.slike,index:i})} style={{border:i===0?'2px solid var(--accent)':'2px solid transparent'}}/>
            {i!==0&&<button onClick={async()=>{
              const noveSlike=[s,...detail.slike.filter((_,j)=>j!==i)];
              const updated=await api('/auta/'+detail.id,{method:'PUT',body:{...detail,slike:noveSlike}});
              setAuta(p=>p.map(a=>a.id===updated.id?updated:a));setDetail(updated);showToast('Naslovna slika promijenjena');
            }} style={{position:'absolute',bottom:4,left:4,background:'rgba(0,0,0,.75)',border:'none',color:'#fff',borderRadius:3,fontSize:9,padding:'2px 4px',cursor:'pointer',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>★ Naslovna</button>}
            {i===0&&<span style={{position:'absolute',bottom:4,left:4,background:'var(--accent)',color:'#000',borderRadius:3,fontSize:9,padding:'2px 4px',fontFamily:'Barlow Condensed,sans-serif',fontWeight:800}}>★ Naslovna</span>}
          </div>)}
          </div>
          <div style={{fontSize:10,color:'var(--muted)',marginBottom:8}}>Klikni "★ Naslovna" na slici da je postaviš kao naslovnu</div>
        </div>}
      {jeMrtavKapital(detail)&&<div style={{background:'rgba(248,81,73,.1)',border:'1.5px solid rgba(248,81,73,.4)',borderRadius:6,padding:'8px 12px',marginBottom:8,fontSize:12,color:'var(--red)'}}>🔴 <b>Mrtav kapital</b> — vozilo stoji {daniNaSkladistu(detail.created_at)} dana</div>}

      {/* SPECS */}
      <div className="specs-grid">
        {detail.godiste&&<div className="spec-box"><div className="spec-lbl">Godište</div><div className="spec-val">{detail.godiste}</div></div>}
        {detail.motor&&<div className="spec-box"><div className="spec-lbl">Motor</div><div className="spec-val" style={{fontSize:14}}>{detail.motor}</div></div>}
        {detail.km&&<div className="spec-box"><div className="spec-lbl">Kilometraža</div><div className="spec-val">{detail.km} km</div></div>}
        {detail.boja&&<div className="spec-box"><div className="spec-lbl">Boja</div><div className="spec-val" style={{fontSize:14}}>{detail.boja}</div></div>}
      </div>

      {/* FINANSIJE */}
      {isAdmin&&(()=>{
        const t=troskoviAuta[detail.id];
        const dijelovi=t?.dijelovi||[];
        const nabavljeniSum=dijelovi.filter(d=>d.nabavljeno).reduce((s,d)=>s+(parseFloat(d.stvarna_cijena)||0),0);
        const planiraniSum=dijelovi.reduce((s,d)=>s+(parseFloat(d.planirana_cijena)||0),0);
        const nab=parseFloat(detail.nabavna_cijena)||0;
        const ulozeno=nab+nabavljeniSum;
        const marza=detail.prodajna_cijena?parseFloat(detail.prodajna_cijena)-ulozeno:null;
        return(<div style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px',marginBottom:12}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Finansije</div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8}}>
            <div><div style={{fontSize:9,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>Nabavna</div><div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:15,fontWeight:900,color:'var(--text)'}}>{nab} KM</div></div>
            <div><div style={{fontSize:9,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>Troškovi</div><div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:15,fontWeight:900,color:'var(--red)'}}>{nabavljeniSum} KM</div></div>
            <div><div style={{fontSize:9,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>Ukupno uloženo</div><div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:15,fontWeight:900,color:'var(--accent)'}}>{ulozeno} KM</div></div>
          </div>
          {detail.prodajna_cijena&&<div style={{marginTop:8,paddingTop:8,borderTop:'1px solid var(--border)',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div><div style={{fontSize:9,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>Prodajna cijena</div>
              <div style={{display:'flex',alignItems:'center',gap:6}}>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:15,fontWeight:900,color:'var(--green)'}}>{detail.prodajna_cijena} KM</div>
                <button onClick={()=>loadCijenaHistorija(detail.id)} style={{background:'none',border:'1px solid var(--border)',borderRadius:4,color:'var(--muted)',cursor:'pointer',padding:'2px 5px',fontSize:10}}><Icons.History size={10}/></button>
              </div>
            </div>
            {marza!==null&&<div style={{textAlign:'right'}}><div style={{fontSize:9,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>Marža</div><div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:15,fontWeight:900,color:marza>=0?'var(--green)':'var(--red)'}}>{marza>=0?'+':''}{marza} KM</div></div>}
          </div>}
          {planiraniSum>nabavljeniSum&&<div style={{marginTop:6,fontSize:10,color:'var(--muted)'}}>Plan: {nab+planiraniSum} KM ukupno (još {planiraniSum-nabavljeniSum} KM dijelova)</div>}
        </div>);
      })()}

      {/* TROŠKOVI DIJELOVI */}
      {(()=>{
        const t=troskoviAuta[detail.id];
        const dijelovi=t?.dijelovi||[];
        return(<div style={{marginBottom:12}}>
          <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:11,fontWeight:800,letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)'}}>🔧 Troškovi popravke ({dijelovi.length})</div>
            <button className="btn-sm" onClick={()=>{setDioModal(detail.id);setDioForm({naziv:'',planirana_cijena:'',stvarna_cijena:'',nabavljeno:false});setEditDio(null);}}><Icons.Plus size={10}/> Dodaj</button>
          </div>
          {dijelovi.length===0?<div style={{fontSize:11,color:'var(--muted)',fontStyle:'italic'}}>Nema unesenih troškova popravke.</div>:
          <div style={{display:'flex',flexDirection:'column',gap:3}}>
            {dijelovi.map(d=><div key={d.id} style={{display:'flex',alignItems:'center',gap:7,padding:'5px 0',borderBottom:'1px solid var(--border)'}}>
              <div className={"dio-check"+(d.nabavljeno?' done':'')} style={{flexShrink:0}} onClick={()=>toggleDio(detail.id,d)}>{d.nabavljeno&&<Icons.Check size={9}/>}</div>
              <span style={{flex:1,fontSize:12,textDecoration:d.nabavljeno?'line-through':''}}>{d.naziv}</span>
              <span style={{fontSize:11,color:'var(--muted)',width:60,textAlign:'right'}}>{d.planirana_cijena?d.planirana_cijena+' KM':''}</span>
              <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:12,width:65,textAlign:'right',color:d.nabavljeno?(parseFloat(d.stvarna_cijena)>parseFloat(d.planirana_cijena)?'var(--red)':'var(--green)'):'var(--muted)'}}>{d.nabavljeno?(d.stvarna_cijena+' KM'):'—'}</span>
              <button className="del-btn" style={{opacity:1,color:'var(--blue)'}} onClick={()=>{setEditDio(d);setDioForm({naziv:d.naziv,planirana_cijena:d.planirana_cijena||'',stvarna_cijena:d.stvarna_cijena||'',nabavljeno:!!d.nabavljeno});setDioModal(detail.id);}}><Icons.Edit/></button>
              <button className="del-btn" onClick={()=>doDelDio(detail.id,d.id)}><Icons.Trash/></button>
            </div>)}
          </div>}
        </div>);
      })()}

        <div className="fg2"><label>Nabavna (KM)</label><input type="number" placeholder="0" value={form.nabavna_cijena} onChange={e=>setForm(f=>({...f,nabavna_cijena:e.target.value}))}/></div>
        <div className="fg2"><label>Prodajna (KM)</label><input type="number" placeholder="0" value={form.prodajna_cijena} onChange={e=>setForm(f=>({...f,prodajna_cijena:e.target.value}))}/></div>

      <div className="fg2"><label>OLX link</label><input placeholder="https://olx.ba/..." value={form.olx_link} onChange={e=>setForm(f=>({...f,olx_link:e.target.value}))}/></div>

// ===== ZADACI MODULE =====
function ZadaciModul({user,showToast}){
  const [zadaci,setZadaci]=useState([]);const [modal,setModal]=useState(false);
  const [form,setForm]=useState({naslov:'',opis:'',prioritet:'srednji'});
  const [filterStatus,setFilterStatus]=useState('otvoreno');
  const [sortPrioritet,setSortPrioritet]=useState('sve'); // sve | visok | srednji | nizak

  const load=async()=>{try{const d=await api('/zadaci');setZadaci(d);}catch(e){showToast(e.message,'err');}};
  useEffect(()=>{load();},[]);
  const toggle=async(z)=>{
    const novi=z.status==='otvoreno'?'zatvoreno':'otvoreno';
    await api('/zadaci/'+z.id,{method:'PUT',body:{...z,status:novi}});
    setZadaci(p=>p.map(x=>x.id===z.id?{...x,status:novi}:x));
    showToast(novi==='zatvoreno'?'Zadatak završen ✓':'Zadatak ponovo otvoren');
  };
  const doAdd=async()=>{
    if(!form.naslov.trim()){showToast('Naslov je obavezan','err');return;}
    const z=await api('/zadaci',{method:'POST',body:form});setZadaci(p=>[z,...p]);setModal(false);setForm({naslov:'',opis:'',prioritet:'srednji'});showToast('Zadatak dodan');
  };
  const doDel=async(id)=>{if(!window.confirm('Obrisati zadatak?'))return;await api('/zadaci/'+id,{method:'DELETE'});setZadaci(p=>p.filter(z=>z.id!=id));showToast('Zadatak obrisan');};
  const PRIOR_ORD={visok:0,srednji:1,nizak:2};
  const filtered=zadaci
    .filter(z=>(filterStatus==='sve'||z.status===filterStatus)&&(sortPrioritet==='sve'||z.prioritet===sortPrioritet))
    .sort((a,b)=>PRIOR_ORD[a.prioritet]-PRIOR_ORD[b.prioritet]);
  const otv=zadaci.filter(z=>z.status==='otvoreno').length,zatv=zadaci.filter(z=>z.status==='zatvoreno').length;
  return(<div className="page">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
      <div><div className="page-title">Zadaci</div><div className="page-sub">To-do lista za otpad</div></div>
      <button className="btn-add-main" onClick={()=>setModal(true)}><Icons.Plus size={13}/> Novi zadatak</button>
    </div>
    <div className="status-tabs">
      <button className={'stab'+(filterStatus==='otvoreno'?' as':'')} onClick={()=>setFilterStatus('otvoreno')}>Otvoreni ({otv})</button>
      <button className={'stab'+(filterStatus==='zatvoreno'?' ap':'')} onClick={()=>setFilterStatus('zatvoreno')}>Završeni ({zatv})</button>
      <button className={'stab'+(filterStatus==='sve'?' as':'')} onClick={()=>setFilterStatus('sve')}>Svi</button>
    </div>
    <div style={{display:'flex',gap:5,marginBottom:12,flexWrap:'wrap'}}>
      <span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:9,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)',alignSelf:'center',marginRight:3}}>Prioritet:</span>
      {[['sve','Svi',''],['visok','Visok','visok'],['srednji','Srednji','srednji'],['nizak','Nizak','nizak']].map(([v,l,cls])=>
        <button key={v} className={'stab'+(sortPrioritet===v?' '+(cls?'as':'as'):'')}
          style={{flex:'none',padding:'4px 10px',...(sortPrioritet===v&&cls==='visok'?{borderColor:'var(--red)',color:'var(--red)',background:'rgba(248,81,73,.08)'}:sortPrioritet===v&&cls==='srednji'?{borderColor:'var(--accent)',color:'var(--accent)',background:'rgba(240,180,41,.08)'}:sortPrioritet===v&&cls==='nizak'?{borderColor:'var(--blue)',color:'var(--blue)',background:'rgba(88,166,255,.08)'}:{})}}
          onClick={()=>setSortPrioritet(v)}>{l}</button>)}
    </div>
    <div className="zadaci-list">
      {filtered.length===0&&<div className="empty"><Icons.Task size={36}/><p>Nema zadataka.</p></div>}
      {filtered.map(z=><div key={z.id} className={'zadatak'+(z.status==='zatvoreno'?' zatvoren':'')}>
        <div className={'zadatak-check'+(z.status==='zatvoreno'?' done':'')} onClick={()=>toggle(z)}>
          {z.status==='zatvoreno'&&<Icons.Check size={10}/>}
        </div>
        <div className="zadatak-body">
          <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:3}}>
            <div className="zadatak-title" style={{textDecoration:z.status==='zatvoreno'?'line-through':'none'}}>{z.naslov}</div>
            <span className={'prioritet '+z.prioritet}>{z.prioritet}</span>
          </div>
          {z.opis&&<div className="zadatak-opis">{z.opis}</div>}
          <div style={{fontSize:10,color:'var(--muted)',marginTop:4}}>{z.dodao_korisnik} · {new Date(z.created_at).toLocaleDateString('sr-Latn-RS')}</div>
        </div>
        <button className="del-btn" onClick={()=>doDel(z.id)}><Icons.Trash/></button>
      </div>)}
    </div>
    {modal&&<div className="overlay" onClick={()=>setModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Novi zadatak <button className="btn-close" onClick={()=>setModal(false)}>×</button></div>
      <div className="fg2"><label>Naslov *</label><input autoFocus value={form.naslov} onChange={e=>setForm(f=>({...f,naslov:e.target.value}))} placeholder="Šta treba uraditi?"/></div>
      <div className="fg2"><label>Opis</label><textarea value={form.opis} onChange={e=>setForm(f=>({...f,opis:e.target.value}))} placeholder="Detalji..."/></div>
      <div className="fg2"><label>Prioritet</label><select value={form.prioritet} onChange={e=>setForm(f=>({...f,prioritet:e.target.value}))}><option value="visok">Visok</option><option value="srednji">Srednji</option><option value="nizak">Nizak</option></select></div>
      <div className="modal-foot"><button className="btn-cancel" onClick={()=>setModal(false)}>Odustani</button><button className="btn-save" onClick={doAdd}>Dodaj zadatak</button></div>
    </div></div>}
  <div className="site-footer">© 2026 <span>DelicNode</span></div>
  </div>);
}
