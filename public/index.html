<!DOCTYPE html>
<html lang="bs">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<meta name="theme-color" content="#0e1018"/>
<title>Auto Delic Gume</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e1018;--surf:#171b27;--card:#1c2133;--border:#252d42;--accent:#f0b429;--red:#e8532a;--blue:#4b8ef0;--green:#27ae60;--purple:#9b59b6;--text:#e6e9f4;--muted:#6e7a99;--radius:10px}
body{font-family:"Barlow",sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-tap-highlight-color:transparent}
.app{min-height:100vh;display:flex;flex-direction:column}
.nav{background:var(--surf);border-bottom:2px solid var(--accent);padding:0 18px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:10px}
.logo{font-family:"Barlow Condensed",sans-serif;font-weight:900;font-size:18px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;user-select:none;flex-shrink:0}
.logo-w{color:var(--text)}
.logo-sub{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:1px;margin-left:-4px;align-self:flex-end;padding-bottom:1px}
.nav-right{display:flex;align-items:center;gap:7px;flex-shrink:0}
.btn-gear{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:8px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .22s}
.btn-gear.on{border-color:var(--accent);color:var(--accent);background:rgba(240,180,41,.1)}
.btn-add{background:var(--accent);color:#000;border:none;font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;padding:7px 14px;border-radius:7px;cursor:pointer;display:flex;align-items:center;gap:5px;white-space:nowrap}
.main{flex:1;padding:16px;max-width:1280px;margin:0 auto;width:100%}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#222;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:999;white-space:nowrap;border-left:3px solid var(--green)}
.toast.err{border-left-color:var(--red)}
.set-panel{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:16px 18px;margin-bottom:20px}
.set-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.set-title{font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:6px}
.btn-new{background:var(--accent);color:#000;border:none;border-radius:6px;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:6px 12px;cursor:pointer;display:flex;align-items:center;gap:4px}
.mag-list{display:flex;flex-direction:column;gap:7px}
.mag-card{background:var(--card);border:1.5px solid var(--border);border-radius:8px;overflow:hidden}
.tree-row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;cursor:pointer;transition:background .14s;user-select:none}
.tree-row:hover{background:rgba(255,255,255,.03)}
.tree-row.prolaz{padding:6px 11px;background:var(--surf)}
.tree-row.regal{padding:4px 9px;background:var(--card)}
.tree-lbl-mag{font-family:"Barlow Condensed",sans-serif;font-size:15px;font-weight:800;letter-spacing:1px;text-transform:uppercase;display:flex;align-items:center;gap:7px;color:var(--text)}
.tree-lbl-prolaz{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--blue)}
.tree-lbl-regal{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.tree-meta{font-size:11px;color:var(--muted);font-weight:400;letter-spacing:0;text-transform:none}
.tree-right{display:flex;align-items:center;gap:5px}
.mag-body{padding:0 13px 13px}
.prolazi-wrap{display:flex;flex-direction:column;gap:5px}
.prolaz-row{background:var(--surf);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.prolaz-body{padding:5px 11px 10px}
.regali-wrap{display:flex;flex-direction:column;gap:4px}
.regal-row{background:var(--card);border:1px solid var(--border);border-radius:4px;overflow:hidden}
.regal-body{padding:5px 9px 8px}
.police-wrap{display:flex;flex-wrap:wrap;gap:4px}
.polica-chip{background:rgba(75,142,240,.1);border:1px solid rgba(75,142,240,.25);color:var(--blue);border-radius:4px;font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;padding:2px 6px;display:flex;align-items:center;gap:3px}
.add-row{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.add-btn{background:none;border:1px dashed var(--border);color:var(--muted);border-radius:4px;font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:600;text-transform:uppercase;padding:3px 8px;cursor:pointer;display:flex;align-items:center;gap:2px}
.del-btn{background:none;border:none;color:var(--muted);cursor:pointer;padding:2px 3px;border-radius:3px;display:flex;align-items:center;flex-shrink:0}
.cust-row{display:flex;gap:5px;margin-top:5px;align-items:center}
.cust-inp{background:var(--card);border:1px dashed var(--border);border-radius:4px;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;padding:4px 8px;outline:none;width:100px;text-transform:uppercase}
.add-cust{background:none;border:1px solid var(--accent);color:var(--accent);border-radius:4px;font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;text-transform:uppercase;padding:4px 8px;cursor:pointer;display:flex;align-items:center;gap:2px;white-space:nowrap}
.hero{text-align:center;padding:22px 0 16px}
.hero h1{font-family:"Barlow Condensed",sans-serif;font-size:36px;font-weight:900;letter-spacing:3px;text-transform:uppercase;line-height:1;margin-bottom:4px}
.hero h1 em{color:var(--accent);font-style:normal}
.hero p{color:var(--muted);font-size:12px}
.sf-wrap{background:var(--surf);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
.sf-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.sf-full{grid-column:1/-1}
.fg label{display:block;font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:4px}
.fg input,.fg select{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;padding:8px 10px;outline:none}
.fg select option{background:var(--card)}
.btn-srch{background:var(--red);color:#fff;border:none;border-radius:6px;font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:13px;letter-spacing:1px;text-transform:uppercase;height:36px;width:100%;display:flex;align-items:center;justify-content:center;gap:5px;cursor:pointer}
.status-tabs{display:flex;gap:7px;margin-bottom:14px}
.stab{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:7px;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:6px 14px;cursor:pointer;flex:1;text-align:center}
.stab.as{border-color:var(--green);color:var(--green);background:rgba(39,174,96,.08)}
.stab.ap{border-color:var(--purple);color:var(--purple);background:rgba(155,89,182,.08)}
.res-count{font-family:"Barlow Condensed",sans-serif;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:10px}
.res-count b{color:var(--accent);font-size:14px}
.tire-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.tire-card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;cursor:pointer;position:relative}
.tire-card.sold{opacity:.7;border-color:#3d2d5a}
.tire-thumb{width:100%;height:130px;background:var(--surf);display:flex;align-items:center;justify-content:center;color:var(--border)}
.tire-thumb img{width:100%;height:100%;object-fit:cover}
.bs{position:absolute;top:8px;left:8px;font-family:"Barlow Condensed",sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;display:flex;align-items:center;gap:3px}
.bs.z{background:rgba(75,142,240,.22);color:#4b8ef0;border:1px solid #4b8ef0}
.bs.l{background:rgba(240,180,41,.16);color:#f0b429;border:1px solid #f0b429}
.bsif{position:absolute;top:8px;right:8px;background:rgba(0,0,0,.65);border:1px solid rgba(255,255,255,.1);color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:800;padding:2px 6px;border-radius:3px}
.bsold{position:absolute;bottom:0;left:0;right:0;background:rgba(155,89,182,.85);color:#fff;font-family:"Barlow Condensed",sans-serif;font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;text-align:center;padding:3px}
.tire-info{padding:9px 11px}
.tire-size{font-family:"Barlow Condensed",sans-serif;font-weight:800;font-size:17px;letter-spacing:1px;margin-bottom:2px}
.tire-cod{font-family:"Barlow Condensed",sans-serif;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:2px}
.tire-loc{font-size:10px;color:var(--muted)}
.empty{text-align:center;padding:50px 20px;color:var(--muted)}
.empty p{font-size:13px;margin-top:12px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:300;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surf);border:1.5px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:500px;max-height:92vh;overflow-y:auto}
.modal-title{font-family:"Barlow Condensed",sans-serif;font-size:19px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:18px;display:flex;align-items:center;justify-content:space-between}
.btn-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:20px;line-height:1;padding:0}
.fg2{margin-bottom:13px}
.fg2 label{display:block;font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.fg2 input,.fg2 select,.fg2 textarea{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:"Barlow",sans-serif;font-size:13px;padding:8px 11px;outline:none}
.fg2 select option{background:var(--card)}
.fg2 textarea{resize:vertical;min-height:60px}
.fg2 input.ok{border-color:var(--green)}
.fg2 input.err{border-color:var(--red)}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sifra-prev{background:rgba(240,180,41,.08);border:1px solid rgba(240,180,41,.25);border-radius:7px;padding:7px 13px;font-family:"Barlow Condensed",sans-serif;font-size:16px;font-weight:900;color:var(--accent);letter-spacing:2px;margin-bottom:14px;display:flex;align-items:center;gap:7px}
.sifra-prev span{font-size:10px;color:var(--muted);font-weight:600;text-transform:uppercase}
.ph{margin-top:5px;padding:6px 10px;border-radius:5px;font-size:12px;display:flex;align-items:center;gap:5px}
.ph.ok{background:rgba(39,174,96,.08);border:1px solid rgba(39,174,96,.3);color:var(--green)}
.ph.err{background:rgba(232,83,42,.08);border:1px solid rgba(232,83,42,.3);color:var(--red)}
.perr{margin-top:5px;padding:7px 10px;border-radius:5px;font-size:12px;background:rgba(232,83,42,.1);border:1.5px solid rgba(232,83,42,.5);color:var(--red);font-weight:600}
.img-zone{border:2px dashed var(--border);border-radius:8px;padding:16px;text-align:center;cursor:pointer;color:var(--muted);font-size:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;min-height:70px}
.img-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:8px}
.img-item{position:relative;border-radius:5px;overflow:hidden;aspect-ratio:1;background:var(--card)}
.img-item img{width:100%;height:100%;object-fit:cover;display:block}
.img-rm{position:absolute;top:3px;right:3px;background:rgba(0,0,0,.75);border:none;color:#fff;border-radius:50%;width:18px;height:18px;cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:14px;border-top:1px solid var(--border);align-items:center}
.foot-left{margin-right:auto}
.btn-cancel{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:6px;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 13px;cursor:pointer}
.btn-save{background:var(--accent);color:#000;border:none;border-radius:6px;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:8px 18px;cursor:pointer}
.btn-sell{background:var(--green);color:#fff;border:none;border-radius:6px;font-family:"Barlow Condensed",sans-serif;font-size:14px;font-weight:900;letter-spacing:1px;text-transform:uppercase;padding:9px 20px;cursor:pointer;display:flex;align-items:center;gap:6px}
.btn-edit{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:6px;font-family:"Barlow Condensed",sans-serif;font-size:12px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:7px 13px;cursor:pointer;display:flex;align-items:center;gap:4px}
.btn-del-sm{color:var(--red);border:1px solid rgba(232,83,42,.3);border-radius:5px;padding:5px 8px;background:none;font-family:"Barlow Condensed",sans-serif;font-weight:700;font-size:10px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;display:flex;align-items:center;gap:3px;opacity:.65}
.det-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-bottom:14px}
.det-imgs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:5px;display:block}
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:10px}
.spec-box{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.spec-lbl{font-family:"Barlow Condensed",sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.spec-val{font-family:"Barlow Condensed",sans-serif;font-size:18px;font-weight:800}
.loc-box{background:rgba(75,142,240,.07);border:1px solid rgba(75,142,240,.2);border-radius:6px;padding:8px 12px;font-size:12px;color:#4b8ef0;margin-bottom:10px}
.sold-box{background:rgba(155,89,182,.1);border:1px solid rgba(155,89,182,.3);border-radius:6px;padding:8px 12px;font-size:12px;color:var(--purple);margin-bottom:10px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.sec-lbl{font-family:"Barlow Condensed",sans-serif;font-size:10px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;padding-bottom:4px;border-bottom:1px solid var(--border);margin-top:12px}
.sell-box{background:rgba(39,174,96,.06);border:1.5px solid rgba(39,174,96,.2);border-radius:10px;padding:16px;margin-bottom:4px}
.sell-box p{color:var(--muted);font-size:13px;margin-bottom:12px;line-height:1.5}
.sell-box strong{color:var(--text)}
.price-row{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:6px;overflow:hidden;background:var(--card)}
.price-inp{flex:1;background:transparent;border:none;color:var(--text);font-family:"Barlow Condensed",sans-serif;font-size:22px;font-weight:800;padding:10px 13px;outline:none}
.price-curr{padding:10px 13px;font-family:"Barlow Condensed",sans-serif;font-size:13px;font-weight:700;color:var(--muted);border-left:1px solid var(--border)}
@media(max-width:600px){.two-col{grid-template-columns:1fr}.logo-sub{display:none}}
</style>
</head>

<script type="text/babel">
const {useState,useMemo,useRef,useEffect,useCallback} = React;

// API helper
async function api(path, opts={}) {
  const res = await fetch('/api'+path, {
    headers:{'Content-Type':'application/json'},
    ...opts,
    body: opts.body ? JSON.stringify(opts.body) : undefined
  });
  const data = await res.json();
  if (!res.ok) throw new Error(data.error || 'Greska');
  return data;
}

  Snow:   ()=><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><line x1="12" y1="2" x2="12" y2="22"/><line x1="2" y1="12" x2="22" y2="12"/></svg>,
  Sun:    ()=><svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>,
  Img:    ()=><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.6"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>,
  Check:  ()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>,
  Edit:   ()=><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>,
  Sell:   ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>,
  Search: ()=><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.3" strokeLinecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>,
};

// Toast component
function Toast({msg, type}) {
  if (!msg) return null;
  return <div className={"toast"+(type==="err"?" err":"")}>{msg}</div>;
}

// Main App
function App() {
  const [magacini, setMagacini] = useState([]);
  const [gume, setGume] = useState([]);
  const [police, setPolice] = useState([]);
  const [loading, setLoading] = useState(true);
  const [settingsOpen, setSettingsOpen] = useState(false);
  const [openMag, setOpenMag] = useState({});
  const [openProlaz, setOpenProlaz] = useState({});
  const [openRegal, setOpenRegal] = useState({});
  const [customPolica, setCustomPolica] = useState({});
  const [statusTab, setStatusTab] = useState('stanje');
  const [filters, setFilters] = useState({sezona:'',sirina:'',visina:'',promjer:'',sifra:''});
  const [modal, setModal] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [detailG, setDetailG] = useState(null);
  const [sellModal, setSellModal] = useState(false);
  const [sellPrice, setSellPrice] = useState('');
  const [form, setForm] = useState({...EMPTY_FORM});
  const [submitAttempted, setSubmitAttempted] = useState(false);
  const [newMagName, setNewMagName] = useState('');
  const [toast, setToast] = useState(null);
  const [nextGuNum, setNextGuNum] = useState(10);
  const fileRef = useRef();

  const showToast = useCallback((msg, type='ok') => {
    setToast({msg, type});
    setTimeout(() => setToast(null), 2500);
  }, []);

  const loadAll = useCallback(async () => {
    try {
      const [m, g, p] = await Promise.all([api('/magacini'), api('/gume'), api('/police')]);
      setMagacini(m); setGume(g); setPolice(p);
      const maxGu = g.reduce((max, x) => {
        const n = parseInt(x.sifra.replace('GU',''))||0;
        return n>max?n:max;
      }, 9);
      setNextGuNum(maxGu+1);
    } catch(e) { showToast('Greska pri ucitavanju: '+e.message, 'err'); }
    setLoading(false);
  }, [showToast]);

  useEffect(() => { loadAll(); }, [loadAll]);

  const loadPolice = async () => {
    const p = await api('/police');
    setPolice(p);
  };

  // Polica match for form
  const policaMatch = useMemo(() => {
    if (!form.policaKod.trim()) return null;
    return police.find(p => p.naziv.toLowerCase() === form.policaKod.trim().toLowerCase()) || null;
  }, [form.policaKod, police]);

  // Filtered gume
  const filtered = useMemo(() => {
    return gume.filter(g => {
      if (statusTab==='stanje' && g.prodato) return false;
      if (statusTab==='prodato' && !g.prodato) return false;
      if (filters.sezona && g.sezona!==filters.sezona) return false;
      if (filters.sirina && !g.sirina.includes(filters.sirina)) return false;
      if (filters.visina && !g.visina.includes(filters.visina)) return false;
      if (filters.promjer && !g.promjer.includes(filters.promjer)) return false;
      if (filters.sifra && !g.sifra.toLowerCase().includes(filters.sifra.toLowerCase())) return false;
      return true;
    });
  }, [gume, statusTab, filters]);

  const stanjeCount = useMemo(() => gume.filter(g=>!g.prodato).length, [gume]);
  const prodatoCount = useMemo(() => gume.filter(g=>g.prodato).length, [gume]);

  // ===== MAGACIN OPS =====
  const doAddMag = async () => {
    if (!newMagName.trim()) return;
    try {
      const m = await api('/magacini', {method:'POST', body:{naziv:newMagName.trim()}});
      m.prolazi = [];
      setMagacini(p => [...p, m]);
      setOpenMag(p => ({...p, [m.id]:true}));
      setNewMagName(''); setModal(null);
      showToast('Magacin "'+newMagName.trim()+'" kreiran');
    } catch(e) { showToast(e.message,'err'); }
  };

  const doDelMag = async (id) => {
    if (!confirm('Obrisati magacin?')) return;
    await api('/magacini/'+id, {method:'DELETE'});
    setMagacini(p => p.filter(m => m.id!=id));
    await loadPolice(); showToast('Magacin obrisan');
  };

  const doAddProlaz = async (mid) => {
    const pr = await api('/prolazi', {method:'POST', body:{magacin_id:mid}});
    pr.regali = [];
    setMagacini(p => p.map(m => m.id!=mid ? m : {...m, prolazi:[...m.prolazi,pr]}));
    setOpenMag(p=>({...p,[mid]:true})); setOpenProlaz(p=>({...p,[pr.id]:true}));
  };

  const doDelProlaz = async (mid, pid) => {
    await api('/prolazi/'+pid, {method:'DELETE'});
    setMagacini(p => p.map(m => m.id!=mid ? m : {...m, prolazi:m.prolazi.filter(pr=>pr.id!=pid)}));
    await loadPolice();
  };

  const doAddRegal = async (mid, pid) => {
    const r = await api('/regali', {method:'POST', body:{prolaz_id:pid}});
    r.police = [];
    setMagacini(p => p.map(m => m.id!=mid ? m : {...m, prolazi:m.prolazi.map(pr => pr.id!=pid ? pr : {...pr, regali:[...pr.regali,r]})}));
    setOpenProlaz(p=>({...p,[pid]:true})); setOpenRegal(p=>({...p,[r.id]:true}));
  };

  const doDelRegal = async (mid, pid, rid) => {
    await api('/regali/'+rid, {method:'DELETE'});
    setMagacini(p => p.map(m => m.id!=mid ? m : {...m, prolazi:m.prolazi.map(pr => pr.id!=pid ? pr : {...pr, regali:pr.regali.filter(r=>r.id!=rid)})}));
    await loadPolice();
  };

  const doAddPolica = async (mid, pid, rid) => {
    try {
      const pl = await api('/police/auto', {method:'POST', body:{regal_id:rid}});
      setMagacini(p => p.map(m => m.id!=mid ? m : {...m, prolazi:m.prolazi.map(pr => pr.id!=pid ? pr : {...pr, regali:pr.regali.map(r => r.id!=rid ? r : {...r, police:[...r.police,pl]})})}));
      setOpenRegal(p=>({...p,[rid]:true}));
      await loadPolice();
    } catch(e) { showToast(e.message,'err'); }
  };

  const doAddCustomPolica = async (rid, mid, pid) => {
    const raw = (customPolica[rid]||'').trim();
    if (!raw) return;
    try {
      const pl = await api('/police/custom', {method:'POST', body:{regal_id:rid, naziv:raw}});
      setMagacini(p => p.map(m => m.id!=mid ? m : {...m, prolazi:m.prolazi.map(pr => pr.id!=pid ? pr : {...pr, regali:pr.regali.map(r => r.id!=rid ? r : {...r, police:[...r.police,pl]})})}));
      setCustomPolica(p=>({...p,[rid]:''}));
      setOpenRegal(p=>({...p,[rid]:true}));
      await loadPolice();
    } catch(e) { showToast(e.message,'err'); }
  };

  const doDelPolica = async (mid, pid, rid, plid) => {
    await api('/police/'+plid, {method:'DELETE'});
    setMagacini(p => p.map(m => m.id!=mid ? m : {...m, prolazi:m.prolazi.map(pr => pr.id!=pid ? pr : {...pr, regali:pr.regali.map(r => r.id!=rid ? r : {...r, police:r.police.filter(pl=>pl.id!=plid)})})}));
    await loadPolice();
  };

  // ===== GUMA OPS =====
  const handleImgs = (e) => {
    Array.from(e.target.files).forEach(file => {
      const reader = new FileReader();
      reader.onloadend = ev => { if (ev.target.result) setForm(prev=>({...prev, slike:[...prev.slike, ev.target.result]})); };
      reader.readAsDataURL(file);
    });
    e.target.value='';
  };

  const canSave = form.sezona && form.sirina && form.visina && form.promjer && policaMatch;

  const doSaveGuma = async () => {
    setSubmitAttempted(true);
    if (!canSave) return;
    try {
      const body = {sezona:form.sezona, sirina:form.sirina, visina:form.visina, promjer:form.promjer, napomena:form.napomena, policaKod:policaMatch.naziv, slike:form.slike||[]};
      let g;
      if (modal==='editGuma' && editingId) {
        g = await api('/gume/'+editingId, {method:'PUT', body});
        setGume(p => p.map(x => x.id===g.id ? g : x));
        showToast('Guma azurirana');
      } else {
        g = await api('/gume', {method:'POST', body});
        setGume(p => [g,...p]);
        setNextGuNum(n => n+1);
        showToast('Guma '+g.sifra+' dodana');
      }
      setModal(null); setSubmitAttempted(false); setForm({...EMPTY_FORM});
    } catch(e) { showToast(e.message,'err'); }
  };

  const doSell = async () => {
    const price = sellPrice;
    try {
      const g = await api('/gume/'+detailG.id+'/prodaj', {method:'POST', body:{cijena:price}});
      setGume(p => p.map(x => x.id===g.id ? g : x));
      setSellModal(false); setDetailG(null);
      showToast(g.sifra+' prodana'+(g.cijena_prodaje?' za '+g.cijena_prodaje:''));
    } catch(e) { showToast(e.message,'err'); }
  };

  const doDelete = async (id) => {
    if (!confirm('Obrisati gumu?')) return;
    await api('/gume/'+id, {method:'DELETE'});
    setGume(p => p.filter(g=>g.id!=id));
    setDetailG(null); setModal(null);
    showToast('Guma obrisana');
  };

  const openEdit = (g) => {
    setForm({sezona:g.sezona, sirina:g.sirina, visina:g.visina, promjer:g.promjer, napomena:g.napomena||'', policaKod:g.polica_kod||'', slike:g.slike?[...g.slike]:[]});
    setEditingId(g.id); setDetailG(null); setSubmitAttempted(false); setModal('editGuma');
  };

  const policaClass = !form.policaKod.trim() ? '' : policaMatch ? 'ok' : 'err';
  const showPolicaErr = submitAttempted && !policaMatch;

  return (
    <div className="app">
      <nav className="nav">
        <div className="logo"><I.TireSm/> AUTO <span className="logo-w">DELIC</span><span className="logo-sub">GUME</span></div>
        <div className="nav-right">
          <button className={"btn-gear"+(settingsOpen?" on":"")} onClick={()=>setSettingsOpen(s=>!s)}><I.Gear/></button>
          <button className="btn-add" onClick={()=>{setForm({...EMPTY_FORM});setEditingId(null);setSubmitAttempted(false);setModal('addGuma');}}><I.Plus/> Dodaj gumu</button>
        </div>
      </nav>

      <main className="main">
        {settingsOpen && (
          <div className="set-panel">
            <div className="set-head">
              <div className="set-title"><I.House/> Magacin</div>
              <button className="btn-new" onClick={()=>setModal('addMag')}><I.Plus/> Novi magacin</button>
            </div>
            {magacini.length===0
              ? <div style={{textAlign:'center',padding:'20px 0',color:'var(--muted)',fontSize:13}}>Nema magacina. Dodaj prvi!</div>
              : <div className="mag-list">
                {magacini.map(m=>(
                  <div key={m.id} className="mag-card">
                    <div className="tree-row" onClick={()=>setOpenMag(p=>({...p,[m.id]:!p[m.id]}))}>
                      <div className="tree-lbl-mag"><span style={{color:'var(--accent)'}}><I.House/></span>{m.naziv}<span className="tree-meta">{m.prolazi.length} prolaza</span></div>
                      <div className="tree-right">
                        <span className="del-btn" onClick={e=>{e.stopPropagation();doDelMag(m.id);}}><I.Trash/></span>
                        <span style={{fontSize:10,color:'var(--muted)'}}>{openMag[m.id]?'▲':'▼'}</span>
                      </div>
                    </div>
                    {openMag[m.id] && (
                      <div className="mag-body">
                        <div className="prolazi-wrap">
                          {m.prolazi.map(pr=>(
                            <div key={pr.id} className="prolaz-row">
                              <div className="tree-row prolaz" onClick={()=>setOpenProlaz(p=>({...p,[pr.id]:!p[pr.id]}))}>
                                <span className="tree-lbl-prolaz">{pr.naziv}</span>
                                <div className="tree-right">
                                  <span className="del-btn" onClick={e=>{e.stopPropagation();doDelProlaz(m.id,pr.id);}}><I.Trash/></span>
                                  <span style={{fontSize:10,color:'var(--muted)'}}>{openProlaz[pr.id]?'▲':'▼'}</span>
                                </div>
                              </div>
                              {openProlaz[pr.id] && (
                                <div className="prolaz-body">
                                  <div className="regali-wrap">
                                    {pr.regali.map(r=>(
                                      <div key={r.id} className="regal-row">
                                        <div className="tree-row regal" onClick={()=>setOpenRegal(p=>({...p,[r.id]:!p[r.id]}))}>
                                          <span className="tree-lbl-regal">{r.naziv} <span style={{fontWeight:400}}>({r.police.length} pol.)</span></span>
                                          <div className="tree-right">
                                            <span className="del-btn" onClick={e=>{e.stopPropagation();doDelRegal(m.id,pr.id,r.id);}}><I.Trash/></span>
                                            <span style={{fontSize:10,color:'var(--muted)'}}>{openRegal[r.id]?'▲':'▼'}</span>
                                          </div>
                                        </div>
                                        {openRegal[r.id] && (
                                          <div className="regal-body">
                                            <div className="police-wrap">
                                              {r.police.map(pl=>(
                                                <div key={pl.id} className="polica-chip">{pl.naziv}
                                                  <span className="del-btn" style={{padding:0}} onClick={e=>{e.stopPropagation();doDelPolica(m.id,pr.id,r.id,pl.id);}}><I.X/></span>
                                                </div>
                                              ))}
                                            </div>
                                            <div className="add-row">
                                              <span className="add-btn" onClick={e=>{e.stopPropagation();doAddPolica(m.id,pr.id,r.id);}}><I.Plus/> Auto</span>
                                            </div>
                                            <div className="cust-row" onClick={e=>e.stopPropagation()}>
                                              <input className="cust-inp" placeholder="npr. P2334"
                                                value={customPolica[r.id]||''}
                                                onChange={e=>setCustomPolica(p=>({...p,[r.id]:e.target.value}))}
                                                onKeyDown={e=>e.key==='Enter'&&doAddCustomPolica(r.id,m.id,pr.id)}
                                              />
                                              <span className="add-cust" onClick={()=>doAddCustomPolica(r.id,m.id,pr.id)}><I.Plus/> Custom</span>
                                            </div>
                                          </div>
                                        )}
                                      </div>
                                    ))}
                                  </div>
                                  <div className="add-row" onClick={e=>e.stopPropagation()}>
                                    <span className="add-btn" onClick={()=>doAddRegal(m.id,pr.id)}><I.Plus/> Dodaj regal</span>
                                  </div>
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                        <div className="add-row" onClick={e=>e.stopPropagation()}>
                          <span className="add-btn" onClick={()=>doAddProlaz(m.id)}><I.Plus/> Dodaj prolaz</span>
                        </div>
                      </div>
                    )}
                  </div>
                ))}
              </div>
            }
          </div>
        )}

        <div className="hero"><h1>Pretraga <em>Guma</em></h1><p>Pronadi gumu u skladistu za nekoliko sekundi</p></div>

        <div className="sf-wrap">
          <div className="sf-grid">
            <div className="fg sf-full"><label>Interna sifra</label><input placeholder="npr. GU10" value={filters.sifra} onChange={e=>setFilters(f=>({...f,sifra:e.target.value}))}/></div>
            <div className="fg"><label>Sezona</label><select value={filters.sezona} onChange={e=>setFilters(f=>({...f,sezona:e.target.value}))}><option value="">Sve</option><option>Zimska</option><option>Ljetna</option></select></div>
            <div className="fg"><label>Sirina</label><input placeholder="205" value={filters.sirina} onChange={e=>setFilters(f=>({...f,sirina:e.target.value}))}/></div>
            <div className="fg"><label>Visina</label><input placeholder="55" value={filters.visina} onChange={e=>setFilters(f=>({...f,visina:e.target.value}))}/></div>
            <div className="fg"><label>Promjer</label><input placeholder="16" value={filters.promjer} onChange={e=>setFilters(f=>({...f,promjer:e.target.value}))}/></div>
            <div className="fg"><button className="btn-srch"><I.Search/> Trazi</button></div>
          </div>
        </div>

        <div className="status-tabs">
          <button className={"stab"+(statusTab==='stanje'?' as':'')} onClick={()=>setStatusTab('stanje')}>Na stanju ({stanjeCount})</button>
          <button className={"stab"+(statusTab==='prodato'?' ap':'')} onClick={()=>setStatusTab('prodato')}>Prodato ({prodatoCount})</button>
        </div>
        <div className="res-count">Prikazano: <b>{filtered.length}</b> guma</div>

        {loading ? <div className="empty"><p>Ucitavanje...</p></div>
         : filtered.length===0 ? <div className="empty"><I.Tire/><p>{gume.length===0?'Nema guma. Dodaj prvu!':'Nema rezultata.'}</p></div>
         : <div className="tire-grid">
            {filtered.map(g=>(
              <div key={g.id} className={"tire-card"+(g.prodato?' sold':'')} onClick={()=>setDetailG(g)}>
                <div className="tire-thumb">{g.slike&&g.slike.length>0?<img src={g.slike[0]} alt="guma" loading="lazy"/>:<I.Tire/>}</div>
                <span className={"bs "+(g.sezona==='Zimska'?'z':'l')}>{g.sezona==='Zimska'?<I.Snow/>:<I.Sun/>} {g.sezona}</span>
                <span className="bsif">{g.sifra}</span>
                {g.prodato&&<div className="bsold">Prodato{g.datum_prodaje?' · '+g.datum_prodaje:''}</div>}
                <div className="tire-info">
                  <div className="tire-size">{g.sirina}/{g.visina} R{g.promjer}</div>
                  <div className="tire-cod">{g.sifra}</div>
                  <div className="tire-loc">{g.polica_kod||'—'}</div>
                </div>
              </div>
            ))}
          </div>
        }
      </main>

      {/* MODAL: NOVI MAGACIN */}
      {modal==='addMag' && (
        <div className="overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Novi magacin <button className="btn-close" onClick={()=>setModal(null)}>×</button></div>
            <div className="fg2"><label>Naziv</label>
              <input autoFocus value={newMagName} onChange={e=>setNewMagName(e.target.value)} placeholder="npr. Magacin Glavni"
                onKeyDown={e=>e.key==='Enter'&&doAddMag()}/>
            </div>
            <div className="modal-foot">
              <button className="btn-cancel" onClick={()=>setModal(null)}>Odustani</button>
              <button className="btn-save" onClick={doAddMag}>Kreiraj</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL: DODAJ/EDITUJ GUMU */}
      {(modal==='addGuma'||modal==='editGuma') && (
        <div className="overlay" onClick={()=>setModal(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{modal==='editGuma'?'Uredi gumu':'Dodaj gumu'} <button className="btn-close" onClick={()=>setModal(null)}>×</button></div>
            {modal==='addGuma'&&<div className="sifra-prev"><span>Sifra:</span> GU{nextGuNum}</div>}
            <div className="fg2"><label>Sezona *</label>
              <select value={form.sezona} onChange={e=>setForm(f=>({...f,sezona:e.target.value}))}>
                <option value="">— Odaberi —</option><option>Zimska</option><option>Ljetna</option>
              </select>
            </div>
            <div className="two-col">
              <div className="fg2"><label>Sirina (mm) *</label><input type="number" placeholder="205" value={form.sirina} onChange={e=>setForm(f=>({...f,sirina:e.target.value}))}/></div>
              <div className="fg2"><label>Visina (%) *</label><input type="number" placeholder="55" value={form.visina} onChange={e=>setForm(f=>({...f,visina:e.target.value}))}/></div>
            </div>
            <div className="fg2"><label>Promjer (inch) *</label><input type="number" placeholder="16" value={form.promjer} onChange={e=>setForm(f=>({...f,promjer:e.target.value}))}/></div>
            <div className="fg2">
              <label>Sifra police * (obavezno)</label>
              <input className={policaClass} placeholder="npr. P10" value={form.policaKod}
                onChange={e=>setForm(f=>({...f,policaKod:e.target.value}))} autoComplete="off"/>
              {form.policaKod.trim()&&policaMatch&&<div className="ph ok"><I.Check/> {policaMatch.magacin_naziv} &gt; {policaMatch.prolaz_naziv} &gt; {policaMatch.regal_naziv} &gt; {policaMatch.naziv}</div>}
              {form.policaKod.trim()&&!policaMatch&&<div className="ph err">Polica "{form.policaKod}" ne postoji</div>}
              {showPolicaErr&&<div className="perr">Polica je obavezna i mora postojati</div>}
              {!form.policaKod.trim()&&police.length>0&&<div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Dostupne: {police.map(p=>p.naziv).join(', ')}</div>}
              {police.length===0&&<div style={{fontSize:11,color:'var(--muted)',marginTop:4}}>Nema polica — kreiraj ih u podesavanjima.</div>}
            </div>
            <div className="fg2"><label>Napomena</label><textarea placeholder="Stanje, opis..." value={form.napomena} onChange={e=>setForm(f=>({...f,napomena:e.target.value}))}/></div>
            <div className="fg2">
              <label>Slike</label>
              <div className="img-zone" onClick={()=>fileRef.current?.click()}><I.Img/><span>Klikni za dodavanje slika</span></div>
              <input ref={fileRef} type="file" accept="image/*" multiple style={{display:'none'}} onChange={handleImgs}/>
              {form.slike.length>0&&<div className="img-grid">{form.slike.map((src,i)=>(
                <div key={i} className="img-item"><img src={src} alt=""/><button className="img-rm" onClick={()=>setForm(f=>({...f,slike:f.slike.filter((_,j)=>j!==i)}))}>x</button></div>
              ))}</div>}
            </div>
            <div className="modal-foot">
              <button className="btn-cancel" onClick={()=>setModal(null)}>Odustani</button>
              <button className="btn-save" onClick={doSaveGuma}>{modal==='editGuma'?'Sacuvaj izmjene':'Sacuvaj gumu'}</button>
            </div>
          </div>
        </div>
      )}

      {/* MODAL: DETALJI */}
      {detailG&&!sellModal&&(
        <div className="overlay" onClick={()=>setDetailG(null)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">{detailG.sirina}/{detailG.visina} R{detailG.promjer} <button className="btn-close" onClick={()=>setDetailG(null)}>×</button></div>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:14}}>
              <span className={"bs "+(detailG.sezona==='Zimska'?'z':'l')} style={{position:'static',display:'inline-flex'}}>{detailG.sezona==='Zimska'?<I.Snow/>:<I.Sun/>} {detailG.sezona}</span>
              <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:18,color:'var(--accent)',letterSpacing:2}}>{detailG.sifra}</span>
            </div>
            {detailG.slike&&detailG.slike.length>0&&<div className="det-imgs">{detailG.slike.map((s,i)=><img key={i} src={s} alt=""/>)}</div>}
            <div className="specs-grid">
              <div className="spec-box"><div className="spec-lbl">Sirina</div><div className="spec-val">{detailG.sirina} mm</div></div>
              <div className="spec-box"><div className="spec-lbl">Visina</div><div className="spec-val">{detailG.visina}%</div></div>
              <div className="spec-box"><div className="spec-lbl">Promjer</div><div className="spec-val">R{detailG.promjer}"</div></div>
              <div className="spec-box"><div className="spec-lbl">Sifra</div><div className="spec-val" style={{color:'var(--accent)'}}>{detailG.sifra}</div></div>
            </div>
            {detailG.polica_kod&&<div className="loc-box">Polica: {detailG.polica_kod}</div>}
            {detailG.prodato&&<div className="sold-box">Prodato{detailG.datum_prodaje?' · '+detailG.datum_prodaje:''}{detailG.cijena_prodaje&&<span style={{marginLeft:'auto',fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:15}}>{detailG.cijena_prodaje}</span>}</div>}
            {detailG.napomena&&<><div className="sec-lbl">Napomena</div><p style={{fontSize:13,color:'var(--muted)',lineHeight:1.6}}>{detailG.napomena}</p></>}
            <div className="modal-foot">
              <div className="foot-left"><button className="btn-del-sm" onClick={()=>doDelete(detailG.id)}><I.Trash/> Obrisi</button></div>
              {!detailG.prodato&&<button className="btn-edit" onClick={()=>openEdit(detailG)}><I.Edit/> Uredi</button>}
              {!detailG.prodato&&<button className="btn-sell" onClick={()=>setSellModal(true)}><I.Sell/> Prodaj gumu</button>}
              {detailG.prodato&&<button className="btn-cancel" onClick={()=>setDetailG(null)}>Zatvori</button>}
            </div>
          </div>
        </div>
      )}

      {/* MODAL: PRODAJ */}
      {detailG&&sellModal&&(
        <div className="overlay" onClick={()=>setSellModal(false)}>
          <div className="modal" onClick={e=>e.stopPropagation()}>
            <div className="modal-title">Prodaj gumu <button className="btn-close" onClick={()=>setSellModal(false)}>×</button></div>
            <div className="sell-box">
              <p>Prodajes: <strong>{detailG.sifra} — {detailG.sirina}/{detailG.visina} R{detailG.promjer} ({detailG.sezona})</strong></p>
              <div className="fg2" style={{marginTop:12}}>
                <label>Prodajna cijena (opcionalno)</label>
                <div className="price-row">
                  <input className="price-inp" type="number" placeholder="0" value={sellPrice}
                    onChange={e=>setSellPrice(e.target.value)} autoFocus
                    onKeyDown={e=>e.key==='Enter'&&doSell()}/>
                  <span className="price-curr">KM</span>
                </div>
              </div>
            </div>
            <div className="modal-foot">
              <button className="btn-cancel" onClick={()=>setSellModal(false)}>Odustani</button>
              <button className="btn-sell" onClick={doSell}><I.Sell/> {sellPrice?'Prodaj za '+sellPrice+' KM':'Potvrdi prodaju'}</button>
            </div>
          </div>
        </div>
      )}

      {toast&&<Toast msg={toast.msg} type={toast.type}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
