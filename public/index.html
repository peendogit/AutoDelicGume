// ===== GUME MODULE =====
function GumeModul({user,showToast,gume,setGume,police,magacini,loadPolice,lightbox,setLightbox,quickAdd,onQuickAddDone}){
  const isAdmin=user.role==='admin';
  const [statusTab,setStatusTab]=useState('stanje');
  const [filters,setFilters]=useState({sezona:'',sirina:'',visina:'',promjer:'',sifra:'',tip:''});
  const [modal,setModal]=useState(null);const [editingId,setEditingId]=useState(null);
  const [detailG,setDetailG]=useState(null);const [sellModal,setSellModal]=useState(false);
  const [sellPrice,setSellPrice]=useState('');
  const [form,setForm]=useState({...EMPTY_GUMA});
  const [submitAttempted,setSubmitAttempted]=useState(false);
  const [savingGuma,setSavingGuma]=useState(false);
  const [moveModal,setMoveModal]=useState(null);const [moveKod,setMoveKod]=useState('');
  const [showHistorija,setShowHistorija]=useState(false);const [historijaGuma,setHistorijaGuma]=useState([]);
  const [customSirina,setCustomSirina]=useState(()=>{try{return JSON.parse(localStorage.getItem('adg_sirina')||'[]');}catch{return [];}});
  const [customVisina,setCustomVisina]=useState(()=>{try{return JSON.parse(localStorage.getItem('adg_visina')||'[]');}catch{return [];}});
  const [customPromjer,setCustomPromjer]=useState(()=>{try{return JSON.parse(localStorage.getItem('adg_promjer')||'[]');}catch{return [];}});
  const [policaSearch,setPolicaSearch]=useState(false);
  const [premjestanjeOpen,setPremjestanjeOpen]=useState(false);
  const [policaSearchVal,setPolicaSearchVal]=useState('');
  const [policaGume,setPolicaGume]=useState(null);
  const imgHook=useImageUpload([]);

  useEffect(()=>{if(quickAdd){openAdd();onQuickAddDone&&onQuickAddDone();}},[ quickAdd]);

  const sirina_opts=useMemo(()=>[...SIRINA_OPTIONS,...customSirina].filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>parseInt(a)-parseInt(b)),[customSirina]);
  const visina_opts=useMemo(()=>[...VISINA_OPTIONS,...customVisina].filter((v,i,a)=>a.indexOf(v)===i).sort((a,b)=>parseInt(a)-parseInt(b)),[customVisina]);
  const promjer_opts=useMemo(()=>[...PROMJER_OPTIONS,...customPromjer].filter((v,i,a)=>a.indexOf(v)===i),[customPromjer]);

  const filtered=useMemo(()=>gume.filter(g=>{
    if(statusTab==='stanje'&&g.prodato)return false;if(statusTab==='prodato'&&!g.prodato)return false;
    if(filters.sezona&&g.sezona!==filters.sezona)return false;if(filters.tip&&g.tip!==filters.tip)return false;
    if(filters.sirina&&!g.sirina.includes(filters.sirina))return false;if(filters.visina&&!g.visina.includes(filters.visina))return false;
    if(filters.promjer&&!g.promjer.includes(filters.promjer))return false;if(filters.sifra&&!g.sifra.toLowerCase().includes(filters.sifra.toLowerCase()))return false;
    return true;
  }),[gume,statusTab,filters]);

  const stanjeCount=useMemo(()=>gume.filter(g=>!g.prodato).length,[gume]);
  const prodatoCount=useMemo(()=>gume.filter(g=>g.prodato).length,[gume]);
  const policaMatch=useMemo(()=>{if(!form.policaKod.trim())return null;return police.find(p=>p.naziv.toLowerCase()===form.policaKod.trim().toLowerCase())||null;},[form.policaKod,police]);
  const canSave=form.sezona&&form.sirina&&form.visina&&form.promjer&&policaMatch&&!imgHook.uploadState.uploading&&!imgHook.uploadingRef.current&&!savingGuma;

  const nextGuNum=useMemo(()=>{const max=gume.reduce((m,x)=>{const n=parseInt(x.sifra.replace('GU',''))||0;return n>m?n:m;},9);return max+1;},[gume]);

  const openAdd=()=>{setForm({...EMPTY_GUMA});imgHook.setSlike([]);setEditingId(null);setSubmitAttempted(false);setModal('form');};
  const openEdit=(g)=>{setForm({sezona:g.sezona,sirina:g.sirina,visina:g.visina,promjer:g.promjer,napomena:g.napomena||'',policaKod:g.polica_kod||'',dubina:g.dubina||'',dot:g.dot||'',tip:g.tip||'',cijena:g.cijena||''});imgHook.setSlike(g.slike?[...g.slike]:[]);setEditingId(g.id);setDetailG(null);setSubmitAttempted(false);setModal('form');};

  const doSellAuto=async()=>{
    try{
      const updated=await api('/auta/'+detail.id,{method:'PUT',body:{...detail,slike:detail.slike,status:'prodat',prodajna_cijena:sellAutoPrice||detail.prodajna_cijena}});
      setAuta(p=>p.map(a=>a.id===updated.id?updated:a));
      setSellAutoModal(false);setDetail(null);setSellAutoPrice('');
      showToast(detail.marka+' '+detail.model+' označen kao prodat');
    }catch(e){showToast(e.message,'err');}
  };

  const doSave=async()=>{
    setSubmitAttempted(true);if(!canSave||savingGuma)return;setSavingGuma(true);
    try{
      const body={sezona:form.sezona,sirina:form.sirina,visina:form.visina,promjer:form.promjer,napomena:form.napomena,policaKod:policaMatch.naziv,slike:imgHook.slike||[],dubina:form.dubina||null,dot:form.dot||null,tip:form.tip||null,cijena:form.cijena||null};
      let g;
      if(editingId){g=await api('/gume/'+editingId,{method:'PUT',body});setGume(p=>p.map(x=>x.id===g.id?g:x));showToast('Guma ažurirana');}
      else{g=await api('/gume',{method:'POST',body});setGume(p=>[g,...p]);showToast('Guma '+g.sifra+' dodana');}
      setModal(null);setSubmitAttempted(false);
    }catch(e){showToast(e.message,'err');}setSavingGuma(false);
  };

  const doSell=async()=>{
    try{const g=await api('/gume/'+detailG.id+'/prodaj',{method:'POST',body:{cijena:sellPrice}});setGume(p=>p.map(x=>x.id===g.id?g:x));setSellModal(false);setDetailG(null);showToast(g.sifra+' prodana'+(g.cijena_prodaje?' za '+g.cijena_prodaje:''));}
    catch(e){showToast(e.message,'err');}
  };

  const doDel=async(id)=>{if(!window.confirm('Da li ste sigurni da želite obrisati ovu gumu? Ova akcija se ne može poništiti.'))return;await api('/gume/'+id,{method:'DELETE'});setGume(p=>p.filter(g=>g.id!=id));setDetailG(null);showToast('Guma obrisana');};

  const doMove=async()=>{
    const pm=police.find(p=>p.naziv.toLowerCase()===moveKod.trim().toLowerCase());
    if(!pm){showToast('Polica "'+moveKod+'" ne postoji','err');return;}
    try{const g=await api('/gume/'+moveModal.id+'/premjesti',{method:'POST',body:{policaKod:pm.naziv}});setGume(p=>p.map(x=>x.id===g.id?g:x));if(detailG&&detailG.id===g.id)setDetailG(g);setMoveModal(null);setMoveKod('');showToast('Guma premještena na policu '+pm.naziv);}
    catch(e){showToast(e.message,'err');}
  };

  const loadHistorija=async(id)=>{try{const h=await api('/gume/'+id+'/historija');setHistorijaGuma(h);setShowHistorija(true);}catch(e){showToast(e.message,'err');}};

  const TIP_OPTS=[{v:'',l:'Svi tipovi'},{v:'komad',l:'Komad (1)'},{v:'par',l:'Par (2)'},{v:'set',l:'Set (4)'}];

  return(<div className="page">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
      <div><div className="page-title">Gume</div><div className="page-sub">Pretraga i upravljanje · <span style={{cursor:"pointer",color:"var(--blue)",fontSize:11}} onClick={()=>setPolicaSearch(s=>!s)}>🔍 pretraga po polici</span></div></div>
      <button className="btn-add-main" onClick={openAdd}><Icons.Plus size={13}/> Dodaj gumu</button>
    </div>

    {/* PRETRAGA PO POLICI — skrivena */}
    {policaSearch&&<div style={{background:'rgba(88,166,255,.08)',border:'1.5px solid rgba(88,166,255,.3)',borderRadius:8,padding:'12px 14px',marginBottom:10,display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
      <span style={{fontSize:12,color:'var(--blue)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,textTransform:'uppercase',letterSpacing:'1px',flexShrink:0}}>🔍 Polica:</span>
      <input style={{flex:1,minWidth:80,background:'var(--card)',border:'1.5px solid var(--border)',borderRadius:5,color:'var(--text)',fontFamily:'Barlow,sans-serif',fontSize:13,padding:'6px 9px',outline:'none'}}
        placeholder="npr. P10" value={policaSearchVal} onChange={e=>setPolicaSearchVal(e.target.value.toUpperCase())}
        onKeyDown={async e=>{
          if(e.key==='Enter'&&policaSearchVal.trim()){
            try{const g=await api('/police/'+encodeURIComponent(policaSearchVal.trim())+'/gume');setPolicaGume(g);}
            catch(err){showToast(err.message,'err');}
          }
        }}/>
      <button className="btn-new" onClick={async()=>{if(!policaSearchVal.trim())return;try{const g=await api('/police/'+encodeURIComponent(policaSearchVal.trim())+'/gume');setPolicaGume(g);}catch(err){showToast(err.message,'err');}}}>Traži</button>
      {policaGume!==null&&<button style={{background:'none',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:4,padding:'4px 8px',cursor:'pointer',fontSize:11}} onClick={()=>{setPolicaGume(null);setPolicaSearchVal('');}}>× Zatvori</button>}
    </div>}
    {policaGume!==null&&<div style={{background:'var(--surf)',border:'1px solid var(--border)',borderRadius:8,padding:'10px 14px',marginBottom:10}}>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:11,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)',marginBottom:8}}>Polica {policaSearchVal} — {policaGume.length} guma</div>
      {policaGume.length===0?<div style={{fontSize:12,color:'var(--muted)'}}>Nema guma na ovoj polici</div>:
      <div className="tire-grid">{policaGume.map(g=><div key={g.id} className="tire-card" onClick={()=>setDetailG(g)}>
        <div className="tire-thumb">{g.slike&&g.slike.length>0?<img src={g.slike[0]} alt="" loading="lazy"/>:<Icons.Tire size={30}/>}</div>
        <span className={'bs '+(g.sezona==='Zimska'?'z':'l')} style={{fontSize:8,padding:'1px 4px'}}>{g.sezona==='Zimska'?'❄':'☀'}</span>
        <span className="bsif" style={{fontSize:8}}>{g.sifra}</span>
        <div className="tire-info"><div className="tire-size" style={{fontSize:14}}>{g.sirina}/{g.visina} {promjerDisp(g.promjer)}</div></div>
      </div>)}</div>}
    </div>}
    {/* FILTERI */}
    <div className="sf-wrap">
      <div className="sf-grid">
        <div className="fg sf-full"><label>Interna šifra</label><input placeholder="npr. GU10" value={filters.sifra} onChange={e=>setFilters(f=>({...f,sifra:e.target.value}))}/></div>
        <div className="fg"><label>Sezona</label><select value={filters.sezona} onChange={e=>setFilters(f=>({...f,sezona:e.target.value}))}><option value="">Sve</option><option>Zimska</option><option>Ljetna</option></select></div>
        <div className="fg"><label>Tip</label><select value={filters.tip} onChange={e=>setFilters(f=>({...f,tip:e.target.value}))}>{TIP_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}</select></div>
        <div className="fg"><label>Širina (mm)</label><select value={filters.sirina} onChange={e=>setFilters(f=>({...f,sirina:e.target.value}))}><option value="">Sve</option>{sirina_opts.map(o=><option key={o}>{o}</option>)}</select></div>
        <div className="fg"><label>Profil (%)</label><select value={filters.visina} onChange={e=>setFilters(f=>({...f,visina:e.target.value}))}><option value="">Sve</option>{visina_opts.map(o=><option key={o}>{o}</option>)}</select></div>
        <div className="fg"><label>Prečnik</label><select value={filters.promjer} onChange={e=>setFilters(f=>({...f,promjer:e.target.value}))}><option value="">Sve</option>{promjer_opts.map(o=><option key={o}>{o}</option>)}</select></div>
        <div className="fg"><button style={{width:'100%',background:'var(--border)',border:'none',color:'var(--muted)',borderRadius:5,fontFamily:'Barlow Condensed,sans-serif',fontSize:12,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',padding:'8px',cursor:'pointer'}} onClick={()=>setFilters({sezona:'',sirina:'',visina:'',promjer:'',sifra:'',tip:''})}>↺ Poništi</button></div>
      </div>
    </div>

    <div className="status-tabs">
      <button className={'stab'+(statusTab==='stanje'?' as':'')} onClick={()=>setStatusTab('stanje')}>Na stanju ({stanjeCount})</button>
      <button className={'stab'+(statusTab==='prodato'?' ap':'')} onClick={()=>setStatusTab('prodato')}>Prodato ({prodatoCount})</button>
    </div>
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',flexWrap:'wrap',gap:8,marginBottom:8}}>
      <div className="res-count" style={{marginBottom:0}}>Prikazano: <b>{filtered.length}</b> guma</div>
      <button style={{background:'none',border:'1px solid var(--border)',color:'var(--muted)',borderRadius:5,fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',padding:'4px 10px',cursor:'pointer'}} onClick={()=>setPremjestanjeOpen(p=>!p)}>
        📦 Premještanje guma
      </button>
    </div>
    {premjestanjeOpen&&<div className="card-panel" style={{marginBottom:12}}>
      <div className="section-title" style={{marginBottom:10}}>📦 Premještanje guma</div>
      <PremjestanjeWidget showToast={showToast} police={police}/>
    </div>}

    {filtered.length===0?<div className="empty"><Icons.Tire size={40}/><p>{gume.length===0?'Nema guma. Dodaj prvu!':'Nema rezultata.'}</p></div>:
    <div className="tire-grid">
      {filtered.map(g=><div key={g.id} className={'tire-card'+(g.prodato?' sold':'')} onClick={()=>setDetailG(g)}>
        <div className="tire-thumb">{g.slike&&g.slike.length>0?<img src={g.slike[0]} alt="" loading="lazy"/>:<Icons.Tire size={34}/>}</div>
        <span className={'bs '+(g.sezona==='Zimska'?'z':'l')}>{g.sezona==='Zimska'?'❄':'☀'} {g.sezona}</span>
        <span className="bsif">{g.sifra}</span>
        {g.tip&&<span className={'tip-badge tip-'+g.tip} style={{position:'absolute',bottom:g.prodato?22:7,right:7}}>{g.tip==='komad'?'1 kom':g.tip==='par'?'2 kom':'4 kom'}</span>}
        {g.prodato&&<div className="bsold">Prodato{g.datum_prodaje?' · '+g.datum_prodaje:''}</div>}
        <div className="tire-info">
          <div className="tire-size">{g.sirina}/{g.visina} {promjerDisp(g.promjer)}</div>
          <div className="tire-cod">{g.sifra}</div>
          <div className="tire-loc">{g.loc_magacin?`${g.loc_magacin} › ${g.loc_prolaz} › ${g.loc_regal} › ${g.polica_kod}`:g.polica_kod||'—'}</div>
        </div>
      </div>)}
    </div>}

    {/* DETAIL */}
    {detailG&&!sellModal&&!lightbox&&<div className="overlay" onClick={()=>setDetailG(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">{detailG.sirina}/{detailG.visina} {promjerDisp(detailG.promjer)} <button className="btn-close" onClick={()=>setDetailG(null)}>×</button></div>
      <div style={{display:'flex',alignItems:'center',gap:9,marginBottom:12,flexWrap:'wrap'}}>
        <span className={'bs '+(detailG.sezona==='Zimska'?'z':'l')} style={{position:'static',display:'inline-flex'}}>{detailG.sezona==='Zimska'?'❄':'☀'} {detailG.sezona}</span>
        <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:17,color:'var(--accent)',letterSpacing:2}}>{detailG.sifra}</span>
        {detailG.tip&&<span className={'tip-badge tip-'+detailG.tip}>{tipLbl(detailG.tip)}</span>}
      </div>
      {detailG.slike&&detailG.slike.length>0&&<div className="det-imgs">{detailG.slike.map((s,i)=><img key={i} className="thumb" src={s} onClick={()=>setLightbox({images:detailG.slike,index:i})}/>)}</div>}
      {detailG.cijena&&<div style={{background:'rgba(240,180,41,.08)',border:'1px solid rgba(240,180,41,.25)',borderRadius:6,padding:'8px 12px',marginBottom:9,display:'flex',alignItems:'center',justifyContent:'space-between'}}><span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)'}}>Cijena</span><span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:20,fontWeight:900,color:'var(--accent)',letterSpacing:'1px'}}>{detailG.cijena} KM</span></div>}
      <div className="specs-grid">
        <div className="spec-box"><div className="spec-lbl">Širina</div><div className="spec-val">{detailG.sirina} mm</div></div>
        <div className="spec-box"><div className="spec-lbl">Profil</div><div className="spec-val">{detailG.visina}%</div></div>
        <div className="spec-box"><div className="spec-lbl">Prečnik</div><div className="spec-val">{promjerDisp(detailG.promjer)}"</div></div>
        <div className="spec-box"><div className="spec-lbl">Šifra</div><div className="spec-val" style={{color:'var(--accent)'}}>{detailG.sifra}</div></div>
      </div>
      {(detailG.dubina||detailG.dot)&&<div style={{display:'flex',gap:7,marginBottom:8,flexWrap:'wrap'}}>
        {detailG.dubina&&<div className="spec-box" style={{flex:1}}><div className="spec-lbl">Dubina šare</div><div className="spec-val" style={{fontSize:16}}>{detailG.dubina} mm</div></div>}
        {detailG.dot&&<div className="spec-box" style={{flex:1}}><div className="spec-lbl">Godina (DOT)</div><div className="spec-val" style={{fontSize:16}}>{detailG.dot}</div></div>}
      </div>}
      {detailG.polica_kod&&<div className="loc-box">📍 {detailG.loc_magacin&&`${detailG.loc_magacin} › ${detailG.loc_prolaz} › ${detailG.loc_regal} › `}{detailG.polica_kod}</div>}
      {detailG.prodato&&<div className="sold-box">Prodato{detailG.datum_prodaje?' · '+detailG.datum_prodaje:''}{detailG.cijena_prodaje&&<span style={{marginLeft:'auto',fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:14}}>{detailG.cijena_prodaje}</span>}</div>}
      {detailG.napomena&&<><div className="sec-lbl">Napomena</div><p style={{fontSize:12,color:'var(--muted)',lineHeight:1.6}}>{detailG.napomena}</p></>}
      <div style={{display:'flex',gap:8,flexWrap:'wrap',marginTop:8,fontSize:10,color:'var(--muted)'}}>
        {detailG.dodao_korisnik&&<span>Dodao: <b style={{color:'var(--text)'}}>{detailG.dodao_korisnik}</b></span>}
        {detailG.prodao_korisnik&&<span>· Prodao: <b style={{color:'var(--text)'}}>{detailG.prodao_korisnik}</b></span>}
      </div>
      <div className="modal-foot">
        {isAdmin&&<div className="foot-left"><button className="btn-sm red" onClick={()=>doDel(detailG.id)}><Icons.Trash/> Obriši</button></div>}
        {!detailG.prodato&&<button className="btn-sm" style={{color:'var(--blue)',borderColor:'rgba(88,166,255,.3)'}} onClick={()=>{setMoveModal(detailG);setMoveKod('');setDetailG(null);}}><Icons.Move/> Premjesti</button>}
        <button className="btn-sm" onClick={()=>loadHistorija(detailG.id)} title="Historija premještanja"><Icons.History/></button>
        {!detailG.prodato&&<button className="btn-sm" onClick={()=>openEdit(detailG)}><Icons.Edit/> Uredi</button>}
        {!detailG.prodato&&<button className="btn-save" onClick={()=>setSellModal(true)} style={{background:'var(--green)',color:'#fff'}}>Prodaj</button>}
        {detailG.prodato&&<button className="btn-cancel" onClick={()=>setDetailG(null)}>Zatvori</button>}
      </div>
    </div></div>}

    {/* SELL */}
    {detailG&&sellModal&&<div className="overlay" onClick={()=>setSellModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Prodaj gumu <button className="btn-close" onClick={()=>setSellModal(false)}>×</button></div>
      <div className="sell-box"><p>Prodaješ: <strong>{detailG.sifra} — {detailG.sirina}/{detailG.visina} {promjerDisp(detailG.promjer)} ({detailG.sezona})</strong></p>
        <div className="fg2" style={{marginTop:10}}><label>Prodajna cijena (opcionalno)</label>
          <div className="price-row"><input className="price-inp" type="number" placeholder="0" value={sellPrice} onChange={e=>setSellPrice(e.target.value)} autoFocus onKeyDown={e=>e.key==='Enter'&&doSell()}/><span className="price-curr">KM</span></div>
        </div>
      </div>
      <div className="modal-foot"><button className="btn-cancel" onClick={()=>setSellModal(false)}>Odustani</button><button className="btn-save" style={{background:'var(--green)',color:'#fff'}} onClick={doSell}>{sellPrice?'Prodaj za '+sellPrice+' KM':'Potvrdi prodaju'}</button></div>
    </div></div>}

    {/* MOVE */}
    {moveModal&&<div className="overlay" onClick={()=>setMoveModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Premjesti gumu <button className="btn-close" onClick={()=>setMoveModal(null)}>×</button></div>
      <p style={{fontSize:12,color:'var(--muted)',marginBottom:14}}>Guma <b style={{color:'var(--text)'}}>{moveModal.sifra}</b> trenutno je na polici <b style={{color:'var(--accent)'}}>{moveModal.polica_kod||'—'}</b></p>
      {(()=>{const pm=police.find(p=>p.naziv.toLowerCase()===moveKod.trim().toLowerCase());return(<div className="fg2">
        <label>Nova šifra police</label>
        <input className={moveKod.trim()?(pm?'ok':'err'):''} autoFocus placeholder="npr. P15" value={moveKod} onChange={e=>setMoveKod(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doMove()}/>
        {moveKod.trim()&&pm&&<div className="ph ok"><Icons.Check size={10}/> {pm.magacin_naziv} › {pm.prolaz_naziv} › {pm.regal_naziv} › {pm.naziv}</div>}
        {moveKod.trim()&&!pm&&<div className="ph err">Polica ne postoji</div>}
        {!moveKod.trim()&&police.length>0&&<div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Dostupne: {police.map(p=>p.naziv).join(', ')}</div>}
      </div>);})()}
      <div className="modal-foot"><button className="btn-cancel" onClick={()=>setMoveModal(null)}>Odustani</button><button className="btn-save" onClick={doMove}>Premjesti</button></div>
    </div></div>}

    {/* HISTORIJA */}
    {showHistorija&&<div className="overlay" onClick={()=>setShowHistorija(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Historija premještanja <button className="btn-close" onClick={()=>setShowHistorija(false)}>×</button></div>
      <div style={{maxHeight:'60vh',overflowY:'auto'}}>
        {historijaGuma.length===0?<div style={{textAlign:'center',padding:'30px 0',color:'var(--muted)',fontSize:13}}>Guma nije premještana</div>:
        historijaGuma.map((h,i)=>{const dt=new Date(h.created_at);return(<div key={i} className="log-item">
          <span className="log-badge PREMJESTENA_GUMA">📦</span>
          <div style={{flex:1}}><div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:13,fontWeight:800}}>{h.polica_sa||'—'} → {h.polica_na}</div><div className="log-detail">Premjestio: <b style={{color:'var(--text)'}}>{h.korisnik}</b></div></div>
          <span className="log-time">{dt.toLocaleDateString('sr-Latn-RS')} {dt.toLocaleTimeString('sr-Latn-RS',{hour:'2-digit',minute:'2-digit'})}</span>
        </div>);})}
      </div>
    </div></div>}

    {/* FORM */}
    {modal==='form'&&<div className="overlay" onClick={()=>setModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">{editingId?'Uredi gumu':'Dodaj gumu'} <button className="btn-close" onClick={()=>setModal(null)}>×</button></div>
      {!editingId&&<div className="sifra-prev"><span>Šifra:</span> GU{nextGuNum}</div>}
      <div className="fg2"><label>Sezona *</label><select value={form.sezona} onChange={e=>setForm(f=>({...f,sezona:e.target.value}))}><option value="">— Odaberi —</option><option>Zimska</option><option>Ljetna</option></select></div>
      <div className="two-col">
        <div className="fg2"><label>Širina (mm) *</label><ComboBox value={form.sirina} onChange={v=>setForm(f=>({...f,sirina:v}))} options={sirina_opts} placeholder="Širina..."/></div>
        <div className="fg2"><label>Profil (%) *</label><ComboBox value={form.visina} onChange={v=>setForm(f=>({...f,visina:v}))} options={visina_opts} placeholder="Profil..."/></div>
      </div>
      <div className="fg2"><label>Prečnik *</label><ComboBox value={form.promjer} onChange={v=>setForm(f=>({...f,promjer:v.toUpperCase()}))} options={promjer_opts} placeholder="Prečnik..." normalize={v=>v.toUpperCase()}/></div>
      <div className="fg2"><label>Tip</label><select value={form.tip} onChange={e=>setForm(f=>({...f,tip:e.target.value}))}><option value="">— Odaberi —</option><option value="komad">Komad (1 kom)</option><option value="par">Par (2 kom)</option><option value="set">Set (4 kom)</option></select></div>
      <div className="fg2">
        <label>Šifra police *</label>
        <input className={form.policaKod.trim()?(policaMatch?'ok':'err'):''} placeholder="npr. P10" value={form.policaKod} onChange={e=>setForm(f=>({...f,policaKod:e.target.value}))} autoComplete="off"/>
        {form.policaKod.trim()&&policaMatch&&<div className="ph ok"><Icons.Check size={10}/> {policaMatch.magacin_naziv} › {policaMatch.prolaz_naziv} › {policaMatch.regal_naziv} › {policaMatch.naziv}</div>}
        {form.policaKod.trim()&&!policaMatch&&<div className="ph err">Polica ne postoji</div>}
        {!form.policaKod.trim()&&police.length>0&&<div style={{fontSize:10,color:'var(--muted)',marginTop:3}}>Dostupne: {police.map(p=>p.naziv).join(', ')}</div>}
        {submitAttempted&&!policaMatch&&<div style={{marginTop:4,padding:'6px 9px',borderRadius:4,fontSize:11,background:'rgba(248,81,73,.1)',border:'1.5px solid rgba(248,81,73,.5)',color:'var(--red)',fontWeight:600}}>Polica je obavezna i mora postojati u sistemu</div>}
      </div>
      <div className="fg2"><label>Napomena</label><textarea placeholder="Stanje, opis..." value={form.napomena} onChange={e=>setForm(f=>({...f,napomena:e.target.value}))}/></div>
      <div className="two-col">
        <div className="fg2"><label>Dubina šare (mm)</label><input type="number" step="0.5" min="0" max="12" placeholder="npr. 7.5" value={form.dubina} onChange={e=>setForm(f=>({...f,dubina:e.target.value}))}/></div>
        <div className="fg2"><label>Godina (DOT)</label><input type="number" min="2000" max="2099" placeholder="npr. 2022" value={form.dot} onChange={e=>setForm(f=>({...f,dot:e.target.value}))}/></div>
      </div>
      {isAdmin&&<div className="fg2"><label>Cijena (KM)</label>
        <div className="price-row"><input className="price-inp" type="number" min="0" step="0.5" placeholder="0.00" value={form.cijena} onChange={e=>setForm(f=>({...f,cijena:e.target.value}))}/><span className="price-curr">KM</span></div>
      </div>}
      <ImgUploadUI {...imgHook} onThumbClick={i=>setLightbox({images:imgHook.slike,index:i})}/>
      <div className="modal-foot">
        <button className="btn-cancel" onClick={()=>setModal(null)}>Odustani</button>
        <button className="btn-save" onClick={doSave} disabled={!canSave}>{imgHook.uploadState.uploading?'Čekaj slanje...':editingId?'Sačuvaj izmjene':'Sačuvaj gumu'}</button>
      </div>
    </div></div>}
  <div className="site-footer">© 2026 <span>DelicNode</span></div>
  </div>);
}

// ===== KUPCI MODULE =====
function KupciModul({showToast}){
  const [kupci,setKupci]=useState([]);const [search,setSearch]=useState('');
  const [modal,setModal]=useState(false);const [detail,setDetail]=useState(null);
  const [editKupac,setEditKupac]=useState(null);
  const [form,setForm]=useState({ime:'',telefon:'',adresa:'',jib:'',pdv_broj:'',napomena:''});
  const [kupForm,setKupForm]=useState({opis:'',iznos:'',placeno:'',datum:new Date().toISOString().slice(0,10)});
  const [editKupovina,setEditKupovina]=useState(null);
  const [modalKup,setModalKup]=useState(false);
  const [placanjModal,setPlacanjModal]=useState(null); // kupovina id
  const [novoPlacanje,setNovoPlacanje]=useState('');
  const [filterDug,setFilterDug]=useState(false);
  const [kupciTab,setKupciTab]=useState('kupci');
  const [kompenz,setKompenz]=useState([]);const [kompenzDetail,setKompenzDetail]=useState(null);
  const [kompenzForm,setKompenzForm]=useState({opis:'',iznos:'',smjer:'dugujemo',datum:new Date().toISOString().slice(0,10),napomena:''});
  const [kompenzModal,setKompenzModal]=useState(false);

  const load=async()=>{try{const d=await api('/kupci');setKupci(d);}catch(e){showToast(e.message,'err');}};
  useEffect(()=>{load();},[]);

  const loadKompenz=async(kupacId)=>{try{const d=await api('/kupci/'+kupacId+'/kompenzacije');setKompenz(d);}catch(e){showToast(e.message,'err');}};
  const doAddKompenz=async()=>{
    if(!kompenzForm.opis.trim()||!kompenzForm.iznos){showToast('Opis i iznos obavezni','err');return;}
    try{const k=await api('/kupci/'+kompenzDetail.id+'/kompenzacije',{method:'POST',body:kompenzForm});setKompenz(p=>[k,...p]);setKompenzModal(false);setKompenzForm({opis:'',iznos:'',smjer:'dugujemo',datum:new Date().toISOString().slice(0,10),napomena:''});showToast('Dodano');}catch(e){showToast(e.message,'err');}
  };
  const toggleKompenz=async(k)=>{const u=await api('/kupci/'+kompenzDetail.id+'/kompenzacije/'+k.id,{method:'PUT',body:{izmireno:!k.izmireno}});setKompenz(p=>p.map(x=>x.id===u.id?u:x));};
  const delKompenz=async(k)=>{await api('/kupci/'+kompenzDetail.id+'/kompenzacije/'+k.id,{method:'DELETE'});setKompenz(p=>p.filter(x=>x.id!==k.id));};

  const dugovanje=(k)=>(k.kupovine||[]).reduce((s,x)=>s+(parseFloat(x.iznos)||0)-(parseFloat(x.placeno)||0),0);
  const ukupnoKupao=(k)=>(k.kupovine||[]).reduce((s,x)=>s+(parseFloat(x.iznos)||0),0);

  const filtered=useMemo(()=>kupci.filter(k=>{
    const matchSearch=!search||k.ime.toLowerCase().includes(search.toLowerCase())||(k.telefon&&k.telefon.includes(search));
    const matchDug=!filterDug||dugovanje(k)>0;
    return matchSearch&&matchDug;
  }),[kupci,search,filterDug]);

  const ukupnoDugova=useMemo(()=>kupci.reduce((s,k)=>s+Math.max(0,dugovanje(k)),0),[kupci]);

  const doSave=async()=>{
    if(!form.ime.trim()){showToast('Ime je obavezno','err');return;}
    try{
      if(editKupac){const k=await api('/kupci/'+editKupac.id,{method:'PUT',body:form});setKupci(p=>p.map(x=>x.id===k.id?{...x,...k}:x));setDetail(d=>d?{...d,...k}:d);}
      else{const k=await api('/kupci',{method:'POST',body:form});setKupci(p=>[...p,k]);}
      setModal(false);setEditKupac(null);setForm({ime:'',telefon:'',napomena:''});showToast('Sačuvano');
    }catch(e){showToast(e.message,'err');}
  };
  const doDel=async(id)=>{if(!window.confirm('Obrisati kupca?'))return;await api('/kupci/'+id,{method:'DELETE'});setKupci(p=>p.filter(k=>k.id!=id));setDetail(null);};

  const doAddKupovina=async()=>{
    if(!kupForm.opis.trim()){showToast('Opis je obavezan','err');return;}
    try{
      if(editKupovina){
        const k=await api('/kupci/'+detail.id+'/kupovina/'+editKupovina.id,{method:'PUT',body:{...kupForm,iznos:kupForm.iznos,placeno:kupForm.placeno}});
        setKupci(p=>p.map(x=>x.id!=detail.id?x:{...x,kupovine:(x.kupovine||[]).map(kup=>kup.id===k.id?k:kup)}));
        setDetail(d=>({...d,kupovine:(d.kupovine||[]).map(kup=>kup.id===k.id?k:kup)}));
        showToast('Ažurirano');
      } else {
        const k=await api('/kupci/'+detail.id+'/kupovina',{method:'POST',body:kupForm});
        const updateKupci=p=>p.map(x=>x.id!=detail.id?x:{...x,kupovine:[k,...(x.kupovine||[])]});
        setKupci(updateKupci);setDetail(d=>({...d,kupovine:[k,...(d.kupovine||[])]}));
        showToast('Dodano');
      }
      setModalKup(false);setEditKupovina(null);setKupForm({opis:'',iznos:'',placeno:'',datum:new Date().toISOString().slice(0,10)});
    }catch(e){showToast(e.message,'err');}
  };

  const doPlati=async(kupId,kupovId)=>{
    try{
      const k=await api('/kupci/'+kupId+'/kupovina/'+kupovId,{method:'PUT',body:{placeno:novoPlacanje}});
      const updateK=p=>p.map(x=>x.id!=kupId?x:{...x,kupovine:(x.kupovine||[]).map(kup=>kup.id===k.id?k:kup)});
      setKupci(updateK);setDetail(d=>({...d,kupovine:(d.kupovine||[]).map(kup=>kup.id===k.id?k:kup)}));
      setPlacanjModal(null);setNovoPlacanje('');showToast('Plaćanje evidentirano');
    }catch(e){showToast(e.message,'err');}
  };

  const doDelKupovina=async(kid)=>{await api('/kupci/'+detail.id+'/kupovina/'+kid,{method:'DELETE'});
    setKupci(p=>p.map(x=>x.id!=detail.id?x:{...x,kupovine:(x.kupovine||[]).filter(k=>k.id!=kid)}));
    setDetail(d=>({...d,kupovine:(d.kupovine||[]).filter(k=>k.id!=kid)}));
  };

  return(<div className="page">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:10,flexWrap:'wrap',gap:8}}>
      <div><div className="page-title">Kupci</div><div className="page-sub">Baza kupaca, dugovanja i kompenzacije</div></div>
      {kupciTab==='kupci'&&<button className="btn-add-main" onClick={()=>{setForm({ime:'',telefon:'',adresa:'',jib:'',pdv_broj:'',napomena:''});setEditKupac(null);setModal(true);}}><Icons.Plus size={13}/> Novi kupac</button>}
    </div>
    <div className="status-tabs" style={{marginBottom:12}}>
      <button className={"stab"+(kupciTab==='kupci'?' as':'')} onClick={()=>setKupciTab('kupci')}>👥 Kupci</button>
      <button className={"stab"+(kupciTab==='kompenz'?' as':'')} onClick={()=>setKupciTab('kompenz')}>🔄 Kompenzacije</button>
    </div>

    {kupciTab==='kupci'&&<>{ukupnoDugova>0&&<div style={{background:'rgba(248,81,73,.08)',border:'1.5px solid rgba(248,81,73,.3)',borderRadius:8,padding:'10px 14px',marginBottom:12,display:'flex',alignItems:'center',justifyContent:'space-between'}}>
      <div><div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--muted)'}}>Ukupna dugovanja</div>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:22,color:'var(--red)'}}>{ukupnoDugova.toLocaleString('sr-Latn-RS')} KM</div></div>
      <button className={"stab"+(filterDug?' as':'')} style={{borderColor:'var(--red)',color:filterDug?'var(--red)':'var(--muted)'}} onClick={()=>setFilterDug(f=>!f)}>Samo dužnici</button>
    </div>}

    <div className="sf-wrap" style={{marginBottom:12}}>
      <div className="fg"><label>Pretraga</label><input placeholder="Ime ili telefon..." value={search} onChange={e=>setSearch(e.target.value)}/></div>
    </div>

    {filtered.length===0?<div className="empty"><Icons.Task size={36}/><p>Nema kupaca.</p></div>:
    <div style={{display:'flex',flexDirection:'column',gap:6}}>
      {filtered.map(k=>{
        const dug=dugovanje(k);
        return(<div key={k.id} style={{background:'var(--card)',border:'1.5px solid '+(dug>0?'rgba(248,81,73,.3)':'var(--border)'),borderRadius:8,padding:'10px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:12}} onClick={()=>setDetail(k)}>
          <div style={{width:36,height:36,borderRadius:'50%',background:dug>0?'var(--red)':'var(--accent)',color:'#000',display:'flex',alignItems:'center',justifyContent:'center',fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16,flexShrink:0}}>
            {k.ime.charAt(0).toUpperCase()}
          </div>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:15}}>{k.ime}</div>
            <div style={{fontSize:11,color:'var(--muted)'}}>{k.telefon||'Nema broja'} · {(k.kupovine||[]).length} transakcija</div>
          </div>
          <div style={{textAlign:'right',flexShrink:0}}>
            {dug>0&&<div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:14,color:'var(--red)'}}>Duguje {dug.toLocaleString('sr-Latn-RS')} KM</div>}
            {dug<=0&&ukupnoKupao(k)>0&&<div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:12,color:'var(--green)'}}>✓ Izmiren</div>}
          </div>
          {k.telefon&&<a href={"https://wa.me/387"+k.telefon.replace(/^0/,'').replace(/\D/g,'')} target="_blank" onClick={e=>e.stopPropagation()} style={{background:'#25d366',color:'#fff',borderRadius:'50%',width:32,height:32,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:14,textDecoration:'none'}}>💬</a>}
        </div>);
      })}
    </div>}

    {/* DETAIL */}
    {detail&&!modalKup&&placanjModal===null&&<div className="overlay" onClick={()=>setDetail(null)}><div className="modal" style={{maxWidth:500}} onClick={e=>e.stopPropagation()}>
      <div className="modal-title">{detail.ime} <button className="btn-close" onClick={()=>setDetail(null)}>x</button></div>
      {detail.telefon&&<div style={{display:'flex',gap:6,marginBottom:12}}>
        <a href={"tel:"+detail.telefon} style={{flex:1,background:'var(--card)',border:'1px solid var(--border)',borderRadius:6,padding:'7px',textAlign:'center',color:'var(--blue)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,textDecoration:'none'}}>📞 Pozovi</a>
        <a href={"https://wa.me/387"+detail.telefon.replace(/^0/,'').replace(/\D/g,'')} target="_blank" style={{flex:1,background:'#25d366',borderRadius:6,padding:'7px',textAlign:'center',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,textDecoration:'none'}}>💬 WhatsApp</a>
        <a href={"viber://chat?number=%2B387"+detail.telefon.replace(/^0/,'').replace(/\D/g,'')} style={{flex:1,background:'#7360f2',borderRadius:6,padding:'7px',textAlign:'center',color:'#fff',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:11,textDecoration:'none'}}>📲 Viber</a>
      </div>}

      {(()=>{const dug=dugovanje(detail);return dug>0&&<div style={{background:'rgba(248,81,73,.1)',border:'1.5px solid rgba(248,81,73,.3)',borderRadius:7,padding:'10px 14px',marginBottom:12,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontSize:10,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase'}}>Duguje</div><div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:24,color:'var(--red)'}}>{dug.toLocaleString('sr-Latn-RS')} KM</div></div>
        <div style={{fontSize:12,color:'var(--muted)'}}>od {ukupnoKupao(detail).toLocaleString('sr-Latn-RS')} KM ukupno</div>
      </div>;})()}

      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:11,fontWeight:800,letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)'}}>Transakcije ({(detail.kupovine||[]).length})</div>
        <button className="btn-sm" onClick={()=>setModalKup(true)}><Icons.Plus size={10}/> Dodaj</button>
      </div>
      <div style={{maxHeight:220,overflowY:'auto',marginBottom:12}}>
        {(detail.kupovine||[]).length===0?<div style={{fontSize:12,color:'var(--muted)'}}>Nema transakcija.</div>:
        (detail.kupovine||[]).map(k=>{
          const dug=Math.max(0,(parseFloat(k.iznos)||0)-(parseFloat(k.placeno)||0));
          return(<div key={k.id} style={{padding:'7px 0',borderBottom:'1px solid var(--border)'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,fontSize:12}}>
              <div style={{flex:1}}>{k.opis}</div>
              <div style={{textAlign:'right',flexShrink:0}}>
                <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:13}}>{(parseFloat(k.iznos)||0).toLocaleString('sr-Latn-RS')} KM</div>
                {parseFloat(k.placeno)>0&&<div style={{fontSize:10,color:'var(--green)'}}>Plaćeno: {parseFloat(k.placeno).toLocaleString('sr-Latn-RS')} KM</div>}
              </div>
              <button className="del-btn" style={{color:'var(--blue)',opacity:1}} onClick={()=>{setEditKupovina(k);setKupForm({opis:k.opis,iznos:String(k.iznos||''),placeno:String(k.placeno||''),datum:k.datum||new Date().toISOString().slice(0,10)});setModalKup(true);}}><Icons.Edit/></button>
              <button className="del-btn" onClick={()=>doDelKupovina(k.id)}><Icons.Trash/></button>
            </div>
            {dug>0&&<div style={{display:'flex',alignItems:'center',gap:6,marginTop:4}}>
              <div style={{flex:1,fontSize:11,color:'var(--red)'}}>Duguje: <b>{dug.toLocaleString('sr-Latn-RS')} KM</b></div>
              <button className="btn-sm" style={{color:'var(--green)',borderColor:'var(--green)'}} onClick={()=>{setPlacanjModal(k.id);setNovoPlacanje(String(dug));}}>+ Uplata</button>
            </div>}
          </div>);
        })}
      </div>

      <div className="modal-foot">
        <div className="foot-left"><button className="btn-sm red" onClick={()=>doDel(detail.id)}><Icons.Trash/> Obriši</button></div>
        <button className="btn-cancel" onClick={()=>{setEditKupac(detail);setForm({ime:detail.ime,telefon:detail.telefon||'',adresa:detail.adresa||'',jib:detail.jib||'',pdv_broj:detail.pdv_broj||'',napomena:detail.napomena||''});setDetail(null);setModal(true);}}>Uredi</button>
      </div>
    </div></div>}

    {/* UPLATA */}
    {placanjModal!==null&&detail&&<div className="overlay" onClick={()=>setPlacanjModal(null)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">Evidentiraj uplatu <button className="btn-close" onClick={()=>setPlacanjModal(null)}>x</button></div>
      <div className="fg2"><label>Iznos uplate (KM)</label>
        <div className="price-row"><input className="price-inp" type="number" autoFocus value={novoPlacanje} onChange={e=>setNovoPlacanje(e.target.value)} onKeyDown={e=>e.key==='Enter'&&doPlati(detail.id,placanjModal)}/><span className="price-curr">KM</span></div>
      </div>
      <div className="modal-foot"><button className="btn-cancel" onClick={()=>setPlacanjModal(null)}>Odustani</button><button className="btn-save" style={{background:'var(--green)',color:'#fff'}} onClick={()=>doPlati(detail.id,placanjModal)}>Potvrdi uplatu</button></div>
    </div></div>}

    {/* ADD KUPOVINA */}
    {modalKup&&detail&&<div className="overlay" onClick={()=>setModalKup(false)}><div className="modal" onClick={e=>e.stopPropagation()}>
      <div className="modal-title">{editKupovina?"Uredi transakciju":"Nova transakcija"} <button className="btn-close" onClick={()=>{setModalKup(false);setEditKupovina(null);}}>x</button></div>
      <div className="fg2"><label>Opis *</label><input autoFocus value={kupForm.opis} onChange={e=>setKupForm(f=>({...f,opis:e.target.value}))} placeholder="npr. 4x zimske 205/55 R16"/></div>
      <div className="two-col">
        <div className="fg2"><label>Ukupan iznos (KM)</label><div className="price-row"><input className="price-inp" type="number" placeholder="0" value={kupForm.iznos} onChange={e=>setKupForm(f=>({...f,iznos:e.target.value}))}/><span className="price-curr">KM</span></div></div>
        <div className="fg2"><label>Plaćeno odmah (KM)</label><div className="price-row"><input className="price-inp" type="number" placeholder="0" value={kupForm.placeno} onChange={e=>setKupForm(f=>({...f,placeno:e.target.value}))}/><span className="price-curr">KM</span></div></div>
      </div>
      <div className="fg2"><label>Datum</label><input type="date" value={kupForm.datum} onChange={e=>setKupForm(f=>({...f,datum:e.target.value}))}/></div>
      <div className="modal-foot"><button className="btn-cancel" onClick={()=>{setModalKup(false);setEditKupovina(null);}}>Odustani</button><button className="btn-save" onClick={doAddKupovina}>{editKupovina?"Sačuvaj":"Dodaj"}</button></div>
    </div></div>}

    </> /* end kupciTab=kupci */}

    {kupciTab==='kompenz'&&<div>
      <div style={{marginBottom:12,fontSize:13,color:'var(--muted)'}}>Evidencija kompenzacija — mi njima, oni nama, i sravnjivanje.</div>
      <div style={{display:'flex',gap:6,marginBottom:14,flexWrap:'wrap'}}>
        {kupci.map(k=><button key={k.id} className={'stab'+(kompenzDetail&&kompenzDetail.id===k.id?' as':'')} onClick={()=>{setKompenzDetail(k);loadKompenz(k.id);}}>{k.ime}</button>)}
      </div>
      {!kompenzDetail&&<div className="empty"><div style={{fontSize:32}}>🔄</div><p>Odaberi kupca za prikaz kompenzacija.</p></div>}
      {kompenzDetail&&<>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
          <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16}}>{kompenzDetail.ime}</div>
          <button className="btn-add-main" onClick={()=>setKompenzModal(true)}><Icons.Plus size={13}/> Dodaj</button>
        </div>
        {(()=>{const dugujemo=kompenz.filter(k=>k.smjer==='dugujemo'&&!k.izmireno).reduce((s,k)=>s+(parseFloat(k.iznos)||0),0);const dugujuNam=kompenz.filter(k=>k.smjer==='duguju_nam'&&!k.izmireno).reduce((s,k)=>s+(parseFloat(k.iznos)||0),0);const saldo=dugujuNam-dugujemo;return(<div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:12}}>
          <div className="kpi red" style={{padding:'8px 12px'}}><div className="kpi-lbl">Mi njima dugujemo</div><div className="kpi-val" style={{color:'var(--red)',fontSize:18}}>{dugujemo.toLocaleString('sr-Latn-BA')} KM</div></div>
          <div className="kpi green" style={{padding:'8px 12px'}}><div className="kpi-lbl">Oni nama duguju</div><div className="kpi-val" style={{color:'var(--green)',fontSize:18}}>{dugujuNam.toLocaleString('sr-Latn-BA')} KM</div></div>
          <div className="kpi" style={{padding:'8px 12px',borderColor:saldo>=0?'rgba(63,185,80,.3)':'rgba(248,81,73,.3)'}}><div className="kpi-lbl">Saldo</div><div className="kpi-val" style={{color:saldo>=0?'var(--green)':'var(--red)',fontSize:18}}>{saldo>=0?'+':''}{saldo.toLocaleString('sr-Latn-BA')} KM</div></div>
        </div>);})()}
        {kompenz.length===0?<div className="empty"><p>Nema evidentiranih kompenzacija.</p></div>:
        <div style={{display:'flex',flexDirection:'column',gap:5}}>
          {kompenz.map(k=><div key={k.id} style={{display:'flex',alignItems:'center',gap:8,background:'var(--card)',border:'1.5px solid '+(k.izmireno?'var(--border)':k.smjer==='dugujemo'?'rgba(248,81,73,.3)':'rgba(63,185,80,.3)'),borderRadius:7,padding:'8px 12px',opacity:k.izmireno?0.5:1}}>
            <div style={{width:8,height:8,borderRadius:'50%',background:k.smjer==='dugujemo'?'var(--red)':'var(--green)',flexShrink:0}}/>
            <div style={{flex:1,minWidth:0}}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:13}}>{k.opis}</div>
              <div style={{fontSize:10,color:'var(--muted)'}}>{k.smjer==='dugujemo'?'Mi njima':'Oni nama'} · {k.datum}{k.izmireno?' · ✓ Izmireno':''}</div>
            </div>
            <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:15,color:k.smjer==='dugujemo'?'var(--red)':'var(--green)',flexShrink:0}}>{(parseFloat(k.iznos)||0).toLocaleString('sr-Latn-BA')} KM</div>
            <button className="btn-sm" style={{color:k.izmireno?'var(--muted)':'var(--green)',borderColor:k.izmireno?'var(--border)':'var(--green)',padding:'3px 8px',fontSize:10}} onClick={()=>toggleKompenz(k)}>{k.izmireno?'Ponisti':'✓ Izmiri'}</button>
            <button className="del-btn" onClick={()=>delKompenz(k)}><Icons.Trash/></button>
          </div>)}
        </div>}
        {kompenzModal&&<div className="overlay" onClick={()=>setKompenzModal(false)}><div className="modal" onClick={e=>e.stopPropagation()}>

function PonudaModul({showToast}){
  const [ponude,setPonude]=useState([]);const [modal,setModal]=useState(false);
  const [printModal,setPrintModal]=useState(null);
  const [editPonuda,setEditPonuda]=useState(null);
  const [racunModal,setRacunModal]=useState(null);
  const [brFiskInput,setBrFiskInput]=useState('');
  const [viewPonuda,setViewPonuda]=useState(null);
  const [form,setForm]=useState({kupac_ime:'',kupac_adresa:'',kupac_telefon:'',napomena:'',pdv:true,rok_placanja:'Avansno plaćanje',mjesto:'Bijeljina',vozilo:''});
  const [stavke,setStavke]=useState([{opis:'',kolicina:1,cijena:'',jm:'KOM'}]);

  const FIRMA={naziv:'Auto Delić',adresa:'',tel:'+387 66 027 888',pdv_broj:'',jib:''};

  const load=async()=>{try{const d=await api('/ponude');setPonude(d);}catch(e){showToast(e.message,'err');}};
  useEffect(()=>{load();},[]);

  const ukupnoBezPdv=(st)=>st.reduce((s,x)=>s+(parseFloat(x.cijena)||0)*(parseInt(x.kolicina)||1),0);
  const pdvIznos=(st)=>Math.round(ukupnoBezPdv(st)*0.17*100)/100;
  const ukupnoSaPdv=(st,hasPdv)=>hasPdv?Math.round((ukupnoBezPdv(st)+pdvIznos(st))*100)/100:ukupnoBezPdv(st);

  const addStavka=()=>setStavke(p=>[...p,{opis:'',kolicina:1,cijena:'',jm:'KOM'}]);
  const updateStavka=(i,f,v)=>setStavke(p=>p.map((s,j)=>j===i?{...s,[f]:v}:s));
  const removeStavka=(i)=>setStavke(p=>p.filter((_,j)=>j!==i));

  const doSave=async()=>{
    if(!form.kupac_ime.trim()){showToast('Ime kupca je obavezno','err');return;}
    const valid=stavke.filter(s=>s.opis.trim());
    if(!valid.length){showToast('Dodaj barem jednu stavku','err');return;}
    try{
      let p;
      if(editPonuda){
        p=await api('/ponude/'+editPonuda.id,{method:'PUT',body:{...form,stavke:valid}});
        setPonude(prev=>prev.map(x=>x.id===p.id?p:x));showToast('Ponuda ažurirana');
      } else {
        p=await api('/ponude',{method:'POST',body:{...form,stavke:valid}});
        setPonude(prev=>[p,...prev]);setPrintModal(p);showToast('Ponuda '+p.broj+' kreirana');
      }
      setModal(false);setEditPonuda(null);
      setForm({kupac_ime:'',kupac_adresa:'',kupac_telefon:'',napomena:'',pdv:true,rok_placanja:'Avansno plaćanje',mjesto:'Bijeljina'});
      setStavke([{opis:'',kolicina:1,cijena:'',jm:'KOM'}]);
    }catch(e){showToast(e.message,'err');}
  };
  const doDel=async(id)=>{if(!window.confirm('Obrisati ponudu?'))return;await api('/ponude/'+id,{method:'DELETE'});setPonude(p=>p.filter(x=>x.id!=id));};

  const genWAText=(p)=>{
    const st=p.stavke||[];const hasPdv=p.pdv!==false;
    let txt=`PONUDA - ${FIRMA.naziv}\nBroj: ${p.broj}\nDatum: ${new Date(p.created_at).toLocaleDateString('sr-Latn-RS')}\n`;
    txt+=`\nKupac: ${p.kupac_ime}\n\nSTAVKE:\n`;
    st.forEach((s,i)=>{const u=(parseFloat(s.cijena)||0)*(parseInt(s.kolicina)||1);txt+=`${i+1}. ${s.opis} — ${s.kolicina}x${s.cijena} KM = ${u.toFixed(2)} KM\n`;});
    txt+=hasPdv?`\nBez PDV-a: ${ukupnoBezPdv(st).toFixed(2)} KM\nPDV (17%): ${pdvIznos(st).toFixed(2)} KM\nUKUPNO: ${ukupnoSaPdv(st,true).toFixed(2)} KM`:`\nUKUPNO: ${ukupnoBezPdv(st).toFixed(2)} KM`;
    txt+=`\n\nTel: ${FIRMA.tel}`;
    return txt;
  };



  return(<div className="page">
    <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:14,flexWrap:'wrap',gap:8}}>
      <div><div className="page-title">Ponude / Predračuni</div><div className="page-sub">Kreiraj, štampaj, pošalji</div></div>
      <button className="btn-add-main" onClick={()=>setModal(true)}><Icons.Plus size={13}/> Nova ponuda</button>
    </div>

    {ponude.length===0?<div className="empty"><Icons.Money size={36}/><p>Nema kreiranih ponuda.</p></div>:
    <div style={{display:'flex',flexDirection:'column',gap:8}}>
      {ponude.map(p=>{
        const st=p.stavke||[];const hasPdv=p.pdv!==false;
        return(<div key={p.id} style={{background:'var(--card)',border:'1px solid var(--border)',borderRadius:8,padding:'12px 14px'}}>
          <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',gap:10,marginBottom:8}}>
            <div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16,color:'var(--accent)',cursor:'pointer',textDecoration:'underline'}} onClick={e=>{e.stopPropagation();setViewPonuda(p);}}>{p.broj}</span>
                <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,fontSize:14}}>{p.kupac_ime}</span>
              {p.vozilo&&<span style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:11,color:'var(--accent)',background:'rgba(240,180,41,.12)',borderRadius:4,padding:'1px 6px'}}>🚗 {p.vozilo}</span>}
              </div>
              <div style={{fontSize:11,color:'var(--muted)',marginTop:2}}>{st.length} stavki · {new Date(p.created_at).toLocaleDateString('sr-Latn-RS')}</div>
            </div>
            <div style={{textAlign:'right',flexShrink:0}}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:18,color:'var(--green)'}}>{ukupnoSaPdv(st,hasPdv).toFixed(2)} KM</div>
              {hasPdv&&<div style={{fontSize:10,color:'var(--muted)'}}>sa PDV-om</div>}
            </div>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap'}}>

              <div style={{display:'none',position:'absolute',top:'110%',left:0,zIndex:100,background:'var(--surf)',border:'1px solid var(--border)',borderRadius:6,boxShadow:'0 4px 16px rgba(0,0,0,.5)',minWidth:170,overflow:'hidden'}}>

function KartaMagacinaInline({showToast,magacini:magaciniProp}){
  const [police,setPolice]=useState([]);
  const [magaciniData,setMagaciniData]=useState([]);
  const [gumeCount,setGumeCount]=useState({});const [selMag,setSelMag]=useState(null);
  const [selPolica,setSelPolica]=useState(null);const [policaGume,setPolicaGume]=useState([]);
  const [loading,setLoading]=useState(true);

  useEffect(()=>{
    Promise.all([api('/magacini-full'),api('/police'),api('/gume')]).then(([m,p,g])=>{
      setMagaciniData(m);setPolice(p);
      const cnt={};g.filter(x=>!x.prodato).forEach(guma=>{cnt[guma.polica_kod]=(cnt[guma.polica_kod]||0)+1;});
      setGumeCount(cnt);setLoading(false);
      if(m.length>0)setSelMag(m[0].id);
      setMagaciniData(m);
    }).catch(e=>{showToast(e.message,'err');setLoading(false);});
  },[]);

  const selMagData=useMemo(()=>magaciniData.find(m=>m.id===selMag),[magaciniData,selMag]);

  const loadPolicaGume=async(naziv)=>{
    setSelPolica(naziv);
    try{const g=await api('/police/'+encodeURIComponent(naziv)+'/gume');setPolicaGume(g);}
    catch(e){showToast(e.message,'err');}
  };

  const getColor=(naziv)=>{
    const cnt=gumeCount[naziv]||0;
    if(cnt===0)return{bg:'rgba(255,255,255,.04)',border:'var(--border)',color:'var(--muted)'};
    if(cnt<=3)return{bg:'rgba(63,185,80,.12)',border:'rgba(63,185,80,.4)',color:'var(--green)'};
    if(cnt<=7)return{bg:'rgba(240,180,41,.12)',border:'rgba(240,180,41,.4)',color:'var(--accent)'};
    return{bg:'rgba(248,81,73,.12)',border:'rgba(248,81,73,.4)',color:'var(--red)'};
  };

  if(loading)return<div className="page"><div style={{color:'var(--muted)',padding:40,textAlign:'center'}}>Učitavanje...</div></div>;

  return(<div className="page">
    <div className="page-header"><div className="page-title">Karta magacina</div><div className="page-sub">Vizuelni pregled popunjenosti polica</div></div>

    {/* Legenda */}
    <div style={{display:'flex',gap:8,marginBottom:14,flexWrap:'wrap'}}>
      {[['Prazna','rgba(255,255,255,.04)','var(--border)','var(--muted)'],['1-3 gume','rgba(63,185,80,.12)','rgba(63,185,80,.4)','var(--green)'],['4-7 guma','rgba(240,180,41,.12)','rgba(240,180,41,.4)','var(--accent)'],['8+ guma','rgba(248,81,73,.12)','rgba(248,81,73,.4)','var(--red)']].map(([l,bg,brd,col])=>(
        <div key={l} style={{display:'flex',alignItems:'center',gap:5}}>
          <div style={{width:14,height:14,background:bg,border:'1.5px solid '+brd,borderRadius:3}}/>
          <span style={{fontSize:10,color:'var(--muted)',fontFamily:'Barlow Condensed,sans-serif',fontWeight:700}}>{l}</span>
        </div>
      ))}
    </div>

    {/* Magacin tabs */}
    {magaciniData.length>1&&<div className="status-tabs" style={{marginBottom:14}}>
      {magaciniData.map(m=><button key={m.id} className={"stab"+(selMag===m.id?' as':'')} onClick={()=>setSelMag(m.id)}>{m.naziv}</button>)}
    </div>}

    {selMagData&&selMagData.prolazi.map(pr=><div key={pr.id} style={{marginBottom:16}}>
      <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:11,fontWeight:800,letterSpacing:'1.5px',textTransform:'uppercase',color:'var(--blue)',marginBottom:8}}>{pr.naziv}</div>
      {pr.regali.map(r=><div key={r.id} style={{marginBottom:8}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:9,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',color:'var(--muted)',marginBottom:5}}>{r.naziv}</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
          {r.police.map(p=>{
            const cnt=gumeCount[p.naziv]||0;
            const col=getColor(p.naziv);
            return(<button key={p.id} onClick={()=>loadPolicaGume(p.naziv)}
              style={{background:col.bg,border:'1.5px solid '+(selPolica===p.naziv?'var(--accent)':col.border),borderRadius:6,padding:'6px 10px',cursor:'pointer',minWidth:52,textAlign:'center',transition:'all .15s'}}>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:13,color:selPolica===p.naziv?'var(--accent)':col.color}}>{p.naziv}</div>
              <div style={{fontFamily:'Barlow Condensed,sans-serif',fontSize:10,fontWeight:700,color:'var(--muted)'}}>{cnt>0?cnt+'x':'—'}</div>
            </button>);
          })}
        </div>
      </div>)}
    </div>)}

    {/* Polica detalj */}
    {selPolica&&<div style={{marginTop:8,background:'var(--surf)',border:'1.5px solid var(--accent)',borderRadius:10,padding:'14px'}}>
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
        <div style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:900,fontSize:16,color:'var(--accent)'}}>{selPolica} — {policaGume.length} guma</div>
        <button className="btn-close" onClick={()=>setSelPolica(null)}>×</button>
      </div>
      {policaGume.length===0?<div style={{fontSize:12,color:'var(--muted)'}}>Polica je prazna.</div>:
      <div style={{display:'flex',flexDirection:'column',gap:5}}>
        {policaGume.map(g=><div key={g.id} style={{display:'flex',alignItems:'center',gap:10,background:'var(--card)',borderRadius:6,padding:'6px 10px',fontSize:12}}>
          <span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:800,color:'var(--accent)',width:45}}>{g.sifra}</span>
          <span style={{flex:1,fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,fontSize:14}}>{g.sirina}/{g.visina} {promjerDisp(g.promjer)}</span>
          <span style={{fontSize:10,color:g.sezona==='Zimska'?'var(--blue)':'var(--accent)'}}>{g.sezona==='Zimska'?'❄':'☀'}</span>
          {g.cijena&&<span style={{fontFamily:'Barlow Condensed,sans-serif',fontWeight:700,color:'var(--green)',fontSize:12}}>{g.cijena} KM</span>}
        </div>)}
      </div>}
    </div>}
    <div className="site-footer">© 2026 <span>DelicNode</span></div>
  </div>);
}

function App(){
  const [user,setUser]=useState(null);const [authChecked,setAuthChecked]=useState(false);
  const [page,setPage]=useState(()=>localStorage.getItem('adg_last_page')||'dashboard');
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const [toast,setToast]=useState(null);
  const [theme,setTheme]=useState(()=>localStorage.getItem('adg_theme')||'dark');
  const [lightbox,setLightbox]=useState(null);
  // Gume state (lifted for cross-module use)
  const [police,setPolice]=useState([]);
  const [magacini,setMagacini]=useState([]);
  const [gume,setGume]=useState([]);
  const [gumeLoaded,setGumeLoaded]=useState(false);

  const isAdmin=user?.role==='admin';

  useEffect(()=>{document.body.className=theme==='light'?'light':'';localStorage.setItem('adg_theme',theme);},[theme]);
  useEffect(()=>{
    const t=getToken();if(!t){setAuthChecked(true);return;}
    api('/auth/me').then(u=>{setUser(u);setAuthChecked(true);}).catch(()=>{localStorage.removeItem('adg_token');setAuthChecked(true);});
  },[]);

  const showToast=useCallback((msg,type='ok')=>{setToast({msg,type});setTimeout(()=>setToast(null),2800);},[]);

  const loadPoliceAndMag=async()=>{
    try{const [p,m]=await Promise.all([api('/police'),api('/magacini')]);setPolice(p);setMagacini(m);}catch(e){}
  };

  const loadGume=async()=>{
    try{const g=await api('/gume');setGume(g);setGumeLoaded(true);}catch(e){showToast(e.message,'err');}
  };

  useEffect(()=>{if(user){loadPoliceAndMag();}}, [user]);
  useEffect(()=>{if(user&&(page==='gume'||page==='dashboard')&&!gumeLoaded)loadGume();},[user,page]);

  const [isOnline,setIsOnline]=useState(navigator.onLine);
  const [fabOpen,setFabOpen]=useState(false);
  const overlayCountRef = React.useRef(0);
  const [quickAddModal,setQuickAddModal]=useState(null); // 'guma' | 'auto'
  const [offlineQueue] = useState([]);

  useEffect(()=>{
    const on=()=>{ setIsOnline(true); showToast('Konekcija vraćena ✓'); };
    const off=()=>setIsOnline(false);
    window.addEventListener('online',on);
    window.addEventListener('offline',off);
    return()=>{window.removeEventListener('online',on);window.removeEventListener('offline',off);};
  },[]);

  useEffect(()=>{
    window.history.pushState(null,'','/');
    const onPop=()=>{
      window.history.pushState(null,'','/');
      // Click the topmost visible overlay to close it
      const overlays=document.querySelectorAll('.overlay');
      if(overlays.length>0){
        overlays[overlays.length-1].click();
      } else {
        setSidebarOpen(false);
      }
    };
    window.addEventListener('popstate',onPop);
    return()=>window.removeEventListener('popstate',onPop);
  },[]);

  const doLogout=async()=>{try{await api('/auth/logout',{method:'POST'});}catch(e){}localStorage.removeItem('adg_token');setUser(null);setGume([]);setGumeLoaded(false);};
  const nav=(p)=>{setPage(p);localStorage.setItem('adg_last_page',p);setSidebarOpen(false);};
  // Radnici uvijek idu na gume

  if(!authChecked)return<div style={{display:'flex',alignItems:'center',justifyContent:'center',height:'100vh',color:'var(--muted)',fontFamily:'Barlow Condensed',fontSize:14,letterSpacing:2}}>UČITAVANJE...</div>;

    {id:'auta',label:'Auta',icon:<Icons.Car size={18}/>,adminOnly:true},
    {id:'kupci',label:'Kupci',icon:<Icons.Task size={18}/>,adminOnly:true},
    {id:'ponude',label:'Ponude',icon:<Icons.Money size={18}/>,adminOnly:true},
    {id:'cjenovnik',label:'Cjenovnik',icon:<Icons.Chart size={18}/>,adminOnly:true},
    {id:'zadaci',label:'Zadaci',icon:<Icons.Task size={18}/>,adminOnly:true},

    {/* SIDEBAR */}

      <div className="sb-logo">

        <div className="sb-logo-text">Auto Delić<span>Upravljanje otpadom</span></div>
      </div>

        {navItems.map(item=><button key={item.id} className={'sb-item'+(page===item.id?' active':'')} onClick={()=>nav(item.id)}>
          <span className="icon">{item.icon}</span>{item.label}

      </nav>

              <div style={{position:'absolute',top:'110%',right:0,zIndex:150,background:'var(--surf)',border:'1px solid var(--border)',borderRadius:8,boxShadow:'0 8px 24px rgba(0,0,0,.5)',minWidth:200,overflow:'hidden'}}>
                <div style={{padding:'6px 0'}}>
                  <button style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 16px',background:'none',border:'none',color:'var(--text)',cursor:'pointer',fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,fontSize:13,letterSpacing:'0.5px',textAlign:'left'}} onClick={()=>{setSettingsOpen(false);window.open('/podesavanja.html','_blank');}}>⚙️  Podešavanja</button>
                  <button style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 16px',background:'none',border:'none',color:'var(--text)',cursor:'pointer',fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,fontSize:13,letterSpacing:'0.5px',textAlign:'left'}} onClick={()=>{setSettingsOpen(false);window.open('/podesavanja.html?tab=analitika','_blank');}}>📊  Analitika &amp; Finansije</button>
                  <button style={{display:'flex',alignItems:'center',gap:10,width:'100%',padding:'10px 16px',background:'none',border:'none',color:'var(--text)',cursor:'pointer',fontFamily:"Barlow Condensed,sans-serif",fontWeight:700,fontSize:13,letterSpacing:'0.5px',textAlign:'left'}} onClick={()=>{setSettingsOpen(false);window.open('/podesavanja.html?tab=log','_blank');}}>📋  Dnevnik aktivnosti</button>
                </div>
              </div>
            </>}
          </div>}
        </div>
      </div>

      {/* PAGES */}
      {page==='dashboard'&&<ErrorBoundary><Dashboard user={user} onNav={nav} showToast={showToast}/></ErrorBoundary>}
      {page==='gume'&&<ErrorBoundary><GumeModul user={user} showToast={showToast} gume={gume} setGume={setGume} police={police} magacini={magacini} loadPolice={loadPoliceAndMag} lightbox={lightbox} setLightbox={setLightbox} quickAdd={quickAddModal==='guma'} onQuickAddDone={()=>setQuickAddModal(null)}/></ErrorBoundary>}
      {page==='auta'&&isAdmin&&<ErrorBoundary><AutaModul user={user} showToast={showToast} quickAdd={quickAddModal==='auto'} onQuickAddDone={()=>setQuickAddModal(null)}/></ErrorBoundary>}
      {page==='zadaci'&&isAdmin&&<ZadaciModul user={user} showToast={showToast}/>}
      {page==='kupci'&&isAdmin&&<ErrorBoundary><KupciModul showToast={showToast}/></ErrorBoundary>}
      {page==='ponude'&&isAdmin&&<ErrorBoundary><PonudaModul showToast={showToast}/></ErrorBoundary>}
      {page==='cjenovnik'&&isAdmin&&<ErrorBoundary><CjenovnikModul showToast={showToast}/></ErrorBoundary>}
    </div>

    {lightbox&&<Lightbox images={lightbox.images} startIndex={lightbox.index} onClose={()=>setLightbox(null)}/>}
    {/* FAB — brzo dodavanje */}
    {user&&<>
      {fabOpen&&<div className="fab-overlay" onClick={()=>setFabOpen(false)}/>}
      {fabOpen&&<div className="fab-menu">
        <div className="fab-item" onClick={()=>{setFabOpen(false);setQuickAddModal('guma');setPage('gume');}}>
          <div className="fab-item-lbl">Dodaj gumu</div>
          <div className="fab-item-btn">🛞</div>
        </div>
        {isAdmin&&<div className="fab-item" onClick={()=>{setFabOpen(false);setQuickAddModal('auto');setPage('auta');}}>
          <div className="fab-item-lbl">Dodaj auto</div>
          <div className="fab-item-btn">🚗</div>
        </div>}
      </div>}
      <button className="fab" onClick={()=>setFabOpen(o=>!o)}>{fabOpen?'×':'+'}</button>
    </>}
    {!isOnline&&<div className="offline-bar">⚡ Nema interneta — podaci se ne mogu osvježiti</div>}
    {toast&&<div className={'toast'+(toast.type==='err'?' err':'')}>{toast.msg}</div>}
  </div>);
}

// Fix modal position when keyboard opens on mobile
if('visualViewport' in window) {
  window.visualViewport.addEventListener('resize', () => {
    const modals = document.querySelectorAll('.modal');
    const overlays = document.querySelectorAll('.overlay');
    const keyboardHeight = window.innerHeight - window.visualViewport.height;
    overlays.forEach(o => {
      if(keyboardHeight > 100) {
        o.style.alignItems = 'flex-start';
        o.style.paddingTop = '10px';
      } else {
        o.style.alignItems = '';
        o.style.paddingTop = '';
      }
    });
  });
}

ReactDOM.createRoot(document.getElementById('root')).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
</body>
</html>
