<!DOCTYPE html>
<html lang="sr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<meta name="theme-color" content="#0d1117"/>
<meta name="description" content="Auto Delić — Gume na stanju. Pretražite dostupne gume i kontaktirajte nas."/>
<title>Auto Delić — Katalog guma</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--surf:#161b22;--card:#21262d;--border:#30363d;--accent:#f0b429;--red:#f85149;--blue:#58a6ff;--green:#3fb950;--purple:#bc8cff;--text:#e6edf3;--muted:#8b949e;--radius:10px}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.header{background:var(--surf);border-bottom:2px solid var(--accent);padding:0 20px;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px}
.logo-w{color:var(--text)}
.header-contact{display:flex;align-items:center;gap:8px}
.btn-contact{background:var(--green);color:#fff;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:8px 14px;border-radius:7px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px}
.btn-viber{background:#7360f2}

/* HERO */
.hero{background:linear-gradient(135deg,#0d1117 0%,#161b22 100%);padding:32px 20px 24px;text-align:center;border-bottom:1px solid var(--border)}
.hero h1{font-family:'Barlow Condensed',sans-serif;font-size:38px;font-weight:900;letter-spacing:3px;text-transform:uppercase;line-height:1.1;margin-bottom:8px}
.hero h1 em{color:var(--accent);font-style:normal}
.hero p{color:var(--muted);font-size:14px;margin-bottom:20px}
.stats{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 20px;text-align:center}
.stat-num{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:900;color:var(--accent)}
.stat-lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-family:'Barlow Condensed',sans-serif;font-weight:700}

/* SEARCH */
.search-wrap{padding:16px 20px;background:var(--surf);border-bottom:1px solid var(--border);position:sticky;top:60px;z-index:99}
.search-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;max-width:900px;margin:0 auto}
.fg label{display:block;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.fg select,.fg input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:6px;color:var(--text);font-family:'Barlow',sans-serif;font-size:13px;padding:9px 10px;outline:none}
.fg select option{background:var(--card)}
.fg.wide{grid-column:1/-1}
.btn-reset{background:none;border:1.5px solid var(--border);color:var(--muted);border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:9px 16px;cursor:pointer;width:100%}
.btn-search{background:var(--accent);color:#000;border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:9px 16px;cursor:pointer;width:100%}

/* RESULTS */
.main{padding:16px 20px;max-width:1200px;margin:0 auto}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px}
.result-count{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1px;text-transform:uppercase;color:var(--muted)}
.result-count b{color:var(--accent);font-size:16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px}

/* CARD */
.card{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;transition:all .2s;cursor:pointer}
.card:hover{border-color:var(--accent);transform:translateY(-3px);box-shadow:0 8px 30px rgba(240,180,41,.15)}
.card-img{width:100%;height:140px;background:var(--surf);display:flex;align-items:center;justify-content:center;color:var(--border);position:relative;overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover}
.badge-sz{position:absolute;top:7px;left:7px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;display:flex;align-items:center;gap:3px}
.badge-sz.z{background:rgba(88,166,255,.22);color:#58a6ff;border:1px solid #58a6ff}
.badge-sz.l{background:rgba(240,180,41,.18);color:#f0b429;border:1px solid #f0b429}
.badge-tip{position:absolute;bottom:7px;right:7px;font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:2px 6px;border-radius:3px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.15);color:#fff}
.card-body{padding:10px 12px}
.card-size{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:20px;letter-spacing:1px;margin-bottom:2px}
.card-sifra{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;color:var(--accent);letter-spacing:1px;margin-bottom:6px}
.card-price{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:900;color:var(--green);letter-spacing:1px;margin-bottom:8px}
.card-price span{font-size:11px;color:var(--muted);font-weight:600}
.btn-wa{width:100%;background:#25d366;color:#fff;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:800;font-size:12px;letter-spacing:1px;text-transform:uppercase;padding:8px;border-radius:5px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none}
.btn-wa:hover{background:#1fba5a}

/* DETAIL MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:var(--surf);border:1.5px solid var(--border);border-radius:14px;padding:22px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;letter-spacing:2px;text-transform:uppercase;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between}
.btn-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:24px;line-height:1}
.det-imgs{display:grid;grid-template-columns:repeat(auto-fill,minmax(100px,1fr));gap:6px;margin-bottom:14px}
.det-imgs img{width:100%;aspect-ratio:1;object-fit:cover;border-radius:6px;cursor:pointer;border:2px solid transparent}
.det-imgs img:hover{border-color:var(--accent)}
.specs-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.spec-box{background:var(--card);border:1px solid var(--border);border-radius:6px;padding:8px 12px}
.spec-lbl{font-family:'Barlow Condensed',sans-serif;font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.spec-val{font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:800}
.price-box{background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.25);border-radius:8px;padding:12px 16px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.price-big{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--green);letter-spacing:1px}
.contact-btns{display:flex;gap:8px}
.btn-wa-big{flex:1;background:#25d366;color:#fff;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;letter-spacing:1px;text-transform:uppercase;padding:12px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none}
.btn-vib-big{flex:1;background:#7360f2;color:#fff;border:none;font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:14px;letter-spacing:1px;text-transform:uppercase;padding:12px;border-radius:7px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:7px;text-decoration:none}

/* LIGHTBOX */
.lightbox{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:300;display:flex;align-items:center;justify-content:center}
.lightbox img{max-width:95vw;max-height:90vh;object-fit:contain;border-radius:8px}
.lb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,.1);border:none;color:#fff;width:40px;height:40px;border-radius:50%;cursor:pointer;font-size:20px}

/* FOOTER */
.footer{text-align:center;padding:32px 20px;color:var(--muted);font-size:12px;border-top:1px solid var(--border);margin-top:40px}
.footer strong{color:var(--text)}

/* EMPTY */
.empty{text-align:center;padding:60px 20px;color:var(--muted)}
.empty svg{opacity:.2;margin-bottom:16px}
.empty p{font-size:14px}

.loading{text-align:center;padding:60px;color:var(--muted);font-family:'Barlow Condensed',sans-serif;letter-spacing:2px;text-transform:uppercase;font-size:13px}

@media(max-width:600px){
  .hero h1{font-size:28px}
  .stats{gap:10px}
  .grid{grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px}
  .contact-btns{flex-direction:column}
}
</style>
</head>
<body>
<header class="header">
  <div class="logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/></svg>
    AUTO <span class="logo-w">DELIĆ</span>
  </div>
  <div class="header-contact">
    <a class="btn-contact" href="https://wa.me/38766027888" target="_blank">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Kontakt
    </a>

</header>

<div class="hero">
  <h1>Gume na <em>stanju</em></h1>
  <p>Pronađite gumu koja vam treba — kontaktirajte nas odmah</p>
</div>

<div class="search-wrap">
  <div class="search-grid">
    <div class="fg">
      <label>Sezona</label>
      <select id="f-sezona">
        <option value="">Sve</option>
        <option value="Zimska">Zimska</option>
        <option value="Ljetna">Ljetna</option>
      </select>

      <select id="f-promjer"><option value="">Sve</option></select>

      <button class="btn-reset" onclick="resetFilters()">↺ Poništi</button>

</div>

<main class="main">
  <div class="result-header">
    <div class="result-count">Prikazano: <b id="count">0</b> guma</div>
  </div>
  <div class="grid" id="grid">
    <div class="loading">Učitavanje...</div>
  </div>
</main>

<!-- DETAIL MODAL -->
<div class="overlay" id="detail-overlay" style="display:none" onclick="closeDetail()">
  <div class="modal" onclick="event.stopPropagation()" id="detail-modal"></div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" style="display:none" onclick="closeLightbox()">

  <strong>Auto Delić</strong> — Sve za vaš auto<br/>

<script>
const PHONE = '38766027888';
let allGume = [];
let filtered = [];

// Fetch public catalog
async function load() {
  try {
    const res = await fetch('/api/katalog');
    const data = await res.json();
    allGume = data.gume || [];
    populateFilters(allGume);
    applyFilters();
  } catch(e) {
    document.getElementById('grid').innerHTML = '<div class="loading">Greška pri učitavanju. Pokušajte ponovo.</div>';
  }
}

function populateFilters(gume) {
  const sirine = [...new Set(gume.map(g=>g.sirina).filter(Boolean))].sort((a,b)=>parseInt(a)-parseInt(b));
  const visine = [...new Set(gume.map(g=>g.visina).filter(Boolean))].sort((a,b)=>parseInt(a)-parseInt(b));
  const promjeri = [...new Set(gume.map(g=>g.promjer).filter(Boolean))].sort();
  
  const fill = (id, opts) => {
    const sel = document.getElementById(id);
    opts.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
  };
  fill('f-sirina', sirine);
  fill('f-visina', visine);
  fill('f-promjer', promjeri);
}

function updateStats(gume) {
  document.getElementById('stat-ukupno').textContent = gume.length;
  document.getElementById('stat-zimske').textContent = gume.filter(g=>g.sezona==='Zimska').length;
  document.getElementById('stat-ljetne').textContent = gume.filter(g=>g.sezona==='Ljetna').length;
}

function applyFilters() {
  const sezona = document.getElementById('f-sezona').value;
  const tip = document.getElementById('f-tip').value;
  const sirina = document.getElementById('f-sirina').value;
  const visina = document.getElementById('f-visina').value;
  const promjer = document.getElementById('f-promjer').value;
  
  filtered = allGume.filter(g => {
    if(sezona && g.sezona !== sezona) return false;
    if(tip && g.tip !== tip) return false;
    if(sirina && g.sirina !== sirina) return false;
    if(visina && g.visina !== visina) return false;
    if(promjer && g.promjer !== promjer) return false;
    return true;
  });
  
  document.getElementById('count').textContent = filtered.length;
  renderGrid(filtered);
}

function resetFilters() {
  ['f-sezona','f-tip','f-sirina','f-visina','f-promjer'].forEach(id => document.getElementById(id).value='');
  applyFilters();
}

['f-sezona','f-tip','f-sirina','f-visina','f-promjer'].forEach(id => {
  document.getElementById(id).addEventListener('change', applyFilters);
});

function promjerDisplay(p) {
  if(!p) return '';
  return /^\d/.test(p) ? 'R'+p : p;
}

function tipLabel(tip) {
  if(!tip) return '';
  return {komad:'Komad',par:'Par (2)',set:'Set (4)'}[tip]||tip;
}

function waMsg(g) {
  const dim = g.sirina+'/'+g.visina+' '+promjerDisplay(g.promjer);
  const tip = tipLabel(g.tip);
  const msg = `Pozdrav, zanima me guma *${dim} ${g.sezona}*${tip?' — '+tip:''}${g.cijena?' — '+g.cijena+' KM':''}. Šifra: ${g.sifra}. Da li je dostupna?`;
  return 'https://wa.me/'+PHONE+'?text='+encodeURIComponent(msg);
}
function vibMsg(g) {
  const dim = g.sirina+'/'+g.visina+' '+promjerDisplay(g.promjer);
  const tip = tipLabel(g.tip);
  const msg = `Pozdrav, zanima me guma ${dim} ${g.sezona}${tip?' — '+tip:''}${g.cijena?' — '+g.cijena+' KM':''}. Šifra: ${g.sifra}. Da li je dostupna?`;
  return 'viber://chat?number=%2B'+PHONE+'&text='+encodeURIComponent(msg);
}

function renderGrid(gume) {
  const grid = document.getElementById('grid');
  if(!gume.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1">
      <svg width="50" height="50" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/></svg>
      <p>Nema guma koje odgovaraju pretrazi</p>
    </div>`;
    return;
  }
  
  grid.innerHTML = gume.map(g => {
    const dim = g.sirina+'/'+g.visina+' '+promjerDisplay(g.promjer);
    const img = g.slike&&g.slike.length>0
      ? `<img src="${g.slike[0]}" alt="${dim}" loading="lazy"/>`
      : `<svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" style="opacity:.2"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="2" x2="12" y2="8"/><line x1="12" y1="16" x2="12" y2="22"/><line x1="2" y1="12" x2="8" y2="12"/><line x1="16" y1="12" x2="22" y2="12"/></svg>`;
    return `
      <div class="card" onclick="openDetail('${g.id}')">
        <div class="card-img">
          ${img}
          <span class="badge-sz ${g.sezona==='Zimska'?'z':'l'}">${g.sezona==='Zimska'?'❄':'☀'} ${g.sezona}</span>
          ${g.tip?`<span class="badge-tip">${tipLabel(g.tip)}</span>`:''}
        </div>
        <div class="card-body">
          <div class="card-size">${dim}</div>
          <div class="card-sifra">${g.sifra}</div>
          ${g.cijena?`<div class="card-price">${g.cijena} <span>KM</span></div>`:'<div class="card-price" style="color:var(--muted);font-size:13px">Cijena na upit</div>'}
          <a class="btn-wa" href="${waMsg(g)}" target="_blank" onclick="event.stopPropagation()">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </a>
        </div>
      </div>`;
  }).join('');
}

function openDetail(id) {
  const g = allGume.find(x=>x.id==id);
  if(!g) return;
  const dim = g.sirina+'/'+g.visina+' '+promjerDisplay(g.promjer);
  const modal = document.getElementById('detail-modal');
  modal.innerHTML = `
    <div class="modal-title">${dim} <button class="btn-close" onclick="closeDetail()">×</button></div>
    ${g.slike&&g.slike.length>0?`<div class="det-imgs">${g.slike.map((s,i)=>`<img src="${s}" onclick="openLightbox('${s}')" alt="slika ${i+1}"/>`).join('')}</div>`:''}
    <div class="specs-grid">
      <div class="spec-box"><div class="spec-lbl">Širina</div><div class="spec-val">${g.sirina} mm</div></div>
      <div class="spec-box"><div class="spec-lbl">Profil</div><div class="spec-val">${g.visina}%</div></div>
      <div class="spec-box"><div class="spec-lbl">Prečnik</div><div class="spec-val">${promjerDisplay(g.promjer)}"</div></div>
      <div class="spec-box"><div class="spec-lbl">Sezona</div><div class="spec-val" style="font-size:14px">${g.sezona}</div></div>
      ${g.tip?`<div class="spec-box"><div class="spec-lbl">Tip</div><div class="spec-val" style="font-size:14px">${tipLabel(g.tip)}</div></div>`:''}
      ${g.dubina?`<div class="spec-box"><div class="spec-lbl">Dubina šare</div><div class="spec-val">${g.dubina} mm</div></div>`:''}
      ${g.dot?`<div class="spec-box"><div class="spec-lbl">Godina (DOT)</div><div class="spec-val">${g.dot}</div></div>`:''}
      <div class="spec-box"><div class="spec-lbl">Šifra</div><div class="spec-val" style="color:var(--accent);font-size:14px">${g.sifra}</div></div>
    </div>
    ${g.cijena?`<div class="price-box"><div><div style="font-size:11px;color:var(--muted);font-family:Barlow Condensed;text-transform:uppercase;letter-spacing:1px;font-weight:700">Cijena</div><div class="price-big">${g.cijena} KM</div></div></div>`:''}
    ${g.napomena?`<div style="background:var(--card);border:1px solid var(--border);border-radius:6px;padding:10px 13px;margin-bottom:12px;font-size:12px;color:var(--muted);line-height:1.6">${g.napomena}</div>`:''}
    <div class="contact-btns">
      <a class="btn-wa-big" href="${waMsg(g)}" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
        WhatsApp
      </a>
      <a class="btn-vib-big" href="${vibMsg(g)}" target="_blank">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M11.4 0C5.1 0 0 5.1 0 11.4c0 2.5.8 4.9 2.3 6.8L.8 22.8l4.8-1.5c1.8 1.2 3.9 1.9 6.1 1.9 6.3 0 11.4-5.1 11.4-11.4S17.7 0 11.4 0zm5.9 15.9c-.2.6-.9 1.1-1.6 1.2-.4.1-.9.1-3.3-.7-2.8-1-4.6-3.8-4.7-4-.1-.2-1.2-1.6-1.2-3s.7-2.1 1-2.4c.2-.3.5-.3.7-.3h.5c.2 0 .4 0 .5.4.2.4.7 1.7.7 1.8.1.1.1.3 0 .4-.1.1-.1.2-.2.3-.1.1-.2.2-.3.4-.1.1-.2.3-.1.5.1.2.5.9 1.2 1.5.8.7 1.5 1 1.7 1.1.2.1.4.1.5-.1.1-.2.5-.6.7-.8.2-.2.4-.2.6-.1l1.9.9c.2.1.4.2.4.4.1.2.1.5-.1 1z"/></svg>
        Viber
      </a>
    </div>
  `;
  document.getElementById('detail-overlay').style.display='flex';
}

function closeDetail() { document.getElementById('detail-overlay').style.display='none'; }
function openLightbox(src) { document.getElementById('lb-img').src=src; document.getElementById('lightbox').style.display='flex'; }
function closeLightbox() { document.getElementById('lightbox').style.display='none'; }

document.addEventListener('keydown', e=>{ if(e.key==='Escape'){closeDetail();closeLightbox();} });

load();
</script>
</body>
</html>
