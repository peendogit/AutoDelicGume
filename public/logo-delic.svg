<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 72" width="180" height="72">
  <defs>
    <linearGradient id="carGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8ec63f"/>
      <stop offset="100%" style="stop-color:#5a9e2f"/>
    </linearGradient>
  </defs>

  <!-- Car silhouette centered above text -->
  <g transform="translate(90,4) scale(1.1)">
    <!-- Main body -->
    <path d="M-52 14 Q-52 8 -46 8 L-34 8 L-22 -4 Q-18 -8 -10 -8 L18 -8 Q26 -8 30 -4 L42 8 L48 8 Q54 8 54 14 L54 20 Q54 24 50 24 L44 24 Q42 30 36 30 Q30 30 28 24 L-28 24 Q-30 30 -36 30 Q-42 30 -44 24 L-50 24 Q-54 24 -54 20 Z"
      fill="url(#carGrad)"/>
    <!-- Windshield -->
    <path d="M-18 8 L-10 -6 Q-8 -8 -4 -8 L14 -8 Q18 -8 20 -6 L28 8 Z"
      fill="#d4edaa" opacity="0.9"/>
    <!-- Rear window -->
    <path d="M-32 8 L-24 -2 L-18 -2 L-24 8 Z"
      fill="#d4edaa" opacity="0.75"/>
    <!-- Wheels -->
    <circle cx="-36" cy="26" r="7" fill="#1a1a1a"/>
    <circle cx="-36" cy="26" r="3.5" fill="#666"/>
    <circle cx="36" cy="26" r="7" fill="#1a1a1a"/>
    <circle cx="36" cy="26" r="3.5" fill="#666"/>
    <!-- Headlight -->
    <ellipse cx="50" cy="14" rx="3" ry="2" fill="#ffe066" opacity="0.9"/>
    <!-- Speed lines left -->
    <line x1="-68" y1="6" x2="-56" y2="6" stroke="#7ab648" stroke-width="2" stroke-linecap="round" opacity="0.8"/>
    <line x1="-72" y1="12" x2="-58" y2="12" stroke="#7ab648" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    <line x1="-70" y1="18" x2="-57" y2="18" stroke="#7ab648" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Green separator line -->
  <rect x="10" y="42" width="160" height="2" fill="#5a9e2f" rx="1"/>

  <!-- AUTO DELIĆ text -->
  <text x="90" y="62"
    font-family="Arial Black, Arial, sans-serif"
    font-weight="900"
    font-size="22"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="3">AUTO DELI&#x106;</text>
</svg>
